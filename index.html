<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шоу</title>

<style>
html,body{margin:0;height:100%;font-family:Arial;background:#111;color:#fff}

.screen{position:fixed;width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center}

#waiting{display:none;font-size:6vw}
#game{display:none;width:100%;height:100%;flex-direction:column}

#timerWrap{height:50px;background:#222;margin:20px;border-radius:20px;overflow:hidden}
#bar{height:100%;width:100%;background:hsl(120,100%,50%)}

ul{flex:1;padding:10px}
li{margin:8px 0;padding:20px;background:#333;border-radius:10px;font-size:5vw}
.selected{background:#4caf50}
</style>
</head>

<body>

<div id="start" class="screen">Скоро начнём!</div>
<div id="waiting" class="screen">Смотрите на сцену!</div>

<div id="game">
<h2 id="q"></h2>
<div id="timerWrap"><div id="bar"></div></div>
<ul id="opts"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});
var db=firebase.database();

/* ===== USER ===== */
var userId = localStorage.getItem("uid");
if(!userId){
  userId = "u"+Math.random().toString(36).substr(2,9);
  localStorage.setItem("uid", userId);
}

function updateUser(q, selected){
  db.ref("users/"+userId).set({
    t: Date.now(),
    q: q,
    selected: selected ?? null
  });
}

/* ===== DOM ===== */
var startEl=document.getElementById("start");
var waitingEl=document.getElementById("waiting");
var gameEl=document.getElementById("game");
var qEl=document.getElementById("q");
var opts=document.getElementById("opts");
var bar=document.getElementById("bar");

/* ===== DATA ===== */
var questions=[];
var answered=JSON.parse(localStorage.getItem("ans")||"{}");

function save(){localStorage.setItem("ans",JSON.stringify(answered));}

/* ===== CSV ===== */
fetch("https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0")
.then(r=>r.text())
.then(t=>{
  var rows=t.trim().split('\n');
  for(var i=1;i<rows.length;i++){
    var c=rows[i].split(',');
    var q={text:c[0],options:[]};
    for(var j=1;j<c.length;j++) if(c[j]) q.options.push(c[j]);
    questions.push(q);
  }
});

/* ===== UI ===== */
function show(screen){
  startEl.style.display="none";
  waitingEl.style.display="none";
  gameEl.style.display="none";
  document.getElementById(screen).style.display="flex";
}

/* ===== SYNC ===== */
db.ref("currentQuestion").on("value",function(s){

  var d=s.val();
  if(!d) return;

  var i=d.index;

  if(i===-1){
    show("start");
    updateUser(-1,null);
    return;
  }

  if(i===-999){
    show("waiting");
    updateUser(-999,null);
    return;
  }

  if(!questions[i]) return;

  show("game");
  updateUser(i, answered[i] ?? null);

  qEl.innerText=questions[i].text;
  opts.innerHTML="";

  for(let k=0;k<questions[i].options.length;k++){

    var li=document.createElement("li");
    li.innerText=questions[i].options[k];

    if(answered[i]!==undefined){
      if(answered[i]===k) li.classList.add("selected");
      li.style.opacity=0.6;
    }else{
      li.onclick=function(){
        answered[i]=k;
        save();

        updateUser(i,k);

        db.ref("votes/"+i+"/"+k).transaction(v=>(v||0)+1);

        li.classList.add("selected");

        setTimeout(function(){
          show("waiting");
          updateUser(-999,null);
        },500);
      };
    }

    opts.appendChild(li);
  }

  /* таймер */
  var total=5000;
  var passed=Date.now()-d.startTime;
  if(passed<0)passed=0;
  if(passed>total)passed=total;

  var remain=total-passed;

  bar.style.transition="none";
  bar.style.width=(remain/total*100)+"%";
  bar.offsetHeight;
  bar.style.transition="width "+remain+"ms linear";

  setTimeout(function(){
    bar.style.width="0%";
  },50);
});
</script>
</body>
</html>
