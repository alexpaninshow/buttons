<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шоу</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
html, body { height:100%; margin:0; }

body {
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:white;
}

.screen {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

#start img {
  max-width:80%;
  border-radius:20px;
  margin-bottom:30px;
}

#waiting { display:none; font-size:6vw; font-weight:900; }
#game { display:none; height:100%; flex-direction:column; }

h1 { font-size:5vw; }

ul {
  width:100%;
  padding:0;
}

li {
  list-style:none;
  margin:10px;
  padding:20px;
  background:#333;
  border-radius:20px;
  text-align:center;
  font-size:5vw;
  cursor:pointer;
}

li.selected {
  background:#2e7d32;
}
</style>
</head>

<body>

<div id="start" class="screen">
  <img src="start.jpg">
  <h1>Скоро начнём!</h1>
</div>

<div id="waiting" class="screen">
  <h1>Смотрите на сцену!</h1>
</div>

<div id="game" class="screen">
  <h1 id="title"></h1>
  <ul id="options"></ul>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBr2DziLnevo6OM69tZL8gdJcTQhSpgeIk",
  authDomain: "buttons-panin.firebaseapp.com",
  databaseURL: "https://buttons-panin-default-rtdb.firebaseio.com",
  projectId: "buttons-panin",
  storageBucket: "buttons-panin.firebasestorage.app",
  messagingSenderId: "303467096491",
  appId: "1:303467096491:web:e5aea0f0764e4ecb550aee",
  measurementId: "G-8HYF4MWJY1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

let questions = [];
let ready = false;
let voted = false;

fetch(CSV_URL)
.then(r => r.text())
.then(text => {
  const rows = text.trim().split('\n').map(r => r.split(','));

  questions = rows.slice(1).map(cols => ({
    text:cols[0],
    options:cols.slice(1).filter(Boolean)
  }));

  ready = true;
});

const start = document.getElementById("start");
const waiting = document.getElementById("waiting");
const game = document.getElementById("game");

const title = document.getElementById("title");
const options = document.getElementById("options");

function show(s){
  start.style.display="none";
  waiting.style.display="none";
  game.style.display="none";
  s.style.display="flex";
}

db.ref("game").on("value", snap => {

  const data = snap.val();

  if(!data) return show(start);

  if(data.status === "waiting") return show(start);
  if(data.status === "ready") return show(waiting);

  if(data.status === "playing"){

    if(!ready) return;

    const q = questions[data.currentQuestion];
    if(!q) return;

    show(game);

    voted = false;
    title.innerText = q.text;
    options.innerHTML = "";

    q.options.forEach((opt,i)=>{
      const li = document.createElement("li");
      li.innerText = opt;

      li.onclick = ()=>{
        if(voted) return;
        voted = true;

        db.ref("votes/"+data.currentQuestion+"/"+i)
          .transaction(v => (v||0)+1);

        li.classList.add("selected");
      };

      options.appendChild(li);
    });
  }
});
</script>

</body>
</html>
