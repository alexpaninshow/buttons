<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шоу</title>

<style>
body { font-family:Arial; text-align:center; background:#333; color:white; padding:40px; }
h1 { font-size:32px; margin-bottom:30px; }

ul { list-style:none; padding:0; }

li {
  font-size:28px;
  padding:20px;
  margin:15px;
  background:#555;
  border-radius:10px;
  border:3px solid transparent;
  transition: all 0.3s ease;
  cursor:pointer;
}

li.selected {
  border-color:#ffeb3b;
  background:#4caf50;
  transform: scale(1.05);
}

#timer { font-size:30px; margin-top:20px; }
</style>
</head>

<body>

<h1 id="title">Шоу</h1>
<ul id="options"></ul>
<div id="timer"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv";

const firebaseConfig = {
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let questions = [];
let timerId=null;
let voted=false;
let time=0;

const title = document.getElementById("title");
const options = document.getElementById("options");
const timer = document.getElementById("timer");

function parseCSV(text){
  const rows = text.replace(/\r/g,'').split('\n').filter(r=>r.trim());
  return rows.slice(1).map(row=>{
    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g)||[];
    return {
      text:(cols[0]||"").replace(/"/g,'').trim(),
      options:[cols[1],cols[2],cols[3]]
        .map(c=>(c||"").replace(/"/g,'').trim())
        .filter(Boolean)
    };
  });
}

// загрузка
fetch(CSV_URL)
.then(r=>r.text())
.then(text=>{
  questions=parseCSV(text);
});

// слушаем
db.ref('currentQuestion').on('value', snap => {
  const current = snap.val();

  if(timerId) clearInterval(timerId);
  voted=false;

  if(current===-1 || current===null){
    title.innerText="Шоу";
    options.innerHTML="";
    timer.innerText="";
    return;
  }

  if(!questions[current]) return; // защита

  title.innerText=questions[current].text;
  options.innerHTML="";

  questions[current].options.forEach((opt,i)=>{
    const li=document.createElement('li');
    li.innerText=opt;

    li.onclick=()=>{
      if(voted || time<=0) return;

      voted=true;

      db.ref('votes/'+current+'/'+i)
        .transaction(v=>(v||0)+1);

      li.classList.add('selected');
    };

    options.appendChild(li);
  });

  time=5;
  timer.innerText=time;

  timerId=setInterval(()=>{
    time--;
    if(time<=0){
      clearInterval(timerId);
      timer.innerText="";
    } else {
      timer.innerText=time;
    }
  },1000);
});
</script>

</body>
</html>
