<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шоу</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>
html, body { height:100%; margin:0; }

body {
  font-family:'Montserrat',sans-serif;
  background:#111;
  color:white;
}

.screen {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

#start { background:#000; z-index:10; }
#start img { max-width:80%; border-radius:20px; margin-bottom:30px; }

#waiting { display:none; font-size:6vw; font-weight:900; }
#game { display:none; height:100%; flex-direction:column; }
#alreadyVoted { display:none; font-size:6vw; font-weight:900; color:#ff9800; }

h1 { font-size:5vw; margin:10px; }

#timerBarWrap {
  width:90%;
  height:70px;
  background:#222;
  border-radius:40px;
  overflow:hidden;
  margin:40px auto;
}

#timerBar {
  height:100%;
  width:100%;
  transition: width 0.05s linear;
  /* Градиент: зелёный → оранжевый → тёмно-красный */
  background: linear-gradient(90deg, #00e676, #ff9800, #d32f2f);
  background-size: 100% 100%;
}

ul {
  flex:1;
  display:flex;
  flex-direction:column;
  margin:10px;
  padding:0;
}

li {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:7vw;
  font-weight:900;
  margin:8px 0;
  background:#333;
  border-radius:20px;
  border:6px solid #888;
  cursor:pointer;
}

li.selected {
  border:8px solid #00e676;
  background:#2e7d32;
}

#votedMessage {
  font-size:5vw;
  margin:20px auto 10px auto;
  color:#00e676;
  font-weight:bold;
  background: rgba(0,230,118,0.15);
  padding: 15px 25px;
  border-radius: 50px;
}
</style>
</head>

<body>

<div id="start" class="screen">
  <img src="start.jpg">
  <div style="font-size:5vw;font-weight:900;">Скоро начнём!</div>
</div>

<div id="waiting" class="screen">Смотрите на сцену!</div>
<div id="alreadyVoted" class="screen">✓ Вы уже проголосовали</div>
<div id="game">
  <h1 id="title"></h1>
  <div id="timerBarWrap"><div id="timerBar"></div></div>
  <div id="votedMessage" style="display:none;">✓ Ваш голос учтён!</div>
  <ul id="options"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
var CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

var db = firebase.database();
var userId = localStorage.getItem('voterId');
if(!userId){
  userId = 'voter_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  localStorage.setItem('voterId', userId);
}

var questions = [];
var timerInterval = null;
var currentQuestionIndex = -1;
var currentStartTime = null;
var globalTimerCheck = null;
var isInitialLoad = true;

var startScreen = document.getElementById("start");
var waiting = document.getElementById("waiting");
var game = document.getElementById("game");
var alreadyVoted = document.getElementById("alreadyVoted");
var title = document.getElementById("title");
var options = document.getElementById("options");
var timerBar = document.getElementById("timerBar");
var votedMessage = document.getElementById("votedMessage");

/* загрузка CSV */
fetch(CSV_URL).then(r=>r.text()).then(text=>{
  var rows = text.trim().split('\n');
  for(var i=1;i<rows.length;i++){
    var cols = rows[i].split(',');
    if(!cols[0] || cols[0].trim()==="") continue;
    var q = { text:cols[0].trim(), options:[] };
    for(var j=1;j<cols.length;j++){
      var val = cols[j].trim();
      if(val) q.options.push(val);
    }
    if(q.text && q.options.length>0) questions.push(q);
  }
});

function showStart(){
  startScreen.style.display="flex";
  waiting.style.display="none";
  game.style.display="none";
  alreadyVoted.style.display="none";
}

function showWaiting(){
  startScreen.style.display="none";
  waiting.style.display="flex";
  game.style.display="none";
  alreadyVoted.style.display="none";
}

function showGame(){
  startScreen.style.display="none";
  waiting.style.display="none";
  game.style.display="flex";
  alreadyVoted.style.display="none";
}

function showAlreadyVoted(){
  startScreen.style.display="none";
  waiting.style.display="none";
  game.style.display="none";
  alreadyVoted.style.display="flex";
}

function checkUserVoted(questionIndex){
  var votedKey = 'voted_' + questionIndex;
  return localStorage.getItem(votedKey) === 'true';
}

function markUserVoted(questionIndex){
  var votedKey = 'voted_' + questionIndex;
  localStorage.setItem(votedKey, 'true');
}

function stopAllTimers(){
  if(timerInterval){
    clearInterval(timerInterval);
    timerInterval = null;
  }
  if(globalTimerCheck){
    clearInterval(globalTimerCheck);
    globalTimerCheck = null;
  }
}

function startGlobalTimerCheck(questionIndex, startTime){
  if(globalTimerCheck) clearInterval(globalTimerCheck);
  
  globalTimerCheck = setInterval(function(){
    if(currentQuestionIndex === questionIndex && currentStartTime === startTime){
      var elapsed = (Date.now() - startTime) / 1000;
      if(elapsed >= 6){
        stopAllTimers();
        showWaiting();
      }
    }
  }, 500);
}

/* Таймер только управляет шириной — цвет уже задан градиентом в CSS */
function startTimer(startTime, questionIndex){
  if(timerInterval) clearInterval(timerInterval);
  
  function update(){
    if(currentQuestionIndex !== questionIndex) return;
    
    var remaining = Math.max(0, 6 - (Date.now()-startTime)/1000);
    var percent = (remaining/6)*100;
    timerBar.style.width = percent + "%";
    
    if(remaining <= 0){
      if(timerInterval){
        clearInterval(timerInterval);
        timerInterval = null;
      }
      timerBar.style.width = "0%";
    }
  }
  
  update();
  timerInterval = setInterval(update, 100);
}

/* ОСНОВНАЯ ЛОГИКА */
function processQuestion(current, startTime){
  if(current === -1){ 
    showStart(); 
    currentQuestionIndex = -1;
    currentStartTime = null;
    return; 
  }
  if(current === -999){ 
    showWaiting(); 
    currentQuestionIndex = -1;
    currentStartTime = null;
    return; 
  }
  if(!questions[current]) return;
  
  currentQuestionIndex = current;
  currentStartTime = startTime;
  
  var elapsed = (Date.now() - startTime) / 1000;
  var remaining = 6 - elapsed;
  
  /* если таймер уже истёк */
  if(remaining <= 0){
    showWaiting();
    return;
  }
  
  /* проверяем голосование */
  var hasVoted = checkUserVoted(current);
  
  if(hasVoted){
    showAlreadyVoted();
    startGlobalTimerCheck(current, startTime);
    return;
  }
  
  /* НЕ ГОЛОСОВАЛ — показываем вопрос */
  votedMessage.style.display = "none";
  showGame();
  
  var q = questions[current];
  title.innerText = q.text;
  options.innerHTML = "";
  
  for(var i=0;i<q.options.length;i++){
    (function(idx){
      var li = document.createElement('li');
      li.innerText = q.options[idx];
      li.onclick = function(){
        if(currentQuestionIndex !== current) return;
        
        stopAllTimers();
        
        db.ref('votes/'+current+'/'+idx).transaction(v=>(v||0)+1);
        li.classList.add('selected');
        markUserVoted(current);
        votedMessage.style.display = "block";
        
        setTimeout(showWaiting, 800);
      };
      options.appendChild(li);
    })(i);
  }
  
  startTimer(startTime, current);
  startGlobalTimerCheck(current, startTime);
}

/* ПЕРВИЧНАЯ ЗАГРУЗКА */
db.ref('currentQuestion').once('value', function(snap){
  var data = snap.val();
  if(data && data.index !== undefined){
    processQuestion(data.index, data.startTime);
  }
  isInitialLoad = false;
});

/* СЛУШАЕМ ИЗМЕНЕНИЯ */
db.ref('currentQuestion').on('value', function(snap){
  var data = snap.val();
  if(!data || data.index===undefined) return;
  
  if(isInitialLoad) return;
  
  stopAllTimers();
  processQuestion(data.index, data.startTime);
});

/* СБРОС */
db.ref('resetFlag').on('value', function(snap){
  if(snap.val()){
    var keysToRemove = [];
    for(var i=0;i<localStorage.length;i++){
      var key = localStorage.key(i);
      if(key && key.startsWith('voted_')){
        keysToRemove.push(key);
      }
    }
    for(var j=0;j<keysToRemove.length;j++){
      localStorage.removeItem(keysToRemove[j]);
    }
    stopAllTimers();
    currentQuestionIndex = -1;
    currentStartTime = null;
    
    db.ref('currentQuestion').once('value', function(snap){
      var data = snap.val();
      if(data && data.index !== undefined){
        processQuestion(data.index, data.startTime);
      }
    });
  }
});
</script>

</body>
</html>
