<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шоу</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>
html, body { height:100%; margin:0; }

body {
  font-family:'Montserrat',sans-serif;
  background:#111;
  color:white;
}

.screen {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

#start { background:#000; z-index:10; }

#start img {
  max-width:80%;
  border-radius:20px;
  margin-bottom:30px;
}

#waiting { display:none; font-size:6vw; font-weight:900; }
#game { display:none; height:100%; flex-direction:column; }

h1 { font-size:5vw; margin:10px; }

#timerBarWrap {
  width:90%;
  height:70px;
  background:#222;
  border-radius:40px;
  overflow:hidden;
  margin:40px auto;
}

#timerBar {
  height:100%;
  width:100%;
  background:hsl(120,100%,50%);
}

ul {
  flex:1;
  display:flex;
  flex-direction:column;
  margin:10px;
  padding:0;
}

li {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:7vw;
  font-weight:900;
  margin:8px 0;
  background:#333;
  border-radius:20px;
  border:6px solid #888;
  cursor:pointer;
}

li.selected {
  border:8px solid #00e676;
  background:#2e7d32;
}
</style>
</head>

<body>

<div id="start" class="screen">
  <img src="start.jpg">
  <div style="font-size:5vw;font-weight:900;">
    Скоро начнём!
  </div>
</div>

<div id="waiting" class="screen">Смотрите на сцену!</div>

<div id="game">
  <h1 id="title"></h1>

  <div id="timerBarWrap">
    <div id="timerBar"></div>
  </div>

  <ul id="options"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
var CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

var db = firebase.database();

var questions = [];
var timerInterval = null;
var voted = false;

var startScreen = document.getElementById("start");
var waiting = document.getElementById("waiting");
var game = document.getElementById("game");

var title = document.getElementById("title");
var options = document.getElementById("options");
var timerBar = document.getElementById("timerBar");

/* загрузка CSV */
fetch(CSV_URL)
.then(function(r){ return r.text(); })
.then(function(text){

  var rows = text.trim().split('\n');
  var parsed = [];

  for(var i=0;i<rows.length;i++){
    parsed.push(rows[i].split(','));
  }

  for(var i=1;i<parsed.length;i++){
    var cols = parsed[i];

    var q = {
      text:(cols[0] || "").trim(),
      options:[]
    };

    for(var j=1;j<cols.length;j++){
      var val = (cols[j] || "").trim();
      if(val) q.options.push(val);
    }

    questions.push(q);
  }
});

/* экраны */
function showStart(){
  startScreen.style.display="flex";
  waiting.style.display="none";
  game.style.display="none";
}

function showWaiting(){
  startScreen.style.display="none";
  waiting.style.display="flex";
  game.style.display="none";
}

function showGame(){
  startScreen.style.display="none";
  waiting.style.display="none";
  game.style.display="flex";
}

/* Firebase */
db.ref('currentQuestion').on('value', function(snap){

  var current = snap.val();

  if(current === -1){
    showStart();
    return;
  }

  if(current === -999){
    showWaiting();
    return;
  }

  if(!questions[current]) return;

  showGame();

  voted = false;
  clearInterval(timerInterval);

  var q = questions[current];

  title.innerText = q.text;
  options.innerHTML = "";

  for(var i=0;i<q.options.length;i++){

    (function(i){

      var li = document.createElement('li');
      li.innerText = q.options[i];

      li.onclick = function(){

        if(voted) return;

        voted = true;
        clearInterval(timerInterval);

        db.ref('votes/'+current+'/'+i)
          .transaction(function(v){ return (v||0)+1; });

        li.classList.add('selected');

        setTimeout(showWaiting, 800);
      };

      options.appendChild(li);

    })(i);
  }

  /* ПЛАВНЫЙ ТАЙМЕР */

  timerBar.style.transition = "none";
  timerBar.style.width = "100%";
  timerBar.style.background = "hsl(120,100%,50%)";

  timerBar.offsetHeight;

  timerBar.style.transition = "width 5s linear, background 5s linear";

  setTimeout(function(){
    timerBar.style.width = "0%";
    timerBar.style.background = "hsl(0,100%,50%)";
  },50);

});
</script>

</body>
</html>
