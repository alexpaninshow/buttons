<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шоу</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>
html, body { height:100%; margin:0; }
body { font-family:'Montserrat',sans-serif; background:#111; color:white; }

.screen {
  position:fixed; width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; text-align:center;
}

#start { background:#000; }
#waiting { display:none; font-size:6vw; font-weight:900; }
#game { display:none; height:100%; flex-direction:column; }

h1 { font-size:5vw; }

#timerBarWrap {
  width:90%; height:60px; background:#222;
  border-radius:30px; overflow:hidden; margin:20px auto;
}

#timerBar { height:100%; width:100%; background:hsl(120,100%,50%); }

ul { flex:1; display:flex; flex-direction:column; padding:0; margin:10px; }

li {
  flex:1; display:flex; align-items:center; justify-content:center;
  font-size:6vw; margin:6px 0; background:#333;
  border-radius:15px; border:4px solid #888;
}
</style>
</head>

<body>

<div id="start" class="screen">
  <div style="font-size:5vw;font-weight:900;">Скоро начнём!</div>
</div>

<div id="waiting" class="screen">Смотрите на сцену!</div>

<div id="game">
  <h1 id="title"></h1>
  <div id="timerBarWrap"><div id="timerBar"></div></div>
  <ul id="options"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

var db = firebase.database();

/* USER ID */
var userId = localStorage.getItem("uid");
if(!userId){
  userId = "u"+Math.random().toString(36).substr(2,9);
  localStorage.setItem("uid", userId);
}

/* состояния */
function setState(s){
  db.ref("users/"+userId).set({state:s,t:Date.now()});
}

/* анти повтор */
var answered = JSON.parse(localStorage.getItem("ans")||"{}");
function save(){ localStorage.setItem("ans",JSON.stringify(answered)); }

var questions=[];

fetch("https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0")
.then(r=>r.text())
.then(t=>{
  var rows=t.trim().split('\n');
  for(var i=1;i<rows.length;i++){
    var c=rows[i].split(',');
    var q={text:c[0],options:[]};
    for(var j=1;j<c.length;j++) if(c[j]) q.options.push(c[j]);
    questions.push(q);
  }
});

var start=document.getElementById("start");
var waiting=document.getElementById("waiting");
var game=document.getElementById("game");
var title=document.getElementById("title");
var options=document.getElementById("options");
var bar=document.getElementById("timerBar");

function showStart(){start.style.display="flex";waiting.style.display="none";game.style.display="none";setState("start");}
function showWaiting(){start.style.display="none";waiting.style.display="flex";game.style.display="none";setState("waiting");}
function showGame(){start.style.display="none";waiting.style.display="none";game.style.display="flex";setState("question");}

db.ref("currentQuestion").on("value",function(snap){

  var d=snap.val();
  if(!d) return;

  var i=d.index;
  var st=d.startTime;

  if(i===-1){showStart();return;}
  if(i===-999){showWaiting();return;}
  if(!questions[i]) return;

  showGame();

  title.innerText=questions[i].text;
  options.innerHTML="";

  for(let k=0;k<questions[i].options.length;k++){
    var li=document.createElement("li");
    li.innerText=questions[i].options[k];

    if(answered[i]){
      li.style.opacity=0.5;
      li.onclick=function(){alert("Вы уже ответили");};
    } else {
      li.onclick=function(){
        answered[i]=true; save();
        db.ref("votes/"+i+"/"+k).transaction(v=>(v||0)+1);
        showWaiting();
      };
    }

    options.appendChild(li);
  }

  var total=5000;
  var passed=Date.now()-st;
  if(passed<0)passed=0;
  if(passed>total)passed=total;

  var remain=total-passed;
  bar.style.transition="none";
  bar.style.width=(remain/total*100)+"%";
  bar.offsetHeight;
  bar.style.transition="width "+remain+"ms linear";
  setTimeout(function(){bar.style.width="0%";},50);
});
</script>
</body>
</html>
