<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Шоу</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
html,body{height:100%;margin:0;overflow:hidden;position:fixed;width:100%}
body{font-family:'Montserrat',sans-serif;background:#111;color:#fff}

.screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:20px;overflow-y:auto}

#start{background:#000;z-index:10}
#start img{max-width:90%;border-radius:20px;margin-bottom:30px}

#waiting{display:none;font-size:clamp(24px,8vw,48px);font-weight:900}
#game{display:none;height:100%;flex-direction:column;justify-content:space-between;padding:20px}
#alreadyVoted{display:none;font-size:clamp(24px,7vw,44px);font-weight:900;color:#ff9800}

h1{font-size:clamp(20px,6vw,40px);margin:10px 0}

#timerBarWrap{width:100%;max-width:600px;height:70px;background:#222;border-radius:40px;overflow:hidden;margin:20px auto}
#timerBar{height:100%;width:100%;transition:width 0.05s linear}

ul{flex:1;display:flex;flex-direction:column;gap:12px;margin:0;padding:0}
li{display:flex;align-items:center;justify-content:center;font-size:clamp(18px,6vw,36px);font-weight:900;padding:20px;background:#333;border-radius:20px;border:4px solid #888;cursor:pointer}
li.selected{border-color:#00e676;background:#2e7d32}

#votedMessage{font-size:clamp(18px,5vw,32px);margin:20px auto;color:#00e676}

#finalScreen{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:#111;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

#finalScreen div{
  font-size:clamp(16px,4.5vw,24px);
  line-height:1.4;
}
</style>
</head>

<body>

<div id="start" class="screen">
  <img src="start.jpg">
  <div>Скоро начнём!</div>
</div>

<div id="waiting" class="screen">Смотрите на сцену!</div>

<div id="alreadyVoted" class="screen">✓ Вы уже проголосовали</div>

<div id="game">
  <h1 id="title"></h1>
  <div id="timerBarWrap"><div id="timerBar"></div></div>
  <div id="votedMessage" style="display:none;">✓ Ваш голос учтён!</div>
  <ul id="options"></ul>
</div>

<div id="finalScreen">
  <a href="https://www.instagram.com/" target="_blank">
    <div>
      Спасибо за внимание!<br>
      Будем благодарны за отзыв.
    </div>
  </a>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({ databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com" });
const db = firebase.database();

let questions = [];
let currentIdx = -1;
let isFinalActive = false;

const startScreen = document.getElementById('start');
const waitingScreen = document.getElementById('waiting');
const gameScreen = document.getElementById('game');
const alreadyScreen = document.getElementById('alreadyVoted');
const finalScreen = document.getElementById('finalScreen');

function showStart(){
  if(isFinalActive) return;
  startScreen.style.display='flex';
  waitingScreen.style.display='none';
  gameScreen.style.display='none';
  alreadyScreen.style.display='none';
  finalScreen.style.display='none';
}

function showWaiting(){
  if(isFinalActive) return;
  startScreen.style.display='none';
  waitingScreen.style.display='flex';
  gameScreen.style.display='none';
  alreadyScreen.style.display='none';
  finalScreen.style.display='none';
}

function showFinal(){
  isFinalActive = true;
  startScreen.style.display='none';
  waitingScreen.style.display='none';
  gameScreen.style.display='none';
  alreadyScreen.style.display='none';
  finalScreen.style.display='flex';
}

/* загрузка вопросов */
fetch("https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0")
.then(r=>r.text())
.then(text=>{
  const rows = text.split('\n');
  for(let i=1;i<rows.length;i++){
    const cols = rows[i].split(',');
    if(cols[0]) questions.push(cols);
  }
});

/* состояние вопроса */
db.ref('currentQuestion').on('value', snap=>{
  if(isFinalActive) return;
  const d = snap.val();
  if(!d) return;

  if(d.index === -1) showStart();
  else showWaiting();
});

/* ФИНАЛ */
db.ref('showInstagram').on('value', snap=>{
  if(snap.val()){
    showFinal();
  }
});

/* фикс обновления */
db.ref('showInstagram').once('value', snap=>{
  if(snap.val()){
    showFinal();
  }
});
</script>

</body>
</html>
