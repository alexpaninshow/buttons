<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шоу</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

<style>
html, body {
  height:100%;
  margin:0;
  padding:0;
}

body {
  font-family: 'Montserrat', sans-serif;
  background:#111;
  color:white;
  overflow:hidden;
}

/* экран ожидания */
#waitingScreen {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:6vw;
  font-weight:900;
  text-align:center;

  background:#111;
  z-index:10;
}

/* основной контент */
#game {
  height:100%;
  display:flex;
  flex-direction:column;
}

/* заголовок */
h1 {
  text-align:center;
  font-size:5vw;
  margin:15px;
}

/* таймер */
#timer {
  text-align:center;
  font-size:8vw;
  font-weight:900;
  margin:10px 0 20px 0;
}

/* кнопки */
ul {
  flex:1;
  display:flex;
  flex-direction:column;
  margin:0 10px 10px 10px;
  padding:0;
}

li {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;

  font-size:7vw;
  font-weight:900;
  text-align:center;

  margin:8px 0;

  background:#333;
  border-radius:20px;
  border:4px solid #777;

  cursor:pointer;
  transition: all 0.2s ease;
}

li:hover { background:#444; }
li:active { transform: scale(0.97); }

li.selected {
  background:#2e7d32;
  border:6px solid #00e676;
}
</style>
</head>

<body>

<!-- 🔥 экран ожидания -->
<div id="waitingScreen">Смотрите на сцену!</div>

<!-- игра -->
<div id="game" style="display:none;">
  <h1 id="title"></h1>
  <div id="timer"></div>
  <ul id="options"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv";

const firebaseConfig = {
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let questions=[];
let timerId=null;
let voted=false;
let time=0;

const waiting = document.getElementById("waitingScreen");
const game = document.getElementById("game");

const title = document.getElementById("title");
const options = document.getElementById("options");
const timer = document.getElementById("timer");

function parseCSV(text){
  const rows = text.trim().split('\n').map(r=>r.split(','));
  return rows.slice(1).map(cols=>({
    text:(cols[0]||"").trim(),
    options:cols.slice(1).map(c=>c.trim()).filter(Boolean)
  }));
}

fetch(CSV_URL)
.then(r=>r.text())
.then(text=>{
  questions=parseCSV(text);
});

// показать экран ожидания
function showWaiting(){
  waiting.style.display="flex";
  game.style.display="none";
}

// показать вопрос
function showGame(){
  waiting.style.display="none";
  game.style.display="flex";
}

db.ref('currentQuestion').on('value', snap => {
  const current = snap.val();

  clearInterval(timerId);
  voted=false;

  if(current===-1 || current===null){
    showWaiting();
    return;
  }

  const q = questions[current];

  showGame();

  title.innerText=q.text;
  options.innerHTML="";

  q.options.forEach((opt,i)=>{
    const li=document.createElement('li');
    li.innerText=opt;

    li.onclick=()=>{
      if(voted || time<=0) return;

      voted=true;

      db.ref('votes/'+current+'/'+i)
        .transaction(v=>(v||0)+1);

      li.classList.add('selected');

      clearInterval(timerId);
      timer.innerText="";

      setTimeout(()=>{
        showWaiting();
      },800);
    };

    options.appendChild(li);
  });

  time=5;
  timer.innerText="⏳ " + time;

  timerId=setInterval(()=>{
    time--;
    if(time<=0){
      clearInterval(timerId);
      timer.innerText="";
      showWaiting();
    } else {
      timer.innerText="⏳ " + time;
    }
  },1000);
});
</script>

</body>
</html>
