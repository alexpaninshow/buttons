<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
body { font-family: Arial; text-align: center; background:#222; color:white; padding:40px; }
#status { font-size:26px; margin-bottom:20px; }

button {
  font-size:20px;
  padding:15px 25px;
  margin:10px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

.next { background:#4caf50; color:white; font-style:italic; }
.back { background:orange; color:white; }
.reset { background:red; color:white; }
</style>
</head>

<body>

<h1>Оператор</h1>
<div id="status">Сейчас: Ожидание</div>

<button id="nextBtn" class="next">Загрузка...</button>
<button id="backBtn" class="back" style="display:none;">Назад</button>
<button id="resetBtn" class="reset">Сбросить игру</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv";

const firebaseConfig = {
  databaseURL: "https://buttons-panin-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let questions = [];
let current = -1;
let lastQuestionIndex = -1;
let autoTimer = null;

const status = document.getElementById("status");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");

function parseCSV(text){
  const rows = text.replace(/\r/g,'').split('\n').filter(r=>r.trim());
  return rows.slice(1).map(row=>{
    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g)||[];
    return {
      text:(cols[0]||"").replace(/"/g,'').trim(),
      options:[cols[1],cols[2],cols[3]]
        .map(c=>(c||"").replace(/"/g,'').trim())
        .filter(Boolean)
    };
  });
}

fetch(CSV_URL)
.then(r=>r.text())
.then(text=>{
  questions=parseCSV(text);
  nextBtn.innerText="Начать игру";
  updateButtons();
});

function showQuestion(i){
  if(autoTimer) clearTimeout(autoTimer);

  current = i;
  lastQuestionIndex = i;

  db.ref('currentQuestion').set(i);

  status.innerText = "Сейчас: " + questions[i].text;
  updateButtons();

  // 🔥 ОПЕРАТОР ЖДЁТ 5 СЕК
  autoTimer = setTimeout(()=>{
    current = -1;
    db.ref('currentQuestion').set(-1);

    status.innerText = "Сейчас: Ожидание";
    updateButtons();
  }, 5000);
}

nextBtn.onclick = ()=>{
  let nextIndex = current === -1 ? lastQuestionIndex + 1 : current + 1;

  if(nextIndex < questions.length){
    showQuestion(nextIndex);
  }
};

backBtn.onclick = ()=>{
  if(current>0){
    showQuestion(current-1);
  }
};

document.getElementById("resetBtn").onclick = ()=>{
  if(autoTimer) clearTimeout(autoTimer);

  current=-1;
  lastQuestionIndex=-1;

  db.ref('currentQuestion').set(-1);

  status.innerText="Сейчас: Ожидание";
  updateButtons();
};

function updateButtons(){
  if(!questions.length) return;

  let nextIndex = current === -1 ? lastQuestionIndex + 1 : current + 1;

  if(nextIndex < questions.length){
    nextBtn.innerText="Вопрос "+(nextIndex+1)+": "+questions[nextIndex].text;
    nextBtn.style.display="inline-block";
  } else {
    nextBtn.style.display="none";
  }

  backBtn.style.display = (current > 0) ? "inline-block" : "none";
}
</script>

</body>
</html>
