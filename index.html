<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шоу</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>
html, body { height:100%; margin:0; }

body {
  font-family:'Montserrat',sans-serif;
  background:#111;
  color:white;
}

.screen {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

#start { background:#000; z-index:10; }

#start img {
  max-width:80%;
  border-radius:20px;
  margin-bottom:30px;
}

#waiting { display:none; font-size:6vw; font-weight:900; }
#game { display:none; height:100%; flex-direction:column; }
#alreadyVoted { display:none; font-size:6vw; font-weight:900; color:#ff9800; }

h1 { font-size:5vw; margin:10px; }

#timerBarWrap {
  width:90%;
  height:70px;
  background:#222;
  border-radius:40px;
  overflow:hidden;
  margin:40px auto;
}

#timerBar {
  height:100%;
  width:100%;
  background-color: #00e676;
  transition: width 0.05s linear, background-color 0.05s linear;
}

ul {
  flex:1;
  display:flex;
  flex-direction:column;
  margin:10px;
  padding:0;
}

li {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:7vw;
  font-weight:900;
  margin:8px 0;
  background:#333;
  border-radius:20px;
  border:6px solid #888;
  cursor:pointer;
  transition: all 0.2s;
}

li.selected {
  border:8px solid #00e676;
  background:#2e7d32;
}

li.disabled-option {
  cursor:not-allowed;
  opacity:0.5;
}

#votedMessage {
  font-size:5vw;
  margin:20px auto 10px auto;
  color:#00e676;
  font-weight:bold;
  background: rgba(0,230,118,0.15);
  padding: 15px 25px;
  border-radius: 50px;
  display: inline-block;
  text-align: center;
}
</style>
</head>

<body>

<div id="start" class="screen">
  <img src="start.jpg">
  <div style="font-size:5vw;font-weight:900;">
    Скоро начнём!
  </div>
</div>

<div id="waiting" class="screen">Смотрите на сцену!</div>
<div id="alreadyVoted" class="screen">✓ Вы уже проголосовали</div>
<div id="game">
  <h1 id="title"></h1>

  <div id="timerBarWrap">
    <div id="timerBar"></div>
  </div>

  <div id="votedMessage" style="display:none;">✓ Ваш голос учтён!</div>
  <ul id="options"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
var CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

var db = firebase.database();
var userId = localStorage.getItem('voterId');
if(!userId){
  userId = 'voter_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  localStorage.setItem('voterId', userId);
}

var questions = [];
var timerInterval = null;
var votedInCurrentQuestion = false;
var currentQuestionIndex = -1;
var timerEnded = false;

var startScreen = document.getElementById("start");
var waiting = document.getElementById("waiting");
var game = document.getElementById("game");
var alreadyVoted = document.getElementById("alreadyVoted");

var title = document.getElementById("title");
var options = document.getElementById("options");
var timerBar = document.getElementById("timerBar");
var votedMessage = document.getElementById("votedMessage");

/* загрузка CSV */
fetch(CSV_URL)
.then(function(r){ return r.text(); })
.then(function(text){
  var rows = text.trim().split('\n');
  var parsed = [];

  for(var i=0;i<rows.length;i++){
    parsed.push(rows[i].split(','));
  }

  for(var i=1;i<parsed.length;i++){
    var cols = parsed[i];
    var q = {
      text:(cols[0] || "").trim(),
      options:[]
    };

    for(var j=1;j<cols.length;j++){
      var val = (cols[j] || "").trim();
      if(val) q.options.push(val);
    }

    if(q.text && q.options.length > 0){
      questions.push(q);
    }
  }
});

/* экраны */
function showStart(){
  startScreen.style.display="flex";
  waiting.style.display="none";
  game.style.display="none";
  alreadyVoted.style.display="none";
}

function showWaiting(){
  console.log("showWaiting вызван");
  startScreen.style.display="none";
  waiting.style.display="flex";
  game.style.display="none";
  alreadyVoted.style.display="none";
}

function showGame(){
  startScreen.style.display="none";
  waiting.style.display="none";
  game.style.display="flex";
  alreadyVoted.style.display="none";
}

function showAlreadyVoted(){
  startScreen.style.display="none";
  waiting.style.display="none";
  game.style.display="none";
  alreadyVoted.style.display="flex";
}

/* проверка, голосовал ли пользователь за этот конкретный вопрос */
function checkUserVotedForQuestion(questionIndex){
  var votedKey = 'voted_' + questionIndex;
  return localStorage.getItem(votedKey) === 'true';
}

function markUserVotedForQuestion(questionIndex){
  var votedKey = 'voted_' + questionIndex;
  localStorage.setItem(votedKey, 'true');
}

/* запуск синхронизированного таймера — 6 секунд */
function startSyncedTimer(startTime){
  if(timerInterval) clearInterval(timerInterval);
  timerEnded = false;
  
  function updateTimer(){
    var elapsed = (Date.now() - startTime) / 1000;
    var remaining = Math.max(0, 6 - elapsed);
    var percent = (remaining / 6) * 100;
    
    timerBar.style.width = percent + "%";
    
    if(remaining > 4){
      timerBar.style.backgroundColor = "#00e676";
    } else if(remaining > 2){
      timerBar.style.backgroundColor = "#ffeb3b";
    } else {
      timerBar.style.backgroundColor = "#ff5722";
    }
    
    if(remaining <= 0 && !timerEnded){
      timerEnded = true;
      if(timerInterval) clearInterval(timerInterval);
      timerInterval = null;
      timerBar.style.width = "0%";
      timerBar.style.backgroundColor = "#ff5722";
      
      /* ПРИНУДИТЕЛЬНО ПОКАЗЫВАЕМ ЭКРАН ОЖИДАНИЯ */
      console.log("Таймер закончился, вызываем showWaiting()");
      showWaiting();
    }
  }
  
  updateTimer();
  timerInterval = setInterval(updateTimer, 100);
}

/* Firebase */
db.ref('currentQuestion').on('value', function(snap){
  var data = snap.val();
  
  if(!data || data.index === undefined){
    return;
  }
  
  var current = data.index;
  
  if(current === -1){
    showStart();
    return;
  }
  
  if(current === -999){
    showWaiting();
    return;
  }
  
  if(!questions[current]) return;
  
  /* проверяем, голосовал ли пользователь за ЭТОТ вопрос */
  var hasVoted = checkUserVotedForQuestion(current);
  
  if(hasVoted){
    showAlreadyVoted();
    return;
  }
  
  /* если не голосовал — показываем вопрос */
  currentQuestionIndex = current;
  votedInCurrentQuestion = false;
  votedMessage.style.display = "none";
  timerEnded = false;
  
  showGame();
  
  if(timerInterval) clearInterval(timerInterval);
  
  var q = questions[current];
  title.innerText = q.text;
  options.innerHTML = "";
  
  for(var i=0;i<q.options.length;i++){
    (function(optIndex){
      var li = document.createElement('li');
      li.innerText = q.options[optIndex];
      
      li.onclick = function(){
        if(votedInCurrentQuestion) return;
        if(timerEnded) return;
        
        votedInCurrentQuestion = true;
        if(timerInterval) clearInterval(timerInterval);
        
        db.ref('votes/'+current+'/'+optIndex)
          .transaction(function(v){ return (v||0)+1; });
        
        li.classList.add('selected');
        markUserVotedForQuestion(current);
        
        votedMessage.style.display = "block";
        
        setTimeout(function(){
          showWaiting();
        }, 800);
      };
      
      options.appendChild(li);
    })(i);
  }
  
  if(data.startTime){
    startSyncedTimer(data.startTime);
  }
});

/* слушаем сброс игры — очищаем localStorage зрителя */
db.ref('resetFlag').on('value', function(snap){
  if(snap.val()){
    for(var i = 0; i < localStorage.length; i++){
      var key = localStorage.key(i);
      if(key && key.startsWith('voted_')){
        localStorage.removeItem(key);
      }
    }
    votedInCurrentQuestion = false;
    currentQuestionIndex = -1;
    timerEnded = false;
  }
});
</script>

</body>
</html>
