<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Шоу</title>

<style>
/* твои стили без изменений */
</style>
</head>
<body>

<!-- твоя разметка без изменений -->

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({ databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com" });
const db = firebase.database();

let questions = [];
let timerInterval = null, globalCheck = null;
let currentIdx = -1, currentStart = null;

/* ✅ ДОБАВИЛ */
let isFinalActive = false;

function showStart(){
  if(isFinalActive) return;
  startScreen.style.display='flex';
  waitingScreen.style.display='none';
  gameScreen.style.display='none';
  alreadyScreen.style.display='none';
  finalScreen.style.display='none';
}

function showWaiting(){
  if(isFinalActive) return;
  startScreen.style.display='none';
  waitingScreen.style.display='flex';
  gameScreen.style.display='none';
  alreadyScreen.style.display='none';
  finalScreen.style.display='none';
}

function showGame(){
  if(isFinalActive) return;
  startScreen.style.display='none';
  waitingScreen.style.display='none';
  gameScreen.style.display='flex';
  alreadyScreen.style.display='none';
  finalScreen.style.display='none';
}

function showAlready(){
  if(isFinalActive) return;
  startScreen.style.display='none';
  waitingScreen.style.display='none';
  gameScreen.style.display='none';
  alreadyScreen.style.display='flex';
  finalScreen.style.display='none';
}

/* ✅ ПЕРЕПИСАНО */
function showFinal(){
  isFinalActive = true;

  startScreen.style.display='none';
  waitingScreen.style.display='none';
  gameScreen.style.display='none';
  alreadyScreen.style.display='none';
  finalScreen.style.display='flex';
}

/* остальной код без изменений */

function subscribe(){
  db.ref('currentQuestion').once('value', snap => {
    const d = snap.val();
    if(d && d.index!==undefined) applyState(d.index, d.startTime);
  });

  db.ref('currentQuestion').on('value', snap => {
    const d = snap.val();
    if(d && d.index!==undefined){
      stopTimers();
      applyState(d.index, d.startTime);
    }
  });
}

/* загрузка вопросов */
fetch(CSV_URL).then(r=>r.text()).then(text=>{
  const rows = text.trim().split('\n');
  for(let i=1;i<rows.length;i++){
    const cols = rows[i].split(',');
    if(!cols[0]||cols[0].trim()==='') continue;
    const q = { text:cols[0].trim(), options:[] };
    for(let j=1;j<cols.length;j++){
      const val = cols[j].trim();
      if(val) q.options.push(val);
    }
    if(q.text && q.options.length) questions.push(q);
  }

  subscribe();

  /* ✅ ДОБАВИЛ (фикс refresh) */
  db.ref('showInstagram').once('value', snap => {
    if(snap.val()){
      isFinalActive = true;
      showFinal();
    }
  });
});

/* ✅ ИСПРАВЛЕНО */
db.ref('showInstagram').on('value', snap => {
  const val = snap.val();
  if(val){
    isFinalActive = true;
    showFinal();
  }
});
</script>
</body>
</html>
