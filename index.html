<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шоу</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

<style>
html, body { height:100%; margin:0; }

body {
  font-family:'Montserrat',sans-serif;
  background:#111;
  color:white;
}

.screen {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

#waiting {
  display:none;
  font-size:6vw;
  font-weight:900;
}

#game {
  display:none;
  height:100%;
  flex-direction:column;
}

h1 {
  text-align:center;
  font-size:5vw;
  margin:10px;
}

#timer {
  text-align:center;
  font-size:8vw;
  margin-bottom:20px;
}

ul {
  flex:1;
  display:flex;
  flex-direction:column;
  margin:10px;
  padding:0;
}

li {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:7vw;
  font-weight:900;
  margin:8px 0;
  background:#333;
  border-radius:20px;
  border:5px solid #777;
  cursor:pointer;
}

li.selected {
  border:6px solid #00e676;
  background:#2e7d32;
}
</style>
</head>

<body>

<!-- старт -->
<div id="start" class="screen">
  <img id="startImg"
       src="https://drive.google.com/uc?export=view&id=1Z75HN4p5klgCvDHPNyzhb2SeLdln3cUg"
       style="max-width:85%;border-radius:20px;">
  <div style="font-size:5vw;font-weight:900;margin-top:20px;">
    Скоро начнём!
  </div>
</div>

<!-- ожидание -->
<div id="waiting" class="screen">
  Смотрите на сцену!
</div>

<!-- игра -->
<div id="game">
  <h1 id="title"></h1>
  <div id="timer"></div>
  <ul id="options"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});
const db = firebase.database();

let questions=[];
let voted=false;
let timerInterval=null;

const startScreen = document.getElementById("start");
const waiting = document.getElementById("waiting");
const game = document.getElementById("game");

const title = document.getElementById("title");
const options = document.getElementById("options");
const timer = document.getElementById("timer");

function showStart(){
  startScreen.style.display="flex";
  waiting.style.display="none";
  game.style.display="none";
}

function showWaiting(){
  startScreen.style.display="none";
  waiting.style.display="flex";
  game.style.display="none";
}

function showGame(){
  startScreen.style.display="none";
  waiting.style.display="none";
  game.style.display="flex";
}

function parseCSV(text){
  const rows = text.trim().split('\n').map(r=>r.split(','));
  return rows.slice(1).map(cols=>({
    text:(cols[0]||"").trim(),
    options:cols.slice(1).map(c=>c.trim()).filter(Boolean)
  }));
}

fetch(CSV_URL)
.then(r=>r.text())
.then(text=>{
  questions=parseCSV(text);
});

db.ref('currentQuestion').on('value', snap => {
  const current = snap.val();

  clearInterval(timerInterval);
  voted=false;

  if(current === -1){
    showStart();
    return;
  }

  const q = questions[current];

  showGame();

  title.innerText=q.text;
  options.innerHTML="";

  q.options.forEach((opt,i)=>{
    const li=document.createElement('li');
    li.innerText=opt;

    li.onclick=()=>{
      if(voted) return;

      voted=true;

      db.ref('votes/'+current+'/'+i)
        .transaction(v=>(v||0)+1);

      li.classList.add('selected');

      timer.innerText="";
      clearInterval(timerInterval);

      setTimeout(()=>{
        showWaiting();
      },800);
    };

    options.appendChild(li);
  });

  let time=5;
  timer.innerText="⏳ "+time;

  timerInterval=setInterval(()=>{
    time--;
    if(time<=0){
      clearInterval(timerInterval);
      showWaiting();
    } else {
      timer.innerText="⏳ "+time;
    }
  },1000);
});
</script>

</body>
</html>
