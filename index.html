<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Спектакль</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>
html, body { height:100%; margin:0; }

body {
  font-family:'Montserrat',sans-serif;
  background:#111;
  color:white;
}

.screen {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

#start { background:#000; }
#waiting { display:none; font-size:6vw; font-weight:900; }
#game { display:none; height:100%; flex-direction:column; }

h1 { font-size:5vw; margin:10px; }

ul {
  flex:1;
  display:flex;
  flex-direction:column;
  margin:10px;
  padding:0;
}

li {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:6vw;
  font-weight:900;
  margin:8px 0;
  background:#333;
  border-radius:20px;
  border:5px solid #888;
  cursor:pointer;
}

li.selected {
  border:6px solid #00e676;
  background:#2e7d32;
}
</style>
</head>

<body>

<div id="start" class="screen">
  <h1>Скоро начнём!</h1>
</div>

<div id="waiting" class="screen">Смотрите на сцену!</div>

<div id="game">
  <h1 id="title"></h1>
  <ul id="options"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let questions = [];
let ready = false;
let voted = false;

fetch(CSV_URL)
.then(r => r.text())
.then(text => {
  const rows = text.trim().split('\n').map(r => r.split(','));

  questions = rows.slice(1).map(cols => ({
    text:(cols[0]||"").trim(),
    options:cols.slice(1).map(c=>c.trim()).filter(Boolean)
  }));

  ready = true;
});

const start = document.getElementById("start");
const waiting = document.getElementById("waiting");
const game = document.getElementById("game");

const title = document.getElementById("title");
const options = document.getElementById("options");

function show(screen){
  start.style.display="none";
  waiting.style.display="none";
  game.style.display="none";
  screen.style.display="flex";
}

db.ref("game").on("value", snap => {

  const data = snap.val();

  if(!data){
    show(start);
    return;
  }

  const status = data.status || "waiting";
  const current = data.currentQuestion ?? 0;

  if(status === "waiting") return show(start);
  if(status === "pause") return show(waiting);

  if(status === "playing"){

    if(!ready) return;

    const q = questions[current];
    if(!q) return;

    show(game);

    voted = false;

    title.innerText = q.text;
    options.innerHTML = "";

    q.options.forEach((opt,i)=>{
      const li = document.createElement("li");
      li.innerText = opt;

      li.onclick = ()=>{
        if(voted) return;
        voted = true;

        db.ref("votes/"+current+"/"+i)
          .transaction(v => (v||0)+1);

        li.classList.add("selected");
      };

      options.appendChild(li);
    });
  }
});
</script>

</body>
</html>
