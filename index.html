<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шоу</title>

<style>
html,body{margin:0;height:100%;font-family:Arial;background:#111;color:#fff}

.screen{
  position:fixed;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;text-align:center
}

#start img{
  max-width:80%;
  margin-bottom:20px;
}

#waiting{display:none;font-size:6vw}
#game{display:none;width:100%;height:100%;flex-direction:column}

#timerWrap{height:40px;background:#222;margin:20px;border-radius:20px;overflow:hidden}
#bar{height:100%;width:100%;background:hsl(120,100%,50%)}

ul{flex:1;padding:10px}
li{
  margin:8px 0;padding:20px;background:#333;
  border-radius:10px;font-size:5vw
}
.selected{background:#4caf50}
</style>
</head>

<body>

<div id="start" class="screen">
<img src="start.jpg">
<div>Скоро начнём!</div>
</div>

<div id="waiting" class="screen">Смотрите на сцену!</div>

<div id="game">
<h2 id="q"></h2>
<div id="timerWrap"><div id="bar"></div></div>
<ul id="opts"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});
var db=firebase.database();

var uid=localStorage.getItem("uid");
if(!uid){
  uid="u"+Math.random().toString(36).substr(2,9);
  localStorage.setItem("uid",uid);
}

var questions=[],loaded=false;
var answered=JSON.parse(localStorage.getItem("ans")||"{}");

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQVLFjRWrX9DiTY9f32pSs8v0Y3MfxLSFC-G-Gi43Z37Lt75BMj-1J8nQGNzgAQdOsR2_pKUmdxU7G6/pub?gid=0&single=true&output=csv")
.then(r=>r.text())
.then(t=>{
  var rows=t.trim().split('\n');

  for(var i=1;i<rows.length;i++){
    var cols=rows[i].split(',');
    var q={text:cols[0],options:[]};

    for(var j=1;j<cols.length;j++){
      if(cols[j].trim()!=="") q.options.push(cols[j].trim());
    }

    questions.push(q);
  }

  loaded=true;
});

function show(id){
  document.getElementById("start").style.display="none";
  document.getElementById("waiting").style.display="none";
  document.getElementById("game").style.display="none";
  document.getElementById(id).style.display="flex";
}

db.ref("currentQuestion").on("value",s=>{

  var d=s.val();
  if(!d || !loaded) return;

  var i=d.index;

  if(i===-1){ show("start"); return; }
  if(i===-999){ show("waiting"); return; }

  if(!questions[i]) return;

  show("game");

  var q=questions[i];
  var opts=document.getElementById("opts");
  opts.innerHTML="";

  var selected=answered[i];

  for(let k=0;k<q.options.length;k++){

    var li=document.createElement("li");
    li.innerText=q.options[k];

    if(selected!==undefined && selected===k){
      li.classList.add("selected");
      li.style.opacity=0.6;
    }

    if(selected===undefined){
      li.onclick=function(){

        answered[i]=k;
        localStorage.setItem("ans",JSON.stringify(answered));

        db.ref("votes/"+i+"/"+k).transaction(v=>(v||0)+1);

        li.classList.add("selected");

        setTimeout(()=>show("waiting"),300);
      };
    }

    opts.appendChild(li);
  }

  document.getElementById("q").innerText=q.text;

  var total=5000;
  var passed=Date.now()-d.startTime;

  if(passed<0)passed=0;
  if(passed>total)passed=total;

  var remain=total-passed;
  var bar=document.getElementById("bar");

  bar.style.transition="none";
  bar.style.width=(remain/total*100)+"%";
  bar.offsetHeight;
  bar.style.transition="width "+remain+"ms linear";
  setTimeout(()=>bar.style.width="0%",50);
});
</script>

</body>
</html>
