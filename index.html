<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Голосование зрителей</title>
<style>
body { font-family:'Segoe UI',sans-serif; text-align:center; padding:40px; background:linear-gradient(120deg,#1f1c2c,#928dab); color:white; }
h1 { font-size:32px; margin-bottom:30px; }
button { font-size:22px; margin:15px; padding:20px 40px; border-radius:12px; border:none; background:#ff6b6b; color:white; display:none; }
#timer { font-size:22px; margin-top:20px; color:#ffeb3b; }
</style>
</head>
<body>

<h1 id="question">Шоу господина Панина</h1>
<button id="b1"></button>
<button id="b2"></button>
<button id="b3"></button>
<div id="timer"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCnYKEXEd207E9LXgCBupqc3kjbEbk1NTc",
  authDomain: "buttons-show.firebaseapp.com",
  databaseURL: "https://buttons-panin-default-rtdb.firebaseio.com",
  projectId: "buttons-show",
  storageBucket: "buttons-show.appspot.com",
  messagingSenderId: "145808897789",
  appId: "1:145808897789:web:900445fca031ece7e53094"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const questions = [
  { text:"Кого поцелует герой?", options:["Девушку","Себя","Кого-то из зрителей"] },
  { text:"Какой жанр хотите?", options:["Комедия","Трагедия","Фарс"] },
  { text:"Вам понравился наш спектакль?", options:["Да","Нет",""] }
];

const q = document.getElementById("question");
const b1 = document.getElementById("b1");
const b2 = document.getElementById("b2");
const b3 = document.getElementById("b3");
const timerDiv = document.getElementById("timer");

const refQuestion = db.ref('currentQuestion');
const refTimer = db.ref('timerSeconds');

refQuestion.on('value', s => {
  const current = s.val();

  if(current === -1 || current === null){
    q.innerText = "Шоу господина Панина";
    b1.style.display=b2.style.display=b3.style.display="none";
    return;
  }

  if(current >= questions.length){
    q.innerText = "Конец голосования";
    b1.style.display=b2.style.display=b3.style.display="none";
    return;
  }

  const data = questions[current];
  q.innerText = data.text;

  b1.innerText = data.options[0];
  b2.innerText = data.options[1];

  if(data.options[2]){
    b3.innerText = data.options[2];
    b3.style.display="inline-block";
  } else {
    b3.style.display="none";
  }

  b1.style.display=b2.style.display="inline-block";
});

// Таймер для зрителей
refTimer.on('value', s=>{
  let sec = s.val();
  if(sec > 0){
    timerDiv.style.display = "block";
    timerDiv.innerText = "Осталось секунд: " + sec;
  } else {
    timerDiv.innerText = "";
  }
});
</script>
</body>
</html>
