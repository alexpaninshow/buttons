<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шоу</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>
html, body { height:100%; margin:0; }
body {
  font-family:'Montserrat',sans-serif;
  background:#111;
  color:white;
}

.screen {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

#start { background:#000; }
#waiting { display:none; font-size:6vw; font-weight:900; }
#game { display:none; height:100%; flex-direction:column; }

h1 { font-size:5vw; }

#timerBarWrap {
  width:90%;
  height:70px;
  background:#222;
  border-radius:40px;
  overflow:hidden;
}

#timerBar {
  height:100%;
  width:100%;
  background:hsl(120,100%,50%);
}

ul {
  flex:1;
  display:flex;
  flex-direction:column;
  padding:0;
}

li {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:7vw;
  background:#333;
  margin:8px;
  border-radius:20px;
  border:6px solid #888;
}

li.selected {
  border:8px solid #00e676;
  background:#2e7d32;
}
</style>
</head>

<body>

<div id="start" class="screen">
  <img src="start.jpg" style="max-width:80%; border-radius:20px;">
  <div style="font-size:5vw;font-weight:900;">Скоро начнём!</div>
</div>

<div id="waiting" class="screen">Смотрите на сцену!</div>

<div id="game">
  <h1 id="title"></h1>
  <div id="timerBarWrap"><div id="timerBar"></div></div>
  <ul id="options"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let questions = [];
let ready = false;
let timerInterval = null;
let voted = false;

const startScreen = document.getElementById("start");
const waiting = document.getElementById("waiting");
const game = document.getElementById("game");

const title = document.getElementById("title");
const options = document.getElementById("options");
const timerBar = document.getElementById("timerBar");

/* CSV */
fetch(CSV_URL)
.then(r=>r.text())
.then(text=>{
  const rows=text.trim().split('\n').map(r=>r.split(','));
  questions = rows.slice(1).map(c=>({
    text:c[0],
    options:c.slice(1).filter(Boolean)
  }));
  ready = true;
});

/* экраны */
function showStart(){ startScreen.style.display="flex"; waiting.style.display="none"; game.style.display="none"; }
function showWaiting(){ startScreen.style.display="none"; waiting.style.display="flex"; game.style.display="none"; }
function showGame(){ startScreen.style.display="none"; waiting.style.display="none"; game.style.display="flex"; }

/* 🔥 100% синхра */
db.ref('currentQuestion').on('value', snap => {

  const data = snap.val();
  if(!data) return;

  const current = data.state;

  if(current === -1){ showStart(); return; }
  if(current === -999){ showWaiting(); return; }

  if(!ready || !questions[current]) return;

  showGame();

  voted=false;
  clearInterval(timerInterval);

  const q = questions[current];
  title.innerText = q.text;
  options.innerHTML="";

  q.options.forEach((opt,i)=>{
    const li=document.createElement('li');
    li.innerText=opt;

    li.onclick=()=>{
      if(voted) return;
      voted=true;
      db.ref('votes/'+current+'/'+i).transaction(v=>(v||0)+1);
      li.classList.add('selected');
    };

    options.appendChild(li);
  });

  let t=5;
  timerBar.style.width="100%";

  timerInterval=setInterval(()=>{
    t--;
    timerBar.style.width=(t/5*100)+"%";
    timerBar.style.background="hsl("+(120-(120*(5-t)/5))+",100%,50%)";

    if(t<=0){
      clearInterval(timerInterval);
      showWaiting();
    }
  },1000);

});
</script>

</body>
</html>
