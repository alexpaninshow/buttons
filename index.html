<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шоу</title>

<style>
body { font-family:Arial; background:#111; color:white; text-align:center; }

.screen {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

#waiting, #game { display:none; }

li {
  font-size:30px;
  margin:10px;
  padding:20px;
  border:3px solid white;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="debug" style="position:fixed;top:10px;left:10px;font-size:14px;color:#0f0"></div>

<div id="start" class="screen">Скоро начнём!</div>
<div id="waiting" class="screen">Смотрите на сцену!</div>

<div id="game">
  <h1 id="title"></h1>
  <div id="timer"></div>
  <ul id="options"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let questions=[];
let timerInterval=null;

const debug = document.getElementById("debug");

fetch(CSV_URL)
.then(r=>r.text())
.then(text=>{
  const rows = text.trim().split('\n').map(r=>r.split(','));
  questions = rows.slice(1).map(c=>({
    text:c[0],
    options:c.slice(1)
  }));
});

function show(id){
  document.getElementById("start").style.display="none";
  document.getElementById("waiting").style.display="none";
  document.getElementById("game").style.display="none";
  document.getElementById(id).style.display="flex";
}

db.ref('currentQuestion').on('value', snap=>{
  const val = snap.val();

  debug.innerText = "Firebase currentQuestion: " + val;

  if(val === null || val === -1){
    show("start");
    return;
  }

  if(!questions[val]) return;

  show("game");

  const q = questions[val];
  document.getElementById("title").innerText = q.text;

  const ul = document.getElementById("options");
  ul.innerHTML="";

  q.options.forEach(opt=>{
    const li=document.createElement("li");
    li.innerText=opt;
    ul.appendChild(li);
  });
});
</script>

</body>
</html>
