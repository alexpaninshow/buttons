<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шоу</title>

<!-- 🔤 красивый шрифт -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Montserrat', sans-serif;
  text-align:center;
  background:#222;
  color:white;
  padding:20px;
}

h1 {
  font-size:42px;
  margin-bottom:30px;
  font-weight:800;
}

ul {
  list-style:none;
  padding:0;
}

li {
  font-size:34px;
  font-weight:700;
  padding:30px;
  margin:20px;
  background:#444;
  border-radius:18px;

  border:5px solid #888; /* жирная рамка */

  transition: all 0.25s ease;
  cursor:pointer;
}

/* наведение */
li:hover {
  transform: scale(1.03);
  border-color:#bbb;
}

/* выбранный вариант */
li.selected {
  border-color:#00e676; /* ярко-зелёный */
  background:#2e7d32;
  transform: scale(1.07);
}

/* эффект нажатия */
li:active {
  transform: scale(0.97);
}

#timer {
  font-size:38px;
  margin-top:30px;
  font-weight:700;
}
</style>
</head>

<body>

<h1 id="title">Шоу</h1>
<ul id="options"></ul>
<div id="timer"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv";

const firebaseConfig = {
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let questions=[];
let timerId=null;
let voted=false;
let time=0;

const title = document.getElementById("title");
const options = document.getElementById("options");
const timer = document.getElementById("timer");

function parseCSV(text){
  const rows = text.trim().split('\n').map(r=>r.split(','));
  return rows.slice(1).map(cols=>({
    text:(cols[0]||"").trim(),
    options:cols.slice(1).map(c=>c.trim()).filter(Boolean)
  }));
}

fetch(CSV_URL)
.then(r=>r.text())
.then(text=>{
  questions=parseCSV(text);
});

db.ref('currentQuestion').on('value', snap => {
  const current = snap.val();

  clearInterval(timerId);
  voted=false;

  if(current===-1 || current===null){
    title.innerText="Шоу";
    options.innerHTML="";
    timer.innerText="";
    return;
  }

  const q = questions[current];
  title.innerText=q.text;
  options.innerHTML="";

  q.options.forEach((opt,i)=>{
    const li=document.createElement('li');
    li.innerText=opt;

    li.onclick=()=>{
      if(voted || time<=0) return;

      voted=true;

      db.ref('votes/'+current+'/'+i)
        .transaction(v=>(v||0)+1);

      li.classList.add('selected');

      clearInterval(timerId);
      timer.innerText="";

      // ⏱ задержка 0.8 секунды
      setTimeout(()=>{
        title.innerText="Шоу";
        options.innerHTML="";
      },800);
    };

    options.appendChild(li);
  });

  time=5;
  timer.innerText=time;

  timerId=setInterval(()=>{
    time--;
    if(time<=0){
      clearInterval(timerId);
      timer.innerText="";
      title.innerText="Шоу";
      options.innerHTML="";
    } else {
      timer.innerText=time;
    }
  },1000);
});
</script>

</body>
</html>
