<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Шоу</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{height:100%;margin:0;overflow:hidden;position:fixed;width:100%}
body{font-family:'Montserrat',sans-serif;background:#111;color:#fff}
.screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:20px;overflow-y:auto}
#start{background:#000;z-index:10}
#start img{max-width:90%;border-radius:20px;margin-bottom:30px}
#waiting{display:none;font-size:clamp(24px,8vw,48px);font-weight:900}
#game{display:none;height:100%;flex-direction:column;justify-content:space-between;padding:20px}
#alreadyVoted{display:none;font-size:clamp(24px,7vw,44px);font-weight:900;color:#ff9800}
h1{font-size:clamp(20px,6vw,40px);margin:10px 0}
#timerBarWrap{width:100%;max-width:600px;height:70px;background:#222;border-radius:40px;overflow:hidden;margin:20px auto}
#timerBar{height:100%;width:100%;transition:width 0.05s linear, background-color 0.05s linear}
ul{flex:1;display:flex;flex-direction:column;gap:12px;margin:0;padding:0}
li{display:flex;align-items:center;justify-content:center;font-size:clamp(18px,6vw,36px);font-weight:900;padding:20px;background:#333;border-radius:20px;border:4px solid #888;cursor:pointer}
li.selected{border-color:#00e676;background:#2e7d32}
#votedMessage{font-size:clamp(18px,5vw,32px);margin:20px auto;color:#00e676;background:rgba(0,230,118,0.15);padding:12px 20px;border-radius:50px;display:inline-block}
</style>
</head>
<body>
<div id="start" class="screen"><img src="start.jpg"><div>Скоро начнём!</div></div>
<div id="waiting" class="screen">Смотрите на сцену!</div>
<div id="alreadyVoted" class="screen">✓ Вы уже проголосовали</div>
<div id="game"><h1 id="title"></h1><div id="timerBarWrap"><div id="timerBar"></div></div><div id="votedMessage" style="display:none;">✓ Ваш голос учтён!</div><ul id="options"></ul></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";
firebase.initializeApp({ databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com" });
const db = firebase.database();

let userId = localStorage.getItem('voterId');
if(!userId){
  userId = 'voter_' + Date.now() + '_' + Math.random().toString(36).substr(2,9);
  localStorage.setItem('voterId', userId);
}

let questions = [];
let timerInterval = null, globalCheck = null;
let currentIdx = -1, currentStart = null;

const startScreen = document.getElementById('start');
const waitingScreen = document.getElementById('waiting');
const gameScreen = document.getElementById('game');
const alreadyScreen = document.getElementById('alreadyVoted');
const titleEl = document.getElementById('title');
const optionsEl = document.getElementById('options');
const timerBar = document.getElementById('timerBar');
const votedMsg = document.getElementById('votedMessage');

function showStart(){ startScreen.style.display='flex'; waitingScreen.style.display='none'; gameScreen.style.display='none'; alreadyScreen.style.display='none'; }
function showWaiting(){ startScreen.style.display='none'; waitingScreen.style.display='flex'; gameScreen.style.display='none'; alreadyScreen.style.display='none'; }
function showGame(){ startScreen.style.display='none'; waitingScreen.style.display='none'; gameScreen.style.display='flex'; alreadyScreen.style.display='none'; }
function showAlready(){ startScreen.style.display='none'; waitingScreen.style.display='none'; gameScreen.style.display='none'; alreadyScreen.style.display='flex'; }

function hasVoted(idx){ return localStorage.getItem('voted_'+idx) === 'true'; }
function markVoted(idx){ localStorage.setItem('voted_'+idx, 'true'); }

function stopTimers(){
  if(timerInterval) clearInterval(timerInterval);
  if(globalCheck) clearInterval(globalCheck);
  timerInterval = globalCheck = null;
}

// Плавное изменение цвета: зелёный (0%) -> жёлтый (50%) -> красный (100%)
function updateTimerColor(percent){
  // percent от 100 до 0
  let hue;
  if(percent > 50){
    // от зелёного (120) до жёлтого (60)
    hue = 120 - (120 - 60) * ((100 - percent) / 50);
  } else {
    // от жёлтого (60) до красного (0)
    hue = 60 - 60 * ((50 - percent) / 50);
  }
  timerBar.style.backgroundColor = 'hsl(' + hue + ', 100%, 50%)';
}

function startTimer(startTime, qIdx){
  if(timerInterval) clearInterval(timerInterval);
  const update = () => {
    if(currentIdx !== qIdx) return;
    const elapsed = (Date.now() - startTime)/1000;
    const remain = Math.max(0, 6 - elapsed);
    const percent = (remain/6)*100;
    timerBar.style.width = percent+'%';
    updateTimerColor(percent);
    if(remain <= 0){
      clearInterval(timerInterval);
      timerInterval = null;
      timerBar.style.width = '0%';
      updateTimerColor(0);
      showWaiting();
    }
  };
  update();
  timerInterval = setInterval(update, 50);
}

function startGlobalTimer(startTime, qIdx){
  if(globalCheck) clearInterval(globalCheck);
  globalCheck = setInterval(() => {
    if(currentIdx === qIdx && currentStart === startTime){
      if((Date.now() - startTime)/1000 >= 6){
        stopTimers();
        showWaiting();
      }
    }
  }, 500);
}

function applyState(index, startTime){
  if(index === -1){ showStart(); currentIdx = -1; currentStart = null; stopTimers(); return; }
  if(index === -999){ showWaiting(); currentIdx = -1; currentStart = null; stopTimers(); return; }
  if(!questions[index]) return;
  currentIdx = index;
  currentStart = startTime;
  const elapsed = (Date.now() - startTime)/1000;
  if(elapsed >= 6){ showWaiting(); stopTimers(); return; }
  if(hasVoted(index)){ showAlready(); startGlobalTimer(startTime, index); return; }
  showGame();
  votedMsg.style.display = 'none';
  const q = questions[index];
  titleEl.innerText = q.text;
  optionsEl.innerHTML = '';
  for(let i=0; i<q.options.length; i++){
    const li = document.createElement('li');
    li.innerText = q.options[i];
    li.onclick = () => {
      if(currentIdx !== index) return;
      stopTimers();
      db.ref('votes/'+index+'/'+i).transaction(v=>(v||0)+1);
      li.classList.add('selected');
      markVoted(index);
      votedMsg.style.display = 'block';
      setTimeout(showWaiting, 800);
    };
    optionsEl.appendChild(li);
  }
  startTimer(startTime, index);
  startGlobalTimer(startTime, index);
}

function subscribe(){
  db.ref('currentQuestion').once('value', snap => {
    const d = snap.val();
    if(d && d.index!==undefined) applyState(d.index, d.startTime);
  });
  db.ref('currentQuestion').on('value', snap => {
    const d = snap.val();
    if(d && d.index!==undefined){ stopTimers(); applyState(d.index, d.startTime); }
  });
}

fetch(CSV_URL).then(r=>r.text()).then(text=>{
  const rows = text.trim().split('\n');
  for(let i=1;i<rows.length;i++){
    const cols = rows[i].split(',');
    if(!cols[0]||cols[0].trim()==='') continue;
    const q = { text:cols[0].trim(), options:[] };
    for(let j=1;j<cols.length;j++){
      const val = cols[j].trim();
      if(val) q.options.push(val);
    }
    if(q.text && q.options.length) questions.push(q);
  }
  subscribe();
});

db.ref('.info/connected').on('value', snap => {
  if(snap.val() === true){
    db.ref('currentQuestion').once('value', s => {
      const d = s.val();
      if(d && d.index!==undefined){ stopTimers(); applyState(d.index, d.startTime); }
    });
  }
});

db.ref('resetFlag').on('value', snap => {
  if(snap.val()){
    for(let i=0;i<localStorage.length;i++){
      const key = localStorage.key(i);
      if(key && key.startsWith('voted_')) localStorage.removeItem(key);
    }
    stopTimers();
    currentIdx = -1; currentStart = null;
    db.ref('currentQuestion').once('value', s => {
      const d = s.val();
      if(d && d.index!==undefined) applyState(d.index, d.startTime);
    });
  }
});
</script>
</body>
</html>
