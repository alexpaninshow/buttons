<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шоу</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

<style>
html, body {
  height:100%;
  margin:0;
}

body {
  font-family:'Montserrat',sans-serif;
  background:#111;
  color:white;
  overflow:hidden;
}

/* экран ожидания */
#waiting {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* картинка */
#waiting img {
  max-width:85%;
  max-height:60%;
  margin-bottom:30px;
  border-radius:20px;
}

/* fallback фон */
#fallback {
  display:none;
  width:80%;
  height:40%;
  background:linear-gradient(135deg,#444,#111);
  border-radius:20px;
  margin-bottom:30px;
}

/* текст */
#waitingText {
  font-size:5vw;
  font-weight:900;
}

/* игра */
#game {
  display:none;
  height:100%;
  flex-direction:column;
}

h1 {
  text-align:center;
  font-size:5vw;
  margin:10px;
}

#timer {
  text-align:center;
  font-size:8vw;
  margin-bottom:20px;
}

ul {
  flex:1;
  display:flex;
  flex-direction:column;
  margin:10px;
  padding:0;
}

li {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:7vw;
  font-weight:900;
  margin:8px 0;
  background:#333;
  border-radius:20px;
  border:5px solid #777;
  cursor:pointer;
}

li.selected {
  border:6px solid #00e676;
  background:#2e7d32;
}
</style>
</head>

<body>

<div id="waiting">
  <img id="poster" src="https://lh3.googleusercontent.com/d/1iBnjog9xZVAkyeB3LlHv3aNWuXdYG39y">
  <div id="fallback"></div>
  <div id="waitingText">Смотрите на сцену!</div>
</div>

<div id="game">
  <h1 id="title"></h1>
  <div id="timer"></div>
  <ul id="options"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// 👉 если картинка не загрузилась — показываем fallback
const img = document.getElementById("poster");
const fallback = document.getElementById("fallback");

img.onerror = () => {
  img.style.display="none";
  fallback.style.display="block";
};

const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});
const db = firebase.database();

let questions=[];
let voted=false;
let timerInterval=null;

const waiting = document.getElementById("waiting");
const game = document.getElementById("game");
const title = document.getElementById("title");
const options = document.getElementById("options");
const timer = document.getElementById("timer");

function parseCSV(text){
  const rows = text.trim().split('\n').map(r=>r.split(','));
  return rows.slice(1).map(cols=>({
    text:(cols[0]||"").trim(),
    options:cols.slice(1).map(c=>c.trim()).filter(Boolean)
  }));
}

fetch(CSV_URL)
.then(r=>r.text())
.then(text=>{
  questions=parseCSV(text);
});

db.ref('/').on('value', snap => {
  const data = snap.val() || {};
  const current = data.currentQuestion;
  const start = data.questionStartTime;

  clearInterval(timerInterval);
  voted=false;

  if(current===-1 || !start){
    waiting.style.display="flex";
    game.style.display="none";
    return;
  }

  const now = Date.now();
  const elapsed = Math.floor((now - start)/1000);
  const remaining = 5 - elapsed;

  if(remaining <= 0){
    waiting.style.display="flex";
    game.style.display="none";
    return;
  }

  const q = questions[current];

  waiting.style.display="none";
  game.style.display="flex";

  title.innerText=q.text;
  options.innerHTML="";

  q.options.forEach((opt,i)=>{
    const li=document.createElement('li');
    li.innerText=opt;

    li.onclick=()=>{
      if(voted) return;

      voted=true;

      db.ref('votes/'+current+'/'+i)
        .transaction(v=>(v||0)+1);

      li.classList.add('selected');

      timer.innerText="";
      clearInterval(timerInterval);

      setTimeout(()=>{
        waiting.style.display="flex";
        game.style.display="none";
      },800);
    };

    options.appendChild(li);
  });

  timer.innerText="⏳ "+remaining;

  timerInterval=setInterval(()=>{
    const now = Date.now();
    const elapsed = Math.floor((now - start)/1000);
    const remain = 5 - elapsed;

    if(remain <= 0){
      clearInterval(timerInterval);
      waiting.style.display="flex";
      game.style.display="none";
    } else {
      timer.innerText="⏳ "+remain;
    }
  },500);
});
</script>

</body>
</html>
