<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шоу зрителей</title>
<style>
body { font-family:'Segoe UI',sans-serif; text-align:center; padding:50px; background:#222; color:white; }
h1 { font-size:32px; margin-bottom:20px; }
ul { list-style:none; padding:0; }
li { font-size:24px; margin:10px 0; }
</style>
</head>
<body>

<h1 id="displayTitle">Шоу господина Панина</h1>
<ul id="optionsList"></ul>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCnYKEXEd207E9LXgCBupqc3kjbEbk1NTc",
  authDomain: "buttons-show.firebaseapp.com",
  databaseURL: "https://buttons-panin-default-rtdb.firebaseio.com",
  projectId: "buttons-show",
  storageBucket: "buttons-show.appspot.com",
  messagingSenderId: "145808897789",
  appId: "1:145808897789:web:900445fca031ece7e53094"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const questions = [
  { text:"Кого поцелует герой?", options:["Девушку","Себя","Кого-то из зрителей"] },
  { text:"Вам понравился наш спектакль?", options:["Да","Нет"] },
  { text:"Какой жанр хотите?", options:["Комедия","Трагедия","Фарс"] }
];

const displayTitle = document.getElementById("displayTitle");
const optionsList = document.getElementById("optionsList");
const ref = db.ref('currentQuestion');

ref.on('value', (snapshot) => {
  const current = snapshot.val();

  if(current === -1 || current === null){ // игра ещё не началась
    displayTitle.innerText = "Шоу господина Панина";
    optionsList.innerHTML = "";
  } else if(current >= 0 && current < questions.length){
    displayTitle.innerText = questions[current].text;
    optionsList.innerHTML = "";
    questions[current].options.forEach(opt => {
      const li = document.createElement('li');
      li.innerText = opt;
      optionsList.appendChild(li);
    });
  } else {
    displayTitle.innerText = "Голосование окончено!";
    optionsList.innerHTML = "";
  }
});
</script>
</body>
</html>
