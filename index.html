<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шоу</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

<style>
html, body {
  height:100%;
  margin:0;
  padding:0;
}

body {
  font-family: 'Montserrat', sans-serif;
  background:#111;
  color:white;
  display:flex;
  flex-direction:column;
}

h1 {
  text-align:center;
  font-size:5vw;
  margin:10px;
  font-weight:900;
}

/* контейнер кнопок */
ul {
  flex:1;
  display:flex;
  flex-direction:column;
  padding:0;
  margin:0;
}

/* кнопки = занимают экран */
li {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;

  font-size:6vw;
  font-weight:900;
  text-align:center;

  background:#333;
  border-top:4px solid #777;

  cursor:pointer;
  transition: all 0.2s ease;
}

li:first-child {
  border-top:none;
}

/* наведение */
li:hover {
  background:#444;
}

/* нажатие */
li:active {
  transform: scale(0.97);
}

/* выбор */
li.selected {
  background:#2e7d32;
  border:6px solid #00e676;
}

/* таймер */
#timer {
  text-align:center;
  font-size:6vw;
  font-weight:900;
  padding:10px;
}
</style>
</head>

<body>

<h1 id="title">Шоу</h1>
<ul id="options"></ul>
<div id="timer"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv";

const firebaseConfig = {
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let questions=[];
let timerId=null;
let voted=false;
let time=0;

const title = document.getElementById("title");
const options = document.getElementById("options");
const timer = document.getElementById("timer");

function parseCSV(text){
  const rows = text.trim().split('\n').map(r=>r.split(','));
  return rows.slice(1).map(cols=>({
    text:(cols[0]||"").trim(),
    options:cols.slice(1).map(c=>c.trim()).filter(Boolean)
  }));
}

fetch(CSV_URL)
.then(r=>r.text())
.then(text=>{
  questions=parseCSV(text);
});

db.ref('currentQuestion').on('value', snap => {
  const current = snap.val();

  clearInterval(timerId);
  voted=false;

  if(current===-1 || current===null){
    title.innerText="Шоу";
    options.innerHTML="";
    timer.innerText="";
    return;
  }

  const q = questions[current];
  title.innerText=q.text;
  options.innerHTML="";

  q.options.forEach((opt,i)=>{
    const li=document.createElement('li');
    li.innerText=opt;

    li.onclick=()=>{
      if(voted || time<=0) return;

      voted=true;

      db.ref('votes/'+current+'/'+i)
        .transaction(v=>(v||0)+1);

      li.classList.add('selected');

      clearInterval(timerId);
      timer.innerText="";

      // задержка перед "Шоу"
      setTimeout(()=>{
        title.innerText="Шоу";
        options.innerHTML="";
      },800);
    };

    options.appendChild(li);
  });

  time=5;
  timer.innerText=time;

  timerId=setInterval(()=>{
    time--;
    if(time<=0){
      clearInterval(timerId);
      timer.innerText="";
      title.innerText="Шоу";
      options.innerHTML="";
    } else {
      timer.innerText=time;
    }
  },1000);
});
</script>

</body>
</html>
