<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Старт</title>

<style>
html, body {
  height:100%;
  margin:0;
}

body {
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-family:Arial;
  color:white;
}

#startBtn {
  width:90%;
  max-width:600px;
  padding:40px 20px;
  font-size:28px;
  font-weight:bold;
  background:#2196f3;
  color:white;
  border:none;
  border-radius:30px;
  cursor:pointer;
}

#status {
  margin-top:20px;
  font-size:20px;
  font-style:italic;
}
</style>
</head>

<body>

<button id="startBtn">Начинаем спектакль</button>
<div id="status">Проверка системы...</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  databaseURL: "https://buttons-panin-default-rtdb.firebaseio.com"
});

var db = firebase.database();
var btn = document.getElementById("startBtn");
var statusEl = document.getElementById("status");

var checking = false;

/* ПРИНУДИТЕЛЬНЫЙ СТАРТОВЫЙ ЭКРАН */
function forceStartScreen(){
  db.ref('currentQuestion').set(-1);
}

/* ПРОВЕРКА */
function checkSystem(){

  checking = true;
  btn.disabled = true;
  btn.style.opacity = "0.5";

  statusEl.innerText = "Проверка системы...";

  Promise.all([
    fetch("https://docs.google.com").then(()=>true).catch(()=>false),
    db.ref('currentQuestion').once('value')
  ])
  .then(()=>{
    statusEl.innerText = "✅ Система готова к работе";
    btn.disabled = false;
    btn.style.opacity = "1";
    checking = false;
  })
  .catch(()=>{
    statusEl.innerText = "❌ Ошибка подключения";
    checking = false;
  });
}

/* каждые 60 сек */
setInterval(()=>{
  forceStartScreen();
  checkSystem();
},60000);

/* при загрузке */
forceStartScreen();
checkSystem();

/* СТАРТ */
btn.onclick = function(){

  if(checking) return;

  btn.innerText = "Запуск...";
  btn.disabled = true;

  Promise.all([
    db.ref('votes').remove(),
    db.ref('currentQuestion').set(-999)
  ]).then(()=>{
    window.location.href = "operator.html";
  });
};
</script>

</body>
</html>
