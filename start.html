<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Старт</title>

<style>
html, body {
  height:100%;
  margin:0;
}

body {
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-family:Arial;
  color:white;
}

#startBtn {
  width:90%;
  max-width:600px;
  padding:40px 20px;
  font-size:28px;
  font-weight:bold;
  background:#2196f3;
  color:white;
  border:none;
  border-radius:30px;
  cursor:pointer;
}

#status {
  margin-top:20px;
  font-size:18px;
}

.ready {
  color:#00e676;
  font-style:italic;
}

.error {
  color:#ff5252;
}

.checking {
  color:#ccc;
  font-style:italic;
}
</style>
</head>

<body>

<button id="startBtn">Начинаем спектакль</button>
<div id="status">Проверка системы...</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL: "https://buttons-panin-default-rtdb.firebaseio.com"
});

var db = firebase.database();
var btn = document.getElementById("startBtn");
var status = document.getElementById("status");

let csvReady = false;
let firebaseReady = false;

/* 🔥 ПРОВЕРКА CSV */
function checkCSV(){

  return new Promise((resolve) => {

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 4000);

    fetch(CSV_URL, { signal: controller.signal })
    .then(r => r.text())
    .then(text => {
      clearTimeout(timeout);

      const rows = text.trim().split('\n');

      if(rows.length > 1){
        csvReady = true;
        resolve(true);
      } else {
        csvReady = false;
        resolve(false);
      }
    })
    .catch(() => {
      clearTimeout(timeout);
      csvReady = false;
      resolve(false);
    });

  });
}

/* 🔥 ПРОВЕРКА FIREBASE */
function checkFirebase(){

  return new Promise((resolve) => {

    const testRef = db.ref('ping');

    const timeout = setTimeout(() => {
      firebaseReady = false;
      resolve(false);
    }, 3000);

    testRef.set(Date.now(), (error) => {
      clearTimeout(timeout);

      if(error){
        firebaseReady = false;
        resolve(false);
      } else {
        firebaseReady = true;
        resolve(true);
      }
    });

  });
}

/* 🔥 ОБЩАЯ ПРОВЕРКА */
async function checkSystem(){

  status.className = "checking";
  status.innerText = "Проверка системы...";

  const csv = await checkCSV();
  const fb = await checkFirebase();

  if(csv && fb){
    status.className = "ready";
    status.innerText = "✔ Система готова к работе";
  }
  else if(!csv){
    status.className = "error";
    status.innerText = "Нет связи с таблицей";
  }
  else if(!fb){
    status.className = "error";
    status.innerText = "Firebase не отвечает";
  }
}

/* запуск */
checkSystem();
setInterval(checkSystem, 5000);

/* кнопка */
btn.onclick = function(){

  if(!(csvReady && firebaseReady)){
    status.className = "error";
    status.innerText = "⛔ Система не готова";
    return;
  }

  btn.innerText = "Подготовка...";
  btn.disabled = true;

  db.ref('votes').remove();
  db.ref('currentQuestion').set(-1);

  setTimeout(function(){
    window.location.href = "operator.html";
  }, 300);
};
</script>

</body>
</html>
