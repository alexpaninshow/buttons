<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Старт спектакля</title>

<style>
html, body {
  height:100%;
  margin:0;
}

body {
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Arial;
  padding:20px;
}

#startBtn {
  width:100%;
  max-width:600px;

  padding:40px 20px;

  font-size:6vw;
  font-weight:bold;
  line-height:1.2;

  background:#2196f3;
  color:white;

  border:none;
  border-radius:30px;

  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;

  transition:transform 0.1s;
}

@media (min-width:700px){
  #startBtn { font-size:32px; }
}

#startBtn:active {
  transform:scale(0.97);
}
</style>
</head>

<body>

<button id="startBtn">
  Начать спектакль
</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db = firebase.database();
const btn = document.getElementById("startBtn");

btn.onclick = async () => {

  btn.innerText = "Запуск...";
  btn.disabled = true;

  try {
    // 🔥 теперь запускаем режим ожидания сцены
    await db.ref('currentQuestion').set(-999);

    // чистим голоса
    await db.ref('votes').remove();

      });
    }

  } catch(e){

  }

</script>

</body>
</html>
