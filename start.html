<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Старт спектакля</title>

<style>
html, body {
  height:100%;
  margin:0;
}

body {
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Arial;
}

#startBtn {
  width:90%;
  max-width:600px;
  padding:40px 20px;

  font-size:28px;
  font-weight:bold;

  background:#2196f3;
  color:white;

  border:none;
  border-radius:30px;

  cursor:pointer;
}
</style>
</head>

<body>

<button id="startBtn">
  Спектакль начинается
</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// 🔥 ПРОСТАЯ ИНИЦИАЛИЗАЦИЯ
firebase.initializeApp({
  databaseURL: "https://buttons-panin-default-rtdb.firebaseio.com"
});

var db = firebase.database();
var btn = document.getElementById("startBtn");

btn.onclick = function(){

  btn.innerText = "Запуск...";
  btn.disabled = true;

  // 🔥 БЕЗ async — просто подряд
  db.ref('currentQuestion').set(-999);
  db.ref('votes').remove();

  // переход
  setTimeout(function(){
    window.location.href = "operator.html";
  }, 300);
};
</script>

</body>
</html>
