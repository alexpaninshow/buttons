<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Старт</title>
<style>
html,body{height:100%;margin:0;background:#111;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:Arial;color:#fff}
#startBtn{width:90%;max-width:600px;padding:20px;font-size:clamp(20px,7vw,28px);font-weight:bold;background:#2196f3;color:#fff;border:none;border-radius:30px;cursor:pointer}
#startBtn.disabled{opacity:0.4;cursor:not-allowed}
#status{margin-top:20px;font-size:clamp(16px,5vw,20px);font-style:italic}
.status-ok{color:#00e676}
.status-check{color:#ccc}
</style>
</head>
<body>
<button id="startBtn">Начинаем спектакль</button>
<div id="status" class="status-check">Проверка системы...</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"});
const db = firebase.database();
const btn = document.getElementById('startBtn');
const statusEl = document.getElementById('status');
let checking = false;
function forceStart(){ db.ref('currentQuestion').set({index:-1,startTime:Date.now()}); }
function lock(){ btn.classList.add('disabled'); btn.disabled=true; }
function unlock(){ btn.classList.remove('disabled'); btn.disabled=false; }
function checkSystem(cb){
  checking=true; lock();
  statusEl.className='status-check'; statusEl.innerText='Проверка системы...';
  db.ref('currentQuestion').once('value',()=>{
    statusEl.className='status-ok'; statusEl.innerText='✔ Система готова';
    checking=false; unlock(); if(cb) cb(true);
  },()=>{
    statusEl.innerText='Ошибка подключения'; checking=false; if(cb) cb(false);
  });
}
forceStart(); checkSystem();
setInterval(()=>{ forceStart(); checkSystem(); },60000);
btn.onclick=()=>{
  if(checking) return;
  lock(); btn.innerText='Проверка...';
  checkSystem(ok=>{
    if(!ok){ btn.innerText='Начинаем спектакль'; unlock(); return; }
    db.ref('votes').remove();
    db.ref('resetFlag').set(Date.now());
    db.ref('currentQuestion').set({index:-999,startTime:Date.now()});
    setTimeout(()=>{ window.location.href='operator.html'; },300);
  });
};
</script>
</body>
</html>
