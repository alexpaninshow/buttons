<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Старт</title>

<style>
html, body {
  height:100%;
  margin:0;
}

body {
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-family:Arial;
  color:white;
}

#startBtn {
  width:90%;
  max-width:600px;
  padding:40px 20px;
  font-size:28px;
  font-weight:bold;
  background:#2196f3;
  color:white;
  border:none;
  border-radius:30px;
  cursor:pointer;
  transition:0.3s;
}

#startBtn.disabled {
  opacity:0.4;
  cursor:not-allowed;
}

#status {
  margin-top:20px;
  font-size:20px;
  font-style:italic;
}

.status-ok {
  color:#00e676;
}

.status-check {
  color:#ccc;
}
</style>
</head>

<body>

<button id="startBtn">Начинаем спектакль</button>
<div id="status" class="status-check">Проверка системы...</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  databaseURL: "https://buttons-panin-default-rtdb.firebaseio.com"
});

var db = firebase.database();

var btn = document.getElementById("startBtn");
var statusEl = document.getElementById("status");

var checking = false;

/* держим зрителей на старте */
function forceStart(){
  db.ref('currentQuestion').set(-1);
}

/* визуально блокируем кнопку */
function lockButton(){
  btn.classList.add("disabled");
  btn.disabled = true;
}

/* разблокируем */
function unlockButton(){
  btn.classList.remove("disabled");
  btn.disabled = false;
}

/* ПРОВЕРКА */
function checkSystem(callback){

  checking = true;
  lockButton();

  statusEl.className = "status-check";
  statusEl.innerText = "Проверка системы...";

  db.ref('currentQuestion').once('value', function(){

    statusEl.className = "status-ok";
    statusEl.innerText = "✔ Система готова к работе";

    unlockButton();
    checking = false;

    if(callback) callback(true);

  }, function(){

    statusEl.className = "status-check";
    statusEl.innerText = "Ошибка подключения";

    checking = false;

    if(callback) callback(false);
  });
}

/* при загрузке */
forceStart();
checkSystem();

/* каждые 60 секунд */
setInterval(function(){
  forceStart();
  checkSystem();
},60000);

/* НАЖАТИЕ */
btn.onclick = function(){

  if(checking) return;

  lockButton();
  btn.innerText = "Проверка...";

  /* финальная проверка */
  checkSystem(function(ok){

    if(!ok){
      btn.innerText = "Начинаем спектакль";
      unlockButton();
      return;
    }

    btn.innerText = "Запуск...";

    db.ref('votes').remove();

    db.ref('currentQuestion').set(-999);

    setTimeout(function(){
      window.location.href = "operator.html";
    },300);

  });
};
</script>

</body>
</html>
