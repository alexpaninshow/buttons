<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Старт</title>

<style>
* {
  box-sizing: border-box;
}

html, body { 
  height: 100%; 
  margin: 0; 
  padding: 0;
}

body {
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-family: Arial, sans-serif;
  color: white;
  padding: 20px;
}

#startBtn {
  width: 100%;
  max-width: 600px;
  padding: 20px;
  font-size: clamp(20px, 7vw, 28px);
  font-weight: bold;
  background: #2196f3;
  color: white;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
  margin: 20px auto;
}

#startBtn.disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

#status {
  margin-top: 20px;
  font-size: clamp(16px, 5vw, 20px);
  font-style: italic;
  text-align: center;
  padding: 0 20px;
}

.status-ok { color: #00e676; }
.status-check { color: #ccc; }
</style>
</head>

<body>

<button id="startBtn">Начинаем спектакль</button>
<div id="status" class="status-check">Проверка системы...</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  databaseURL: "https://buttons-panin-default-rtdb.firebaseio.com"
});

var db = firebase.database();
var btn = document.getElementById("startBtn");
var statusEl = document.getElementById("status");
var checking = false;

function forceStart(){
  db.ref('currentQuestion').set({index:-1,startTime:Date.now()});
}

function lock(){
  btn.classList.add("disabled");
  btn.disabled = true;
}

function unlock(){
  btn.classList.remove("disabled");
  btn.disabled = false;
}

function checkSystem(cb){
  checking = true;
  lock();
  statusEl.className="status-check";
  statusEl.innerText="Проверка системы...";

  db.ref('currentQuestion').once('value', function(){
    statusEl.className="status-ok";
    statusEl.innerText="✔ Система готова к работе";
    checking=false;
    unlock();
    if(cb) cb(true);
  }, function(){
    statusEl.innerText="Ошибка подключения";
    checking=false;
    if(cb) cb(false);
  });
}

forceStart();
checkSystem();

setInterval(function(){
  forceStart();
  checkSystem();
},60000);

btn.onclick=function(){
  if(checking) return;

  lock();
  btn.innerText="Проверка...";

  checkSystem(function(ok){
    if(!ok){
      btn.innerText="Начинаем спектакль";
      unlock();
      return;
    }

    db.ref('votes').remove();
    db.ref('resetFlag').set(Date.now());

    db.ref('currentQuestion').set({
      index:-999,
      startTime:Date.now()
    });

    setTimeout(function(){
      window.location.href="operator.html";
    },300);
  });
};
</script>

</body>
</html>
