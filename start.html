<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Старт</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  flex-direction:column;
}

button{
  padding:20px 40px;
  font-size:24px;
  border:none;
  border-radius:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Готовность к спектаклю</h1>
<button onclick="start()">▶️ НАЧАТЬ СПЕКТАКЛЬ</button>

<script>
firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db = firebase.database();

function start(){
  db.ref().set({
    game:{
      status:"pause",
      currentQuestion:0,
      timer:5
    },
    votes:{}
  });

  alert("Спектакль запущен");
}
</script>

</body>
</html>
