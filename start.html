<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Старт</title>

<style>
html, body {
  height:100%;
  margin:0;
}

body {
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-family:Arial;
  color:white;
}

#startBtn {
  width:90%;
  max-width:600px;
  padding:40px 20px;
  font-size:28px;
  font-weight:bold;
  background:#2196f3;
  color:white;
  border:none;
  border-radius:30px;
  cursor:pointer;
}

#status {
  margin-top:20px;
  font-size:20px;
  font-style:italic;
}
</style>
</head>

<body>

<button id="startBtn">Начинаем спектакль</button>
<div id="status">Проверка системы...</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  databaseURL: "https://buttons-panin-default-rtdb.firebaseio.com"
});

var db = firebase.database();

var btn = document.getElementById("startBtn");
var statusEl = document.getElementById("status");

var checking = false;

/* всегда держим зрителей на старте */
function forceStart(){
  db.ref('currentQuestion').set(-1);
}

/* проверка системы */
function checkSystem(){

  checking = true;

  btn.disabled = true;
  btn.style.opacity = "0.5";

  statusEl.innerText = "Проверка системы...";

  // проверяем Firebase
  db.ref('currentQuestion').once('value', function(){

    statusEl.innerText = "✔ Система готова к работе";

    btn.disabled = false;
    btn.style.opacity = "1";

    checking = false;

  }, function(){

    statusEl.innerText = "Ошибка подключения";

    checking = false;
  });
}

/* при загрузке */
forceStart();
checkSystem();

/* каждые 60 секунд */
setInterval(function(){
  forceStart();
  checkSystem();
},60000);

/* кнопка старта */
btn.onclick = function(){

  if(checking) return;

  btn.innerText = "Запуск...";
  btn.disabled = true;

  // очищаем голоса
  db.ref('votes').remove();

  // отправляем всех в ожидание
  db.ref('currentQuestion').set(-999);

  // переход к оператору
  setTimeout(function(){
    window.location.href = "operator.html";
  },300);
};
</script>

</body>
</html>
