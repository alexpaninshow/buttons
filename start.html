<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Старт</title>

<style>
html, body { height:100%; margin:0; }

body {
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-family:Arial;
  color:white;
}

#startBtn {
  width:90%;
  max-width:600px;
  padding:40px 20px;
  font-size:28px;
  font-weight:bold;
  background:#2196f3;
  color:white;
  border:none;
  border-radius:30px;
}

#status { margin-top:20px; font-size:18px; }

.ready { color:#00e676; font-style:italic; }
.error { color:#ff5252; }
.checking { color:#ccc; font-style:italic; }
</style>
</head>

<body>

<button id="startBtn">Начинаем спектакль</button>
<div id="status">Проверка системы...</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db = firebase.database();
const status = document.getElementById("status");
const btn = document.getElementById("startBtn");

let csvReady=false;
let firebaseReady=false;

function checkCSV(){
  return fetch(CSV_URL)
  .then(r=>r.text())
  .then(t=>t.split('\n').length>1)
  .catch(()=>false);
}

function checkFirebase(){
  return new Promise(res=>{
    db.ref('ping').set(Date.now(), e=>res(!e));
  });
}

async function checkSystem(){
  status.className="checking";
  status.innerText="Проверка системы...";

  csvReady = await checkCSV();
  firebaseReady = await checkFirebase();

  if(csvReady && firebaseReady){
    status.className="ready";
    status.innerText="✔ Система готова к работе";
  } else if(!csvReady){
    status.className="error";
    status.innerText="Нет связи с таблицей";
  } else {
    status.className="error";
    status.innerText="Firebase не отвечает";
  }
}

checkSystem();
setInterval(checkSystem,5000);

btn.onclick=()=>{
  if(!(csvReady && firebaseReady)){
    status.className="error";
    status.innerText="⛔ Система не готова";
    return;
  }

  db.ref('votes').remove();
  db.ref('currentQuestion').set(-1);

  setTimeout(()=>location.href="operator.html",300);
};
</script>

</body>
</html>
