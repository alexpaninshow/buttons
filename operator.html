<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
body {
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
  padding:40px;
}

#status { font-size:28px; margin-bottom:10px; }
#timer { font-size:48px; margin-bottom:20px; }

button {
  width:90%;
  font-size:24px;
  padding:20px;
  margin:10px auto;
  display:block;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

.next { background:#4caf50; }
.back { background:orange; }
.reset { background:red; }
</style>
</head>

<body>

<h1>Оператор</h1>

<div id="status">Загрузка...</div>
<div id="timer">⏳ -</div>

<button id="nextBtn" class="next"></button>
<button id="backBtn" class="back"></button>
<button id="resetBtn" class="reset">Сброс</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let questions = [];
let current = -1;
let timerFinished = false;
let lock = false;
let timerInterval = null; // 🔥 фикс

const status = document.getElementById("status");
const timerEl = document.getElementById("timer");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");

fetch(CSV_URL)
.then(r => r.text())
.then(text => {
  const rows = text.trim().split('\n').map(r => r.split(','));

  questions = rows.slice(1).map(cols => ({
    text:(cols[0]||"").trim(),
    options:cols.slice(1).map(c=>c.trim()).filter(Boolean)
  }));

  updateButtons();
});

db.ref('currentQuestion').on('value', snap => {

  current = snap.val() ?? -1;
  timerFinished = false;
  lock = false;

  if(timerInterval){
    clearInterval(timerInterval);
  }

  if(current === -1){
    status.innerText = "Ожидание";
    timerEl.innerText = "⏳ -";
  } else if(current >= 0){
    status.innerText = "Сейчас: " + (current+1) + ". " + questions[current].text;
    startTimer();
  }

  updateButtons();
});

function startTimer(){
  if(timerInterval){
    clearInterval(timerInterval);
  }

  let t = 5;
  timerEl.innerText = "⏳ " + t;

  timerInterval = setInterval(()=>{
    t--;

    if(t<=0){
      clearInterval(timerInterval);
      timerInterval = null;
      timerEl.innerText = "⏳ 0";
      timerFinished = true;
      updateButtons();
    } else {
      timerEl.innerText = "⏳ " + t;
    }
  },1000);
}

function showQuestion(i){
  if(lock) return;
  lock = true;

  if(i === current){
    db.ref('currentQuestion').set(-999);
    setTimeout(()=> db.ref('currentQuestion').set(i), 50);
  } else {
    db.ref('currentQuestion').set(i);
  }
}

nextBtn.onclick = ()=>{
  if(lock || !questions.length) return;

  if(current === -1){
    showQuestion(0);
  } else if(current < questions.length-1){
    showQuestion(current+1);
  }
};

backBtn.onclick = ()=>{
  if(lock || !questions.length) return;

  if(current === -1) return;

  if(timerFinished){
    showQuestion(current);
  } else {
    if(current > 0){
      showQuestion(current-1);
    }
  }
};

resetBtn.onclick = ()=>{
  db.ref('currentQuestion').set(-1);
};

function updateButtons(){
  if(!questions.length) return;

  if(current === -1){
    nextBtn.innerText = "Начать: " + questions[0].text;
    backBtn.style.display = "none";
    return;
  }

  if(current < questions.length-1){
    nextBtn.innerText = "Далее: " + questions[current+1].text;
  } else {
    nextBtn.innerText = "Конец";
  }

  backBtn.style.display = "block";

  if(timerFinished){
    backBtn.innerText = "Назад: " + questions[current].text;
  } else {
    if(current > 0){
      backBtn.innerText = "Назад: " + questions[current-1].text;
    } else {
      backBtn.innerText = "Первый вопрос";
    }
  }
}
</script>

</body>
</html>
