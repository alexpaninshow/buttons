<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Управление</title>

<style>
body{margin:0;background:#111;color:#fff;font-family:Arial}

#buttons{
  display:flex;
  flex-direction:column;
  gap:15px;
  padding:20px;
}

button{
  padding:20px;
  border:none;
  border-radius:30px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}

.next{background:#4caf50}
.next.final{
  background:#e1306c;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.next.final img{
  width:24px;
}

.back{background:#ff9800}
.reset{background:#f44336}
</style>
</head>

<body>

<div id="buttons">
  <button id="nextBtn" class="next">Далее</button>
  <button id="backBtn" class="back">Назад</button>
  <button id="resetBtn" class="reset">Сброс</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"});
const db = firebase.database();

let questions=[];
let current=-1;
let isTimerActive=false;

const nextBtn=document.getElementById('nextBtn');

function setQuestion(i){
  db.ref('currentQuestion').set({index:i,startTime:Date.now()});
}

fetch("https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0")
.then(r=>r.text())
.then(t=>{
  const rows=t.split('\n');
  for(let i=1;i<rows.length;i++){
    const c=rows[i].split(',');
    if(c[0]) questions.push(c);
  }
});

db.ref('currentQuestion').on('value',snap=>{
  const d=snap.val();
  if(!d) return;
  current=d.index;

  // если последний вопрос
  if(current===questions.length-1){
    nextBtn.innerHTML=''; 
    nextBtn.classList.remove('final');
    nextBtn.style.display='none';

    // ждём окончания таймера
    setTimeout(()=>{
      nextBtn.style.display='flex';
      nextBtn.classList.add('final');
      nextBtn.innerHTML='<img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Instagram_logo_2022.svg"> Завершить игру!';
    },6500);
  }
});

nextBtn.onclick=()=>{
  // финальная кнопка
  if(nextBtn.classList.contains('final')){
    db.ref('showInstagram').set(Date.now());
    return;
  }

  if(current<questions.length-1){
    setQuestion(current+1);
  }
};

document.getElementById('resetBtn').onclick=()=>{
  db.ref('votes').remove();
  db.ref('showInstagram').remove();
  setQuestion(-1);
};
</script>

</body>
</html>
