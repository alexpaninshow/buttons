<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
body { 
  font-family: Arial; 
  text-align: center; 
  background:#222; 
  color:white; 
  padding:40px; 
}

#status { font-size:26px; margin-bottom:10px; }
#timer { font-size:24px; margin-bottom:20px; color:#ffeb3b; }

/* 🔥 ВЕРТИКАЛЬНЫЕ КНОПКИ */
.buttons {
  display:flex;
  flex-direction:column;
  align-items:center;
}

button {
  width: 80%;
  max-width: 500px;
  font-size:20px;
  padding:15px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

.next { background:#4caf50; color:white; font-style:italic; }
.back { background:orange; color:white; }
.reset { background:red; color:white; }
</style>
</head>

<body>

<h1>Оператор</h1>

<div id="status">Сейчас: Ожидание</div>
<div id="timer"></div>

<div class="buttons">
  <button id="nextBtn" class="next">Загрузка...</button>
  <button id="backBtn" class="back" style="display:none;">Назад</button>
  <button id="resetBtn" class="reset">Сбросить игру</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv";

const firebaseConfig = {
  databaseURL: "https://buttons-panin-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let questions = [];
let current = -1;
let lastAskedIndex = -1;

let autoTimer = null;
let visualTimer = null;
let time = 0;

const status = document.getElementById("status");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");
const timerDiv = document.getElementById("timer");

function parseCSV(text){
  const rows = text.replace(/\r/g,'').split('\n').filter(r=>r.trim());
  return rows.slice(1).map(row=>{
    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g)||[];
    return {
      text:(cols[0]||"").replace(/"/g,'').trim(),
      options:[cols[1],cols[2],cols[3]]
        .map(c=>(c||"").replace(/"/g,'').trim())
        .filter(Boolean)
    };
  });
}

fetch(CSV_URL)
.then(r=>r.text())
.then(text=>{
  questions=parseCSV(text);
  nextBtn.innerText="Начать игру";
  updateButtons();
});

function startVisualTimer(){
  if(visualTimer) clearInterval(visualTimer);

  time = 5;
  timerDiv.innerText = "Таймер: " + time;

  visualTimer = setInterval(()=>{
    time--;
    if(time <= 0){
      clearInterval(visualTimer);
      timerDiv.innerText = "";
    } else {
      timerDiv.innerText = "Таймер: " + time;
    }
  },1000);
}

function showQuestion(i){
  if(autoTimer) clearTimeout(autoTimer);

  current = i;
  lastAskedIndex = i;

  db.ref('currentQuestion').set(i);

  status.innerText = "Сейчас: " + questions[i].text;
  updateButtons();

  startVisualTimer();

  autoTimer = setTimeout(()=>{
    current = -1;
    db.ref('currentQuestion').set(-1);

    status.innerText = "Сейчас: Ожидание";
    timerDiv.innerText = "";

    updateButtons();
  }, 5000);
}

// 👉 ВПЕРЁД
nextBtn.onclick = ()=>{
  let nextIndex = lastAskedIndex + 1;

  if(lastAskedIndex === -1) nextIndex = 0;

  if(nextIndex < questions.length){
    showQuestion(nextIndex);
  }
};

// 👉 НАЗАД (предыдущий вопрос)
backBtn.onclick = ()=>{
  if(lastAskedIndex > 0){
    showQuestion(lastAskedIndex - 1);
  }
};

document.getElementById("resetBtn").onclick = ()=>{
  if(autoTimer) clearTimeout(autoTimer);
  if(visualTimer) clearInterval(visualTimer);

  current = -1;
  lastAskedIndex = -1;

  db.ref('currentQuestion').set(-1);

  status.innerText="Сейчас: Ожидание";
  timerDiv.innerText="";

  updateButtons();
};

function updateButtons(){
  if(!questions.length) return;

  // 👉 ВПЕРЁД
  let nextIndex = lastAskedIndex + 1;

  if(nextIndex < questions.length){
    nextBtn.innerText="Вопрос "+(nextIndex+1)+": "+questions[nextIndex].text;
    nextBtn.style.display="inline-block";
  } else {
    nextBtn.style.display="none";
  }

  // 👉 НАЗАД С ТЕКСТОМ
  if(lastAskedIndex > 0){
    backBtn.innerText = "Назад: " + questions[lastAskedIndex - 1].text;
    backBtn.style.display="inline-block";
  } else {
    backBtn.style.display="none";
  }
}
</script>

</body>
</html>
