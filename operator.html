<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Управление игрой</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#111;color:#fff;display:flex;flex-direction:column;min-height:100vh}
#top{padding:20px;flex-shrink:0}

h1{
  margin:0;
  font-size:clamp(18px,5vw,28px);
  text-align:center;
  font-weight:bold;
}

#status{
  font-size:clamp(16px,4.5vw,22px);
  margin-top:10px;
  font-weight:900;
  animation:blinkGreen 1.5s ease-in-out infinite;
  transition: opacity 0.5s ease;
}

@keyframes blinkGreen{
  0%{color:#ffffff}
  50%{color:#00e676}
  100%{color:#ffffff}
}

#timer{font-size:clamp(24px,7vw,28px);margin-top:10px;font-weight:bold}
#winner{
  font-size:clamp(18px,5vw,24px);
  margin-top:15px;
  padding:10px;
  background:#222;
  border-radius:20px;
  color:#ffd700;
  transition: opacity 0.5s ease, filter 0.5s ease;
}
#winner.hidden{
  opacity:0.3;
  filter:blur(4px);
}
#winnerDetails{
  font-size:clamp(14px,4vw,18px);
  margin-top:5px;
  color:#aaa;
  transition: opacity 0.5s ease, filter 0.5s ease;
}
#winnerDetails.hidden{
  opacity:0.3;
  filter:blur(4px);
}
#questionsStatus{font-size:13px;margin-top:20px;color:#00e676;font-style:italic;text-align:left;padding-left:20px;display:flex;align-items:center;gap:6px}
#questionsStatus .ok{color:#00e676;font-size:14px}
#questionsStatus .error{color:#f44336;font-size:14px;font-style:normal}

#buttons {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 15px;
  gap: 20px;
  justify-content: center;
  max-width: 500px;
  margin: 0 auto;
  width: 100%;
}

button {
  margin: 0;
  font-size: clamp(16px, 5vw, 18px);
  font-weight: bold;
  border-radius: 30px;
  border: none;
  color: #fff;
  cursor: pointer;
  transition: transform 0.1s ease;
  width: 100%;
}

button:active {
  transform: scale(0.97);
}

.next {
  background: #4caf50;
  padding: 24px 18px;
  font-size: clamp(20px, 6vw, 24px);
}

.back {
  background: #ff9800;
  padding: 14px 18px;
}

.reset {
  background: #f44336;
  padding: 14px 18px;
}

#instagramBtn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 9999;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.5s;
  width: 50px;
  height: 50px;
}
#instagramBtn img {
  width: 100%;
  height: 100%;
  filter: invert(1);
}
</style>
</head>
<body>
<div id="top"><h1>Управление игрой</h1><div id="status">⏳ Загрузка...</div><div id="timer">⏳ -</div><div id="winner" class="hidden">🏆 Победитель: ???</div><div id="winnerDetails" class="hidden"></div><div id="questionsStatus"></div></div>
<div id="buttons"><button id="nextBtn" class="next">--</button><button id="backBtn" class="back">--</button><button id="resetBtn" class="reset">Полный сброс</button></div>
<div id="instagramBtn"><img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Instagram_logo_2022.svg" alt="Instagram"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";
firebase.initializeApp({ databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com" });
const db = firebase.database();

let questions = [];
let current = -1;
let loaded = false;
let votesListener = null;
let timerInt = null, timerOut = null;
let isTimerActive = false;
let pendingWaitingTimeout = null;
let pendingWinnerBlurTimeout = null;

const statusEl = document.getElementById('status');
const timerEl = document.getElementById('timer');
const winnerEl = document.getElementById('winner');
const winnerDetailEl = document.getElementById('winnerDetails');
const qStatusEl = document.getElementById('questionsStatus');
const nextBtn = document.getElementById('nextBtn');
const backBtn = document.getElementById('backBtn');
const instagramBtn = document.getElementById('instagramBtn');

function hideWinner(){ winnerEl.classList.add('hidden'); winnerDetailEl.classList.add('hidden'); }
function showWinner(){ winnerEl.classList.remove('hidden'); winnerDetailEl.classList.remove('hidden'); }
function clearPendingTimeouts(){
  if(pendingWaitingTimeout){ clearTimeout(pendingWaitingTimeout); pendingWaitingTimeout = null; }
  if(pendingWinnerBlurTimeout){ clearTimeout(pendingWinnerBlurTimeout); pendingWinnerBlurTimeout = null; }
}
function showInstagramButton(){ instagramBtn.style.opacity = '1'; }
function hideInstagramButton(){ instagramBtn.style.opacity = '0'; }

fetch(CSV_URL).then(r=>r.text()).then(text=>{
  const rows = text.trim().split('\n');
  for(let i=1;i<rows.length;i++){
    const cols = rows[i].split(',');
    if(!cols[0]||cols[0].trim()==='') continue;
    const q = { text:cols[0].trim(), options:[] };
    for(let j=1;j<cols.length;j++){
      const val = cols[j].trim();
      if(val) q.options.push(val);
    }
    if(q.text && q.options.length) questions.push(q);
  }
  loaded = true;
  
  if(questions.length > 0){
    qStatusEl.innerHTML = '<span class="ok">✅</span> Все вопросы загружены ('+questions.length+')';
  } else {
    qStatusEl.innerHTML = '<span class="error">❌</span> Ошибка загрузки вопросов';
  }
  
  statusEl.innerText = questions.length ? '✅ Готов. Ожидание команды...' : '❌ Нет вопросов';
  updateButtons();
}).catch(()=>{
  qStatusEl.innerHTML = '<span class="error">❌</span> Ошибка загрузки вопросов';
  statusEl.innerText = '❌ Ошибка подключения к таблице';
  loaded = false;
});

function setQuestion(idx){
  clearPendingTimeouts();
  hideInstagramButton();
  db.ref('currentQuestion').set({ index:idx, startTime:Date.now() });
}

function updateWinner(qIdx, force){
  if(qIdx<0 || !questions[qIdx]){ 
    winnerEl.innerText='🏆 Победитель: ???'; 
    winnerDetailEl.innerText=''; 
    return; 
  }
  db.ref('votes/'+qIdx).once('value', snap=>{
    const votes = snap.val()||{};
    let max=-1, winners=[], parts=[];
    
    for(let i=0;i<questions[qIdx].options.length;i++){
      const c = votes[i]||0;
      parts.push(questions[qIdx].options[i]+': '+c);
      if(c > max){
        max = c;
        winners = [i];
      } else if(c === max){
        winners.push(i);
      }
    }
    
    let winnerText = '';
    if(max === 0 || winners.length > 1){
      const randomIndex = Math.floor(Math.random() * questions[qIdx].options.length);
      winnerText = questions[qIdx].options[randomIndex];
    } else {
      winnerText = questions[qIdx].options[winners[0]];
    }
    
    winnerEl.innerText = '🏆 ПОБЕДИТЕЛЬ: '+winnerText;
    winnerDetailEl.innerText = 'Голосов: '+max+' | '+parts.join(' | ');
    if(force) showWinner();
  });
}

function subscribeVotes(qIdx){
  if(votesListener) votesListener.off();
  if(qIdx<0 || !questions[qIdx]) return;
  votesListener = db.ref('votes/'+qIdx);
  votesListener.on('value', snap=>{
    const votes = snap.val()||{};
    let max=-1, winners=[], parts=[];
    
    for(let i=0;i<questions[qIdx].options.length;i++){
      const c = votes[i]||0;
      parts.push(questions[qIdx].options[i]+': '+c);
      if(c > max){
        max = c;
        winners = [i];
      } else if(c === max){
        winners.push(i);
      }
    }
    
    let winnerText = '';
    if(max === 0 || winners.length > 1){
      const randomIndex = Math.floor(Math.random() * questions[qIdx].options.length);
      winnerText = questions[qIdx].options[randomIndex];
    } else {
      winnerText = questions[qIdx].options[winners[0]];
    }
    
    winnerEl.innerText = '🏆 ПОБЕДИТЕЛЬ: '+winnerText;
    winnerDetailEl.innerText = 'Голосов: '+max+' | '+parts.join(' | ');
  });
}

function startTimerDelay(start){
  clearInterval(timerInt); clearTimeout(timerOut);
  hideWinner();
  isTimerActive = true;
  
  const tick = () => {
    const elapsed = (Date.now()-start)/1000;
    const rem = Math.max(0,6-elapsed);
    timerEl.innerText = '⏳ '+Math.ceil(rem)+' сек';
    if(rem<=0){
      clearInterval(timerInt); clearTimeout(timerOut);
      isTimerActive = false;
      timerEl.innerText = '⏳ 0 сек';
      showWinner();
      if(current>=0 && questions[current]) updateWinner(current,true);
      updateButtons();
      
      clearPendingTimeouts();
      pendingWaitingTimeout = setTimeout(() => {
        if(!isTimerActive && current !== -1 && current !== -999){
          statusEl.style.opacity = '0';
          setTimeout(() => {
            if(!isTimerActive && current !== -1 && current !== -999){
              statusEl.innerText = '⏸️ Ожидание...';
              statusEl.style.opacity = '1';
            }
          }, 500);
        }
        pendingWaitingTimeout = null;
      }, 5000);
      
      pendingWinnerBlurTimeout = setTimeout(() => {
        if(!isTimerActive && current !== -1 && current !== -999){
          hideWinner();
        }
        pendingWinnerBlurTimeout = null;
      }, 30000);
    }
  };
  tick();
  timerInt = setInterval(tick,100);
  timerOut = setTimeout(()=>{
    if(isTimerActive){
      isTimerActive = false;
      showWinner();
      if(current>=0 && questions[current]) updateWinner(current,true);
      updateButtons();
    }
  },6500);
}

db.ref('currentQuestion').on('value', snap=>{
  const data = snap.val();
  if(!data) return;
  current = data.index;
  if(!loaded){
    statusEl.innerText = '⏳ Загрузка...';
  } else if(current === -1){
    statusEl.innerText = '⏸️ Ожидание...';
    timerEl.innerText = '⏳ -';
    hideWinner();
    winnerEl.innerText = '🏆 Победитель: ???';
    winnerDetailEl.innerText = '';
    if(votesListener) votesListener.off();
    clearTimeout(timerOut); clearInterval(timerInt);
    isTimerActive = false;
    clearPendingTimeouts();
    hideInstagramButton();
    updateButtons();
  } else if(current === -999){
    statusEl.innerText = '⏸️ Ожидание...';
    timerEl.innerText = '⏳ -';
    hideWinner();
    winnerEl.innerText = '🏆 Победитель: ???';
    winnerDetailEl.innerText = '';
    if(votesListener) votesListener.off();
    clearTimeout(timerOut); clearInterval(timerInt);
    isTimerActive = false;
    clearPendingTimeouts();
    hideInstagramButton();
    updateButtons();
  } else if(questions[current]){
    statusEl.style.opacity = '1';
    statusEl.innerText = '⚡ СЕЙЧАС: Вопрос '+(current+1)+': '+questions[current].text;
    startTimerDelay(data.startTime);
    subscribeVotes(current);
    updateWinner(current,false);
    hideInstagramButton();
    updateButtons();
  } else if(current >= questions.length){
    statusEl.innerText = '🏁 Спектакль завершён!';
    timerEl.innerText = '⏳ -';
    showInstagramButton();
    updateButtons();
  }
});

nextBtn.onclick = ()=>{
  if(!loaded || !questions.length){ alert('Загрузка...'); return; }
  clearPendingTimeouts();

  // ЕСЛИ это финальная кнопка — показываем Instagram
  if(current === questions.length - 1 && !isTimerActive){
    db.ref('showInstagram').set(Date.now());
    return;
  }

  if(current === -1 || current === -999){ setQuestion(0); return; }
  if(current < questions.length-1) setQuestion(current+1);
  else if(current === questions.length-1) statusEl.innerText = '🏁 Последний вопрос';
};

backBtn.onclick = ()=>{
  if(!loaded || !questions.length) return;
  clearPendingTimeouts();
  if(current === 0){
    setQuestion(0);
  } else if(isTimerActive){
    setQuestion(current - 1);
  } else {
    setQuestion(current);
  }
};

function updateButtons(){
  if(!loaded || !questions.length){
    nextBtn.innerText = 'Загрузка...';
    backBtn.innerText = 'Загрузка...';
    return;
  }

  // скрываем кнопку во время последнего вопроса (пока идёт таймер)
  if(current === questions.length - 1 && isTimerActive){
    nextBtn.style.display = 'none';
  } else {
    nextBtn.style.display = 'block';
  }

  if(current === -1 || current === -999){
    nextBtn.innerText = 'Далее: 1. '+questions[0].text.substring(0,30);
    nextBtn.style.background = '#4caf50';
  } else if(current === questions.length - 1){
    // ПОСЛЕ таймера — показываем розовую кнопку завершения
    if(!isTimerActive){
      nextBtn.innerHTML = '📸 Показать Инстаграм и завершить игру';
      nextBtn.style.background = '#e91e63';
    }
  } else if(current >= 0 && current < questions.length - 1){
    nextBtn.innerText = 'Далее: '+(current+2)+'. '+questions[current+1].text.substring(0,30);
    nextBtn.style.background = '#4caf50';
  } else {
    nextBtn.innerText = 'Далее';
    nextBtn.style.background = '#4caf50';
  }
  
  if(current >= 0 && questions[current]){
    if(current === 0){
      backBtn.innerText = '◀ Повторить: 1. '+questions[0].text.substring(0,30);
    } else if(isTimerActive){
      backBtn.innerText = '◀ Повторить: '+(current)+'. '+questions[current-1].text.substring(0,30);
    } else {
      backBtn.innerText = '◀ Повторить: '+(current+1)+'. '+questions[current].text.substring(0,30);
    }
  } else {
    backBtn.innerText = '◀ Назад';
  }
}

instagramBtn.onclick = () => {
  db.ref('showInstagram').set(Date.now());
};

document.getElementById('resetBtn').onclick = ()=>{
  if(!confirm('Полный сброс игры?')) return;
  clearPendingTimeouts();
  db.ref('votes').remove();
  db.ref('resetFlag').set(Date.now());
  db.ref('showInstagram').remove();
  setQuestion(-1);
};
</script>
</body>
</html>
