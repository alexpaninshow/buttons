<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
html, body { height:100%; margin:0; }

body {
  font-family:Arial;
  background:#111;
  color:white;
  display:flex;
  flex-direction:column;
  text-align:center;
}

#top { padding:20px; }

h1 { font-size:5vw; margin:0; }
#status { font-size:4vw; margin-top:10px; }
#timer { font-size:6vw; margin-top:10px; }
#result { font-size:5vw; margin-top:10px; }

#buttons {
  flex:1;
  display:flex;
  flex-direction:column;
  padding:10px;
}

button {
  margin:6px 0;
  font-size:4.5vw;
  font-weight:bold;
  border-radius:20px;
  border:4px solid transparent;
  color:white;
}

.next { background:#4caf50; flex:1.6; }
.back { background:orange; flex:0.7; margin-top:15px; }
.reset { background:red; flex:0.6; }

button:active {
  border:4px solid white;
}

/* модалка */
#confirmModal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
}

#confirmBox {
  background:#222;
  padding:30px;
  border-radius:20px;
  width:80%;
  max-width:400px;
}

.noMain {
  background:white;
  color:black;
  font-weight:900;
  padding:15px;
  margin:10px 0;
}

.yesSub {
  background:#666;
  color:#ddd;
  padding:12px;
}
</style>
</head>

<body>

<div id="top">
  <h1>Оператор</h1>
  <div id="status">Загрузка...</div>
  <div id="timer">⏳ -</div>
  <div id="result"></div>
</div>

<div id="buttons">
  <button id="nextBtn" class="next"></button>
  <button id="backBtn" class="back"></button>
  <button id="resetBtn" class="reset">Полный сброс</button>
</div>

<div id="confirmModal">
  <div id="confirmBox">
    <p>Вы уверены, что хотите полностью сбросить игру?</p>
    <button id="noBtn" class="noMain">Нет, вернуться в игру</button>
    <button id="yesBtn" class="yesSub">Да</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let questions = [];
let current = -1;
let prevQuestion = -1;
let timerInterval = null;

const status = document.getElementById("status");
const timerEl = document.getElementById("timer");
const resultEl = document.getElementById("result");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");

/* загрузка CSV */
fetch(CSV_URL)
.then(r=>r.text())
.then(text=>{
  const rows=text.trim().split('\n').map(r=>r.split(','));

  questions = rows.slice(1).map(c=>({
    text:(c[0]||"").trim(),
    options:c.slice(1).map(x=>x.trim()).filter(Boolean)
  }));

  updateButtons();
});

/* Firebase */
db.ref('currentQuestion').on('value', snap => {

  const val = snap.val();
  current = (val === null) ? -1 : Number(val);

  if(current >= 0){
    prevQuestion = current;
  }

  clearInterval(timerInterval);

  if(current === -999){
    status.innerText = "Смотрите на сцену";
    timerEl.innerText = "⏳ -";
    showResult();
  }
  else if(current >= 0 && questions[current]){
    status.innerText = "Сейчас: " + (current+1) + ". " + questions[current].text;
    resultEl.innerText = "";
    startTimer();
  }
  else{
    status.innerText = "Ожидание";
    timerEl.innerText = "⏳ -";
    resultEl.innerText = "";
  }

  updateButtons();
});

/* таймер */
function startTimer(){
  let t=5;
  timerEl.innerText="⏳ "+t;

  timerInterval=setInterval(()=>{
    t--;
    timerEl.innerText="⏳ "+t;

    if(t<=0){
      clearInterval(timerInterval);
      db.ref('currentQuestion').set(-999);
    }
  },1000);
}

/* результат */
function showResult(){

  if(prevQuestion < 0 || !questions[prevQuestion]) return;

  db.ref('votes/'+prevQuestion).once('value', snap => {

    const votes = snap.val() || {};
    const opts = questions[prevQuestion].options;

    let max = -1;
    let winnerIndex = -1;

    opts.forEach((opt, i) => {
      const v = votes[i] || 0;
      if(v > max){
        max = v;
        winnerIndex = i;
      }
    });

    if(winnerIndex !== -1){
      resultEl.innerText = "Победил: " + opts[winnerIndex] + " (" + max + ")";
    } else {
      resultEl.innerText = "Нет голосов";
    }

  });
}

/* кнопки */
nextBtn.onclick = ()=>{

  if(current === -1){
    db.ref('currentQuestion').set(0);
    return;
  }

  if(current === -999){
    if(prevQuestion < questions.length - 1){
      db.ref('currentQuestion').set(prevQuestion + 1);
    }
    return;
  }

  if(current < questions.length - 1){
    db.ref('currentQuestion').set(current + 1);
  }
};

backBtn.onclick = ()=>{

  if(current === -999){
    db.ref('currentQuestion').set(prevQuestion);
    return;
  }

  if(current > 0){
    db.ref('currentQuestion').set(current - 1);
  }
};

/* модалка */
const modal = document.getElementById("confirmModal");

document.getElementById("resetBtn").onclick = ()=>{
  modal.style.display="flex";
};

document.getElementById("noBtn").onclick = ()=>{
  modal.style.display="none";
};

document.getElementById("yesBtn").onclick = ()=>{
  db.ref('votes').remove();
  db.ref('currentQuestion').set(-1);
  prevQuestion = -1;
  modal.style.display="none";
};

/* подписи кнопок */
function updateButtons(){

  if(!questions.length) return;

  if(current === -1){
    nextBtn.innerText = "Начать: 1. " + questions[0].text;
    backBtn.style.display = "none";
    return;
  }

  if(current === -999){

    if(prevQuestion < questions.length - 1){
      nextBtn.innerText = "Далее: " + (prevQuestion+2) + ". " + questions[prevQuestion+1].text;
    } else {
      nextBtn.innerText = "Конец";
    }

    backBtn.style.display = "block";
    backBtn.innerText = "Назад: " + (prevQuestion+1) + ". " + questions[prevQuestion].text;

    return;
  }

  if(current < questions.length - 1){
    nextBtn.innerText = "Далее: " + (current+2) + ". " + questions[current+1].text;
  } else {
    nextBtn.innerText = "Конец";
  }

  if(current > 0){
    backBtn.style.display = "block";
    backBtn.innerText = "Назад: " + current + ". " + questions[current-1].text;
  } else {
    backBtn.style.display = "none";
  }
}
</script>

</body>
</html>
