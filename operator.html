<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
html, body { height:100%; margin:0; }

body {
  font-family:Arial;
  background:#111;
  color:white;
  display:flex;
  flex-direction:column;
  text-align:center;
}

#top { padding:20px; }

h1 { font-size:5vw; margin:0; }
#status { font-size:4vw; margin-top:10px; }
#timer { font-size:6vw; margin-top:10px; }
#result { font-size:5vw; margin-top:15px; color:#00e676; }

#buttons {
  flex:1;
  display:flex;
  flex-direction:column;
  padding:10px;
}

button {
  margin:6px 0;
  font-size:4.5vw;
  font-weight:bold;
  border-radius:20px;
  border:4px solid transparent;
  color:white;
}

.next { background:#4caf50; flex:1.6; }
.back { background:orange; flex:0.7; margin-top:15px; }
.reset { background:red; flex:0.6; }

button:active {
  border:4px solid white;
}
</style>
</head>

<body>

<div id="top">
  <h1>Оператор</h1>
  <div id="status">Загрузка...</div>
  <div id="timer">⏳ -</div>
  <div id="result"></div>
</div>

<div id="buttons">
  <button id="nextBtn" class="next"></button>
  <button id="backBtn" class="back"></button>
  <button id="resetBtn" class="reset">Полный сброс</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
var CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

var db = firebase.database();

var questions = [];
var current = -1;
var lastQuestion = -1;
var timerInterval = null;

var status = document.getElementById("status");
var timerEl = document.getElementById("timer");
var resultEl = document.getElementById("result");

var nextBtn = document.getElementById("nextBtn");
var backBtn = document.getElementById("backBtn");

/* CSV */
fetch(CSV_URL)
.then(r => r.text())
.then(text => {
  var rows = text.trim().split('\n').map(r => r.split(','));

  questions = rows.slice(1).map(c => ({
    text:(c[0] || "").trim(),
    options:c.slice(1).map(x => x.trim()).filter(Boolean)
  }));

  updateButtons();
});

/* Firebase */
db.ref('currentQuestion').on('value', snap => {

  current = snap.val();

  if(current >= 0){
    lastQuestion = current;
  }

  clearInterval(timerInterval);

  if(current === -999){
    status.innerText = "Ожидание...";
    timerEl.innerText = "⏳ -";
    showResult(); // отдельно
  }
  else if(current >= 0 && questions[current]){
    status.innerText = "Сейчас: " + (current+1) + ". " + questions[current].text;
    resultEl.innerText = "";
    startTimer();
  }
  else{
    status.innerText = "Ожидание...";
    timerEl.innerText = "⏳ -";
    resultEl.innerText = "";
  }

  updateButtons();
});

/* таймер */
function startTimer(){

  var t = 5;
  timerEl.innerText = "⏳ " + t;

  timerInterval = setInterval(() => {
    t--;
    timerEl.innerText = "⏳ " + t;

    if(t <= 0){
      clearInterval(timerInterval);
      db.ref('currentQuestion').set(-999);
    }
  },1000);
}

/* результат (ПОЛНОСТЬЮ ОТДЕЛЁН) */
function showResult(){

  if(lastQuestion < 0 || !questions[lastQuestion]) return;

  db.ref('votes/'+lastQuestion).once('value', snap => {

    var votes = snap.val() || {};
    var opts = questions[lastQuestion].options;

    var max = -1;
    var countMax = 0;
    var winner = -1;

    opts.forEach((opt,i)=>{
      var v = votes[i] || 0;

      if(v > max){
        max = v;
        winner = i;
        countMax = 1;
      } 
      else if(v === max){
        countMax++;
      }
    });

    if(max <= 0 || countMax > 1){
      resultEl.innerText = "Ничья";
    } else {
      resultEl.innerText = "Победил: " + opts[winner] + " (" + max + ")";
    }

  });
}

/* КНОПКИ */

nextBtn.onclick = () => {

  if(!questions.length) return;

  if(current === -1){
    db.ref('currentQuestion').set(0);
    return;
  }

  if(current === -999){
    if(lastQuestion < questions.length - 1){
      db.ref('currentQuestion').set(lastQuestion + 1);
    }
    return;
  }

  if(current < questions.length - 1){
    db.ref('currentQuestion').set(current + 1);
  }
};

backBtn.onclick = () => {

  if(current === -999){
    if(lastQuestion > 0){
      db.ref('currentQuestion').set(lastQuestion - 1);
    }
    return;
  }

  if(current > 0){
    db.ref('currentQuestion').set(current - 1);
  }
};

/* сброс */
document.getElementById("resetBtn").onclick = () => {

  if(!confirm("Вы уверены, что хотите полностью сбросить игру?")) return;

  db.ref('votes').remove();
  db.ref('currentQuestion').set(-1);
};

/* подписи */
function updateButtons(){

  if(!questions.length) return;

  var base = (current === -999) ? lastQuestion : current;

  if(base < questions.length - 1){
    nextBtn.innerText = "Далее: " + (base+2) + ". " + questions[base+1].text;
  } else {
    nextBtn.innerText = "Конец";
  }

  if(base > 0){
    backBtn.style.display = "block";
    backBtn.innerText = "Назад: " + base + ". " + questions[base-1].text;
  } else {
    backBtn.style.display = "none";
  }
}
</script>

</body>
</html>
