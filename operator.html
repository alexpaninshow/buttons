<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оператор</title>
<style>
body { font-family:'Segoe UI',sans-serif; text-align:center; padding:50px; background:linear-gradient(120deg,#222,#555); color:white; }
button { font-size:24px; padding:25px 50px; border-radius:12px; border:none; background:#4caf50; color:white; cursor:pointer; transition:0.3s; }
button:hover{background:#66bb6a;}
</style>
</head>
<body>

<h1>Оператор</h1>
<button onclick="nextQuestion()">Следующий вопрос</button>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// 🔴 Вставляем тот же firebaseConfig
const firebaseConfig = {
  apiKey: "ВАШ_API_KEY",
  authDomain: "ВАШ_PROJECT_ID.firebaseapp.com",
  databaseURL: "https://ВАШ_PROJECT_ID-default-rtdb.firebaseio.com",
  projectId: "ВАШ_PROJECT_ID",
  storageBucket: "ВАШ_PROJECT_ID.appspot.com",
  messagingSenderId: "ВАШ_SENDER_ID",
  appId: "ВАШ_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let current=0;
const questions=[
  { text:"Кого герой выбирает?", options:["Поцеловать","Укусить","Плюнуть"] },
  { text:"Как героиня реагирует?", options:["Улыбка","Плачет","Уходит"] }
];

function nextQuestion(){
  if(current>=questions.length){ alert("Все вопросы пройдены"); return; }
  db.ref('currentQuestion').set(current);
  current++;
  alert("Вопрос переключен: "+questions[current-1].text);
}
</script>
</body>
</html>
