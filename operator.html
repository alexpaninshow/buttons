<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
html, body { height:100%; margin:0; }

body {
  font-family:Arial;
  background:#111;
  color:white;
  display:flex;
  flex-direction:column;
  text-align:center;
}

#top { padding:20px; }

h1 { font-size:5vw; margin:0; }
#status { font-size:4vw; margin-top:10px; }
#timer { font-size:6vw; margin-top:10px; }

#buttons {
  flex:1;
  display:flex;
  flex-direction:column;
  padding:10px;
}

button {
  margin:8px 0;
  font-size:5vw;
  font-weight:bold;
  border-radius:20px;
  border:none;
  color:white;
}

.next { background:#4caf50; flex:1.5; }
.back { background:orange; flex:0.8; }
.reset { background:red; flex:0.7; }
</style>
</head>

<body>

<div id="top">
  <h1>Оператор</h1>
  <div id="status">Загрузка...</div>
  <div id="timer">⏳ -</div>
</div>

<div id="buttons">
  <button id="nextBtn" class="next"></button>
  <button id="backBtn" class="back"></button>
  <button id="resetBtn" class="reset">Сброс</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let questions = [];
let current = -1;
let prevQuestion = -1;
let timerInterval = null;

const status = document.getElementById("status");
const timerEl = document.getElementById("timer");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");

/* CSV */
fetch(CSV_URL)
.then(r=>r.text())
.then(text=>{
  const rows=text.trim().split('\n').map(r=>r.split(','));

  questions = rows.slice(1).map(c=>({
    text:(c[0]||"").trim(),
    options:c.slice(1).filter(Boolean)
  }));

  updateButtons();
});

/* Firebase */
db.ref('currentQuestion').on('value', snap => {

  const val = snap.val();
  const newVal = (val === null) ? -1 : Number(val);

  // запоминаем предыдущий вопрос
  if(newVal >= 0){
    prevQuestion = newVal;
  }

  current = newVal;

  clearInterval(timerInterval);

  if(current === -999){
    status.innerText = "Смотрите на сцену";
    timerEl.innerText = "⏳ -";
  }
  else if(current >= 0 && questions[current]){
    status.innerText = "Сейчас: " + (current+1) + ". " + questions[current].text;
    startTimer();
  }
  else{
    status.innerText = "Ожидание";
    timerEl.innerText = "⏳ -";
  }

  updateButtons();
});

/* таймер */
function startTimer(){

  let t = 5;
  timerEl.innerText = "⏳ " + t;

  timerInterval = setInterval(()=>{
    t--;
    timerEl.innerText = "⏳ " + t;

    if(t <= 0){
      clearInterval(timerInterval);
      db.ref('currentQuestion').set(-999);
    }

  },1000);
}

/* управление */
nextBtn.onclick = ()=>{

  if(current === -1){
    db.ref('currentQuestion').set(0);
  }
  else if(current === -999){
    db.ref('currentQuestion').set(prevQuestion + 1);
  }
  else{
    db.ref('currentQuestion').set(current + 1);
  }
};

backBtn.onclick = ()=>{

  if(current === -999){
    db.ref('currentQuestion').set(prevQuestion);
  }
  else if(current > 0){
    db.ref('currentQuestion').set(current - 1);
  }
};

document.getElementById("resetBtn").onclick = ()=>{
  db.ref('currentQuestion').set(-1);
  prevQuestion = -1;
};

/* подписи */
function updateButtons(){

  if(!questions.length) return;

  if(current === -1){
    nextBtn.innerText = "Начать: 1. " + questions[0].text;
    backBtn.style.display = "none";
    return;
  }

  if(current === -999){

    nextBtn.innerText = "Далее: " + (prevQuestion+2) + ". " + questions[prevQuestion+1]?.text;
    backBtn.style.display = "block";

    if(prevQuestion >= 0){
      backBtn.innerText = "Назад: " + (prevQuestion+1) + ". " + questions[prevQuestion].text;
    }

    return;
  }

  nextBtn.innerText = "Далее: " + (current+2) + ". " + questions[current+1]?.text;

  backBtn.style.display = current > 0 ? "block" : "none";

  if(current > 0){
    backBtn.innerText = "Назад: " + current + ". " + questions[current-1].text;
  }
}
</script>

</body>
</html>
