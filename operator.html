<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

#status{font-size:24px;margin-bottom:10px}
#timer{font-size:30px;margin-bottom:20px}

#buttons{
  width:300px;
  display:flex;
  flex-direction:column;
}

button{
  margin:5px 0;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:10px;
  color:#fff;
}

.next{background:#4caf50}
.back{background:orange}
.reset{background:red}

#result{margin-top:20px;font-size:20px}
</style>
</head>

<body>

<div id="status">Загрузка...</div>
<div id="timer"></div>

<div id="buttons">
<button id="nextBtn" class="next"></button>
<button id="backBtn" class="back"></button>
<button id="resetBtn" class="reset">Полный сброс</button>
</div>

<div id="result"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});
var db=firebase.database();

var questions=[];
var current=-1;

/* CSV */
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQVLFjRWrX9DiTY9f32pSs8v0Y3MfxLSFC-G-Gi43Z37Lt75BMj-1J8nQGNzgAQdOsR2_pKUmdxU7G6/pub?gid=0&single=true&output=csv")
.then(r=>r.text())
.then(t=>{
  if(t.indexOf("<!DOCTYPE")!==-1){alert("Ошибка таблицы");return;}

  var rows=t.trim().split('\n');

  for(var i=1;i<rows.length;i++){
    var cols=rows[i].split(',');
    var q={text:cols[0],options:[]};

    for(var j=1;j<cols.length;j++){
      if(cols[j].trim()!=="") q.options.push(cols[j].trim());
    }

    questions.push(q);
  }

  updateButtons();
});

/* SYNC */
db.ref("currentQuestion").on("value",s=>{
  var d=s.val(); if(!d) return;

  current=d.index;

  updateStatus(d);
  updateButtons();
  showResult();

  if(current>=0){
    setTimeout(()=>{
      db.ref("currentQuestion").once("value",snap=>{
        var now=snap.val();
        if(now && now.index===current){
          db.ref("currentQuestion").set({index:-999,startTime:Date.now()});
        }
      });
    },5000);
  }
});

/* STATUS */
function updateStatus(d){
  if(current>=0 && questions[current]){
    status.innerText=(current+1)+". "+questions[current].text;
    startTimer(d.startTime);
  }else if(current===-999){
    status.innerText="Ожидание...";
    timer.innerText="";
  }else{
    status.innerText="Старт";
    timer.innerText="";
  }
}

/* TIMER */
function startTimer(st){
  clearInterval(window.ti);

  function tick(){
    var t=5-Math.floor((Date.now()-st)/1000);
    if(t<0)t=0;
    timer.innerText="⏳ "+t;
  }

  tick();
  window.ti=setInterval(tick,200);
}

/* КНОПКИ */
nextBtn.onclick=function(){
  if(current<0) setQ(0);
  else if(current<questions.length-1) setQ(current+1);
};

backBtn.onclick=function(){
  if(current>0) setQ(current-1);
};

function setQ(i){
  db.ref("currentQuestion").set({
    index:i,
    startTime:Date.now()
  });
}

/* ПОДПИСИ */
function updateButtons(){

  if(!questions.length) return;

  backBtn.style.display = current>0 ? "block":"none";

  if(current>=0 && current<questions.length-1){
    nextBtn.innerText="Далее: "+(current+2);
  }else{
    nextBtn.innerText="Начать";
  }

  if(current>0){
    backBtn.innerText="Назад: "+current;
  }
}

/* РЕЗУЛЬТАТ */
function showResult(){
  if(current<0) return;

  db.ref("votes/"+current).once("value",s=>{
    var v=s.val();

    if(!v){
      result.innerText="Ничья";
      return;
    }

    var max=0,idx=-1,tie=false;

    for(var k in v){
      if(v[k]>max){max=v[k];idx=k;tie=false;}
      else if(v[k]===max){tie=true;}
    }

    if(max===0||tie){
      result.innerText="Ничья";
    }else{
      result.innerText="Победитель: "+questions[current].options[idx];
    }
  });
}

/* СБРОС */
resetBtn.onclick=function(){
  if(!confirm("Вы уверены, что хотите полностью сбросить игру?")) return;

  db.ref("votes").remove();
  db.ref("currentQuestion").set({index:-1,startTime:Date.now()});
};
</script>

</body>
</html>
