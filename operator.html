<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оператор</title>
<style>
body { font-family:'Segoe UI',sans-serif; text-align:center; padding:50px; background:#333; color:white; }
button { font-size:24px; padding:25px 50px; border-radius:12px; border:none; background:#4caf50; color:white; margin:10px; cursor:pointer; }
button.reset { background:#f44336; }
#nextQuestionDisplay { font-size:18px; font-style:italic; margin-top:20px; }
#timer { font-size:22px; margin-top:20px; color:#ffeb3b; }
</style>
</head>
<body>

<h1 id="title">Шоу господина Панина</h1>

<button id="startBtn">Начать игру</button>
<button id="nextBtn" style="display:none;">Следующий вопрос</button>
<button id="resetBtn" class="reset" style="display:none;">Сбросить игру</button>

<div id="nextQuestionDisplay"></div>
<div id="timer"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCnYKEXEd207E9LXgCBupqc3kjbEbk1NTc",
  authDomain: "buttons-show.firebaseapp.com",
  databaseURL: "https://buttons-panin-default-rtdb.firebaseio.com",
  projectId: "buttons-show",
  storageBucket: "buttons-show.appspot.com",
  messagingSenderId: "145808897789",
  appId: "1:145808897789:web:900445fca031ece7e53094"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const questions = [
  { text:"Кого поцелует герой?", options:["Девушку","Себя","Кого-то из зрителей"] },
  { text:"Какой жанр хотите?", options:["Комедия","Трагедия","Фарс"] },
  { text:"Вам понравился наш спектакль?", options:["Да","Нет",""] }
];

const refQuestion = db.ref('currentQuestion');
const refTimer = db.ref('timerSeconds');

const title = document.getElementById("title");
const startBtn = document.getElementById("startBtn");
const nextBtn = document.getElementById("nextBtn");
const resetBtn = document.getElementById("resetBtn");
const nextQuestionDisplay = document.getElementById("nextQuestionDisplay");
const timerDiv = document.getElementById("timer");

let current = -1;
let timerInterval;
const questionTime = 15; // секунд на каждый вопрос

// Начать игру — запускает первый вопрос у всех
startBtn.onclick = () => {
  current = 0;
  refQuestion.set(current);
  startBtn.style.display = "none";
  nextBtn.style.display = "inline-block";
  resetBtn.style.display = "inline-block";
  title.innerText = questions[0].text;
  updateNextDisplay();
  startTimer(questionTime);
};

// Следующий вопрос
nextBtn.onclick = () => {
  if(current < questions.length - 1){
    current++;
    refQuestion.set(current);
    title.innerText = questions[current].text;
    updateNextDisplay();
    startTimer(questionTime);
  } else {
    current = questions.length;
    refQuestion.set(current);
    nextBtn.style.display = "none";
    title.innerText = "Конец вопросов";
    nextQuestionDisplay.innerText = "";
    clearInterval(timerInterval);
    timerDiv.innerText = "";
    refTimer.set(0);
  }
};

// Обновление текста следующего вопроса под кнопками
function updateNextDisplay(){
  if(current < questions.length - 1){
    nextQuestionDisplay.innerText = "Next: " + questions[current + 1].text;
  } else {
    nextQuestionDisplay.innerText = "Конец вопросов";
  }
}

// Таймер
function startTimer(seconds){
  clearInterval(timerInterval);
  refTimer.set(seconds); // синхронизация таймера с Firebase
  timerInterval = setInterval(()=>{
    refTimer.once('value').then(snap=>{
      let sec = snap.val();
      if(sec > 0){
        sec--;
        refTimer.set(sec);
      } else {
        clearInterval(timerInterval);
      }
    });
  },1000);
}

// Сброс игры
resetBtn.onclick = () => {
  const ok = confirm("Ты уверен, что хочешь начать заново?");
  if(ok){
    refQuestion.set(-1);
    current = -1;
    startBtn.style.display = "inline-block";
    nextBtn.style.display = "none";
    resetBtn.style.display = "none";
    title.
      innerText = "Шоу господина Панина";
    nextQuestionDisplay.innerText = "";
    clearInterval(timerInterval);
    timerDiv.innerText = "";
    refTimer.set(0);
  }
};

// Отображение таймера
refTimer.on('value', s=>{
  let sec = s.val();
  if(sec > 0){
    timerDiv.innerText = "Осталось секунд: " + sec;
  } else {
    timerDiv.innerText = "";
  }
});
</script>
</body>
</html>
