<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  display:flex;
  flex-direction:column;
  text-align:center;
}

#top{padding:20px}
h1{margin:0}

#status{font-size:22px;margin-top:10px}
#timer{font-size:28px;margin-top:10px}
#winner{font-size:24px;margin-top:15px;padding:10px;background:#222;border-radius:20px;color:#ffd700}

#buttons{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:10px;
}

button{
  margin:6px 0;
  font-size:18px;
  font-weight:bold;
  border-radius:20px;
  border:none;
  color:white;
  cursor:pointer;
  padding:15px;
}

.next{background:#4caf50;flex:1.6}
.back{background:orange;flex:1}
.reset{background:red;flex:1}

button:active{transform:scale(0.98)}
</style>
</head>

<body>

<div id="top">
<h1>Оператор</h1>
<div id="status">Загрузка...</div>
<div id="timer">⏳ -</div>
<div id="winner">🏆 Победитель: --</div>
</div>

<div id="buttons">
<button id="nextBtn" class="next"></button>
<button id="backBtn" class="back"></button>
<button id="resetBtn" class="reset">Полный сброс</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
var CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

var db = firebase.database();

var questions = [];
var current = -1;

var status = document.getElementById("status");
var timerEl = document.getElementById("timer");
var winnerEl = document.getElementById("winner");
var nextBtn = document.getElementById("nextBtn");
var backBtn = document.getElementById("backBtn");

/* CSV */
fetch(CSV_URL)
.then(r=>r.text())
.then(text=>{
  var rows = text.trim().split('\n');

  for(var i=1;i<rows.length;i++){
    var cols = rows[i].split(',');
    var q={text:cols[0],options:[]};

    for(var j=1;j<cols.length;j++){
      if(cols[j]) q.options.push(cols[j]);
    }

    questions.push(q);
  }

  updateButtons();
});

/* установка вопроса */
function setQuestion(i){
  db.ref('currentQuestion').set({
    index:i,
    startTime:Date.now()
  });
}

/* определение победителя по голосам */
function updateWinner(questionIndex){
  if(questionIndex < 0 || !questions[questionIndex]) {
    winnerEl.innerText = "🏆 Победитель: --";
    return;
  }
  
  db.ref('votes/'+questionIndex).once('value', function(snap){
    var votes = snap.val() || {};
    var maxVotes = -1;
    var winnerIndex = -1;
    
    for(var i=0; i<questions[questionIndex].options.length; i++){
      var count = votes[i] || 0;
      if(count > maxVotes){
        maxVotes = count;
        winnerIndex = i;
      }
    }
    
    if(winnerIndex !== -1 && maxVotes > 0){
      var winnerText = questions[questionIndex].options[winnerIndex];
      winnerEl.innerText = "🏆 Победитель: " + winnerText + " (" + maxVotes + " голосов)";
    } else if(winnerIndex !== -1 && maxVotes === 0){
      winnerEl.innerText = "🏆 Победитель: пока нет голосов";
    } else {
      winnerEl.innerText = "🏆 Победитель: --";
    }
  });
}

/* sync */
db.ref('currentQuestion').on('value', snap=>{
  var data = snap.val();
  if(!data) return;

  current = data.index;

  if(current === -1){
    status.innerText = "Сейчас: Старт";
    timerEl.innerText="⏳ -";
    winnerEl.innerText = "🏆 Победитель: --";
  }
  else if(current === -999){
    status.innerText = "Сейчас: Ожидание...";
    timerEl.innerText="⏳ -";
    winnerEl.innerText = "🏆 Победитель: --";
  }
  else if(questions[current]){
    status.innerText = "Сейчас: " + (current+1) + ". " + questions[current].text;
    startTimer(data.startTime);
    updateWinner(current);
  }

  updateButtons();
});

/* таймер */
function startTimer(startTime){
  clearInterval(window.timerInt);

  function tick(){
    var t = 5 - Math.floor((Date.now()-startTime)/1000);
    if(t<0)t=0;
    timerEl.innerText="⏳ "+t;
  }

  tick();
  window.timerInt=setInterval(tick,300);
}

/* кнопки */
nextBtn.onclick=function(){
  if(current === -1 || current === -999){
    setQuestion(0);
    return;
  }

  if(current < questions.length-1){
    setQuestion(current+1);
  }
};

backBtn.onclick=function(){
  if(current === 0){
    setQuestion(-1);
    return;
  }

  if(current > 0){
    setQuestion(current-1);
  }
};

/* подписи */
function updateButtons(){
  if(!questions.length) return;

  if(current <= 0){
    backBtn.innerText = "Назад: Старт";
  } else {
    backBtn.innerText = "Назад: " + (current) + ". " + questions[current-1].text;
  }

  if(current === -1 || current === -999){
    nextBtn.innerText = "Далее: 1. " + questions[0].text;
  }
  else if(current < questions.length-1){
    nextBtn.innerText = "Далее: " + (current+2) + ". " + questions[current+1].text;
  }
  else{
    nextBtn.innerText = "Конец";
  }
}

/* сброс */
document.getElementById("resetBtn").onclick=function(){
  if(!confirm("Вы уверены, что хотите полностью сбросить игру?")) return;

  db.ref('votes').remove();
  /* сбрасываем также localStorage у всех зрителей — через обновление версии */
  db.ref('resetFlag').set(Date.now());
  setQuestion(-1);
};

/* слушаем сброс для очистки localStorage у зрителей */
db.ref('resetFlag').on('value', function(snap){
  if(snap.val()){
    /* зрители сами очистят localStorage при следующем обновлении */
  }
});
</script>

</body>
</html>
