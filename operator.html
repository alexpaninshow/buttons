<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
html, body { height:100%; margin:0; }

body {
  font-family:Arial;
  background:#111;
  color:white;
  display:flex;
  flex-direction:column;
  text-align:center;
}

#top { padding:20px; }

h1 { font-size:5vw; margin:0; }
#status { font-size:4vw; margin-top:10px; }
#timer { font-size:6vw; margin-top:10px; }
#result { font-size:5vw; margin-top:10px; }

#buttons {
  flex:1;
  display:flex;
  flex-direction:column;
  padding:10px;
}

button {
  margin:8px 0;
  font-size:5vw;
  font-weight:bold;
  border-radius:20px;
  border:none;
  color:white;
}

.next { background:#4caf50; flex:1.5; }
.back { background:orange; flex:0.8; }
.reset { background:red; flex:0.7; }

/* модалка */
#confirmModal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
}

#confirmBox {
  background:#222;
  padding:30px;
  border-radius:20px;
  width:80%;
  max-width:400px;
}

.noMain {
  background:white;
  color:black;
  font-weight:900;
  padding:15px;
  margin:10px 0;
}

.yesSub {
  background:#666;
  color:#ddd;
  padding:12px;
}
</style>
</head>

<body>

<div id="top">
  <h1>Оператор</h1>
  <div id="status">Загрузка...</div>
  <div id="timer">⏳ -</div>
  <div id="result"></div>
</div>

<div id="buttons">
  <button id="nextBtn" class="next"></button>
  <button id="backBtn" class="back"></button>
  <button id="resetBtn" class="reset">Полный сброс</button>
</div>

<div id="confirmModal">
  <div id="confirmBox">
    <p>Вы уверены?</p>
    <button id="noBtn" class="noMain">Нет, вернуться в игру</button>
    <button id="yesBtn" class="yesSub">Да</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db=firebase.database();

let questions=[];
let current=-1;
let prev=-1;

const status=document.getElementById("status");
const timer=document.getElementById("timer");
const result=document.getElementById("result");

fetch(CSV_URL).then(r=>r.text()).then(t=>{
  questions=t.split('\n').slice(1).map(r=>{
    let c=r.split(',');
    return {text:c[0],options:c.slice(1)};
  });
});

db.ref('currentQuestion').on('value',snap=>{
  current=snap.val();

  if(current>=0) prev=current;

  if(current===-999){
    status.innerText="Смотрите на сцену";
    showResult();
  } else if(current>=0){
    status.innerText=questions[current]?.text||"";
    result.innerText="";
  } else {
    status.innerText="Ожидание";
  }
});

function showResult(){
  db.ref('votes/'+prev).once('value',snap=>{
    let v=snap.val()||{};
    let max=-1,iMax=-1;

    questions[prev].options.forEach((o,i)=>{
      let val=v[i]||0;
      if(val>max){max=val;iMax=i;}
    });

    if(iMax>=0){
      result.innerText="Победил: "+questions[prev].options[iMax]+" ("+max+")";
    } else result.innerText="Нет голосов";
  });
}

document.getElementById("nextBtn").onclick=()=>{
  if(current<questions.length-1) db.ref('currentQuestion').set(current+1);
};

document.getElementById("backBtn").onclick=()=>{
  if(current>0) db.ref('currentQuestion').set(current-1);
};

document.getElementById("resetBtn").onclick=()=>{
  document.getElementById("confirmModal").style.display="flex";
};

document.getElementById("noBtn").onclick=()=>{
  confirmModal.style.display="none";
};

document.getElementById("yesBtn").onclick=()=>{
  db.ref('votes').remove();
  db.ref('currentQuestion').set(-1);
  confirmModal.style.display="none";
};
</script>

</body>
</html>
