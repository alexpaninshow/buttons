<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
body {
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}

#status { font-size:22px; margin-bottom:10px; }
#timer { font-size:40px; margin-bottom:20px; }

button {
  width:80%;
  font-size:18px;
  padding:12px;
  margin:8px auto;
  display:block;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.next { background:#4caf50; }
.back { background:orange; }
.reset { background:red; }
.repeat { background:#2196f3; }
</style>
</head>

<body>

<h1>Оператор</h1>

<div id="status">Загрузка...</div>
<div id="timer">⏳ -</div>

<button id="nextBtn" class="next"></button>
<button id="backBtn" class="back"></button>
<button id="repeatBtn" class="repeat">Повторить вопрос</button>
<button id="resetBtn" class="reset">Сброс</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let questions = [];
let current = -1;
let timerInterval = null;

const status = document.getElementById("status");
const timerEl = document.getElementById("timer");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");

/* загрузка */
fetch(CSV_URL)
.then(r => r.text())
.then(text => {
  const rows = text.trim().split('\n').map(r => r.split(','));

  questions = rows.slice(1).map(cols => ({
    text:(cols[0]||"").trim(),
    options:cols.slice(1).map(c=>c.trim()).filter(Boolean)
  }));

  updateButtons();
});

/* слушаем */
db.ref('currentQuestion').on('value', snap => {

  current = snap.val() ?? -1;

  if(timerInterval){
    clearInterval(timerInterval);
    timerInterval = null;
  }

  if(current === -1){
    status.innerText = "Ожидание";
    timerEl.innerText = "⏳ -";
  } else if(current >= 0){
    status.innerText = (current+1) + ". " + questions[current].text;
    startTimer();
  }

  updateButtons();
});

/* таймер */
function startTimer(){
  let t = 5;
  timerEl.innerText = "⏳ " + t;

  timerInterval = setInterval(()=>{
    t--;

    if(t <= 0){
      clearInterval(timerInterval);
      timerEl.innerText = "⏳ 0";
    } else {
      timerEl.innerText = "⏳ " + t;
    }

  },1000);
}

/* переход */
function showQuestion(i){
  db.ref('currentQuestion').set(i);
}

/* кнопки */
nextBtn.onclick = ()=>{
  if(!questions.length) return;

  if(current === -1){
    showQuestion(0);
  } else if(current < questions.length - 1){
    showQuestion(current + 1);
  }
};

backBtn.onclick = ()=>{
  if(current > 0){
    showQuestion(current - 1);
  }
};

repeatBtn.onclick = ()=>{
  if(current >= 0){
    showQuestion(current);
  }
};

resetBtn.onclick = ()=>{
  db.ref('currentQuestion').set(-1);
};

/* подписи */
function updateButtons(){
  if(!questions.length) return;

  if(current === -1){
    nextBtn.innerText = "Начать";
    backBtn.style.display = "none";
    return;
  }

  nextBtn.innerText = "Далее";
  backBtn.style.display = "block";
}
</script>

</body>
</html>
