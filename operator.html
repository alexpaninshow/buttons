<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
body { margin:0; display:flex; font-family:Arial; background:#111; color:white; }

#left { flex:1; display:flex; flex-direction:column; text-align:center; }

#top { padding:20px; }
#status { font-size:22px; }
#timer { font-size:28px; margin-top:10px; }

#buttons { flex:1; display:flex; flex-direction:column; padding:10px; }

button { margin:6px 0; font-size:18px; padding:10px; border-radius:15px; border:none; }
.next{background:#4caf50;}
.back{background:orange;}
.reset{background:red;}

#viewer { width:280px; background:#000; padding:10px; }
#vTitle { font-size:16px; }
#vBar { height:8px; background:lime; width:100%; margin:8px 0; }
</style>
</head>

<body>

<div id="left">
<div id="top">
<div id="status">Загрузка...</div>
<div id="timer">⏳ -</div>
</div>

<div id="buttons">
<button id="nextBtn" class="next"></button>
<button id="backBtn" class="back"></button>
<button id="resetBtn" class="reset">Полный сброс</button>
</div>
</div>

<div id="viewer">
<div id="vTitle">...</div>
<div id="vBar"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"});
var db=firebase.database();

var questions=[];
var current=-1;

fetch("https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0")
.then(r=>r.text())
.then(t=>{
  var rows=t.trim().split('\n');
  for(var i=1;i<rows.length;i++){
    var c=rows[i].split(',');
    var q={text:c[0],options:[]};
    for(var j=1;j<c.length;j++) if(c[j]) q.options.push(c[j]);
    questions.push(q);
  }
  updateButtons();
});

/* sync */
db.ref("currentQuestion").on("value",function(snap){
  var d=snap.val(); if(!d) return;
  current=d.index;

  if(current>=0 && questions[current]){
    document.getElementById("status").innerText=(current+1)+". "+questions[current].text;
    startTimer(d.startTime);
  }
  else if(current===-999){
    document.getElementById("status").innerText="Ожидание...";
  }
  else{
    document.getElementById("status").innerText="Старт";
  }

  updateButtons();
});

/* таймер */
function startTimer(st){
  clearInterval(window.ti);
  function tick(){
    var t=5-Math.floor((Date.now()-st)/1000);
    if(t<0)t=0;
    document.getElementById("timer").innerText="⏳ "+t;
  }
  tick();
  window.ti=setInterval(tick,300);
}

/* кнопки */
document.getElementById("nextBtn").onclick=function(){
  if(current<0) setQ(0);
  else if(current<questions.length-1) setQ(current+1);
};

document.getElementById("backBtn").onclick=function(){
  if(current>0) setQ(current-1);
};

function setQ(i){
  db.ref("currentQuestion").set({index:i,startTime:Date.now()});
}

/* подписи */
function updateButtons(){
  if(!questions.length) return;

  var next=document.getElementById("nextBtn");
  var back=document.getElementById("backBtn");

  if(current<=0){
    back.style.display="none";
  } else {
    back.style.display="block";
    back.innerText="Назад: "+current;
  }

  if(current<questions.length-1){
    next.innerText="Далее: "+(current+2);
  } else {
    next.innerText="Конец";
  }
}

/* сброс */
document.getElementById("resetBtn").onclick=function(){
  if(!confirm("Вы уверены?")) return;
  db.ref("votes").remove();
  setQ(-1);
};
</script>
</body>
</html>
