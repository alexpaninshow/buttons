<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
body{margin:0;display:flex;background:#111;color:#fff;font-family:Arial}

#left{flex:1;padding:20px;text-align:center}

#status{font-size:22px;margin-bottom:10px}
#timer{font-size:28px}

button{margin:5px;padding:12px;font-size:16px;border:none;border-radius:10px;color:#fff}
.next{background:#4caf50}
.back{background:orange}
.reset{background:red}

#viewer{width:300px;background:#000;padding:10px}
.vOpt{background:#333;margin:4px;padding:6px;border-radius:6px}
.sel{background:#4caf50}
#vBar{height:8px;background:lime;width:100%}
</style>
</head>

<body>

<div id="left">
<div id="status">Загрузка...</div>
<div id="timer">⏳</div>

<button id="nextBtn" class="next"></button>
<button id="backBtn" class="back"></button>
<button id="resetBtn" class="reset">Полный сброс</button>

<div id="result"></div>
</div>

<div id="viewer">
<div id="vTitle"></div>
<div id="vBar"></div>
<div id="vOpts"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"});
var db=firebase.database();

var questions=[],current=-1;
var users={},activeUser=null;

/* CSV */
fetch("https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0")
.then(r=>r.text())
.then(t=>{
  var rows=t.trim().split('\n');
  for(var i=1;i<rows.length;i++){
    var c=rows[i].split(',');
    var q={text:c[0],options:[]};
    for(var j=1;j<c.length;j++) if(c[j]) q.options.push(c[j]);
    questions.push(q);
  }
  updateButtons();
});

/* USERS */
db.ref("users").on("value",function(s){
  users=s.val()||{};
  pickUser();
});

function pickUser(){
  var now=Date.now();
  var alive=[];
  for(var id in users){
    if(now-users[id].t<5000) alive.push(id);
  }

  if(!alive.length){activeUser=null;return;}

  if(!activeUser || !users[activeUser] || (now-users[activeUser].t>5000)){
    activeUser=alive[Math.floor(Math.random()*alive.length)];
  }
}

/* SYNC */
db.ref("currentQuestion").on("value",function(s){

  var d=s.val(); if(!d) return;
  current=d.index;

  updateStatus(d);
  updateButtons();
  updateViewer(d);
  showResult();
});

/* STATUS */
function updateStatus(d){
  if(current>=0 && questions[current]){
    status.innerText=(current+1)+". "+questions[current].text;
    startTimer(d.startTime);
  } else if(current===-999){
    status.innerText="Ожидание...";
  } else {
    status.innerText="Старт";
  }
}

/* TIMER */
function startTimer(st){
  clearInterval(window.ti);
  function t(){
    var s=5-Math.floor((Date.now()-st)/1000);
    if(s<0)s=0;
    timer.innerText="⏳ "+s;
  }
  t();
  window.ti=setInterval(t,200);
}

/* BUTTONS */
nextBtn.onclick=function(){
  if(current<0) setQ(0);
  else if(current<questions.length-1) setQ(current+1);
};

backBtn.onclick=function(){
  if(current>0) setQ(current-1);
};

function setQ(i){
  db.ref("currentQuestion").set({index:i,startTime:Date.now()});
}

/* LABELS */
function updateButtons(){

  if(!questions.length) return;

  backBtn.style.display = current>0 ? "inline-block":"none";

  if(current>=0 && current<questions.length-1){
    nextBtn.innerText="Далее: "+(current+2)+". "+questions[current+1].text;
  } else {
    nextBtn.innerText="Начать";
  }

  if(current>0){
    backBtn.innerText="Назад: "+current+". "+questions[current-1].text;
  }
}

/* RESULT */
function showResult(){
  if(current<0) return;

  db.ref("votes/"+current).once("value",function(s){
    var v=s.val();
    if(!v){result.innerText="Ничья";return;}

    var max=0,idx=-1,tie=false;

    for(var k in v){
      if(v[k]>max){max=v[k];idx=k;tie=false;}
      else if(v[k]===max){tie=true;}
    }

    if(max===0||tie){
      result.innerText="Ничья";
    }else{
      result.innerText="Победитель: "+questions[current].options[idx];
    }
  });
}

/* VIEWER */
function updateViewer(d){

  if(!activeUser || !users[activeUser]){
    vTitle.innerText="Нет зрителей";
    vOpts.innerHTML="";
    return;
  }

  var u=users[activeUser];

  if(u.q===-1){
    vTitle.innerText="Скоро начнём!";
    vOpts.innerHTML="";
    return;
  }

  if(u.q===-999){
    vTitle.innerText="Смотрите на сцену!";
    vOpts.innerHTML="";
    return;
  }

  if(!questions[u.q]) return;

  vTitle.innerText=questions[u.q].text;
  vOpts.innerHTML="";

  for(var i=0;i<questions[u.q].options.length;i++){
    var d2=document.createElement("div");
    d2.className="vOpt";
    d2.innerText=questions[u.q].options[i];

    if(u.selected===i) d2.classList.add("sel");

    vOpts.appendChild(d2);
  }

  var total=5000;
  var passed=Date.now()-d.startTime;
  if(passed<0)passed=0;
  if(passed>total)passed=total;

  var remain=total-passed;

  vBar.style.transition="none";
  vBar.style.width=(remain/total*100)+"%";
  vBar.offsetHeight;
  vBar.style.transition="width "+remain+"ms linear";

  setTimeout(()=>vBar.style.width="0%",50);
}
</script>
</body>
</html>
