<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оператор</title>

<style>
body{margin:0;background:#111;color:#fff;font-family:Arial;text-align:center;padding:20px}
button{width:100%;padding:20px;margin:10px 0;font-size:20px;border:none;border-radius:20px}
.next{background:#4caf50}
</style>
</head>

<body>

<h1>Управление</h1>

<button id="nextBtn" class="next">Далее</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({ databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com" });
const db = firebase.database();

let current = -1;
let questionsCount = 10; // можно поменять

document.getElementById('nextBtn').onclick = ()=>{
  if(current < questionsCount-1){
    current++;
    db.ref('currentQuestion').set({index:current,startTime:Date.now()});
  } else {
    db.ref('showInstagram').set(Date.now());
  }
};
</script>

</body>
</html>
