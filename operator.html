<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{
  font-family:'Montserrat',sans-serif;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:14px 22px;
  margin:6px;
  font-size:16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>Оператор</h2>

<button onclick="first()">Первый вопрос</button>
<button onclick="next()">Следующий вопрос</button>
<button onclick="pause()">Пауза</button>
<button onclick="reset()">Сброс игры</button>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBr2DziLnevo6OM69tZL8gdJcTQhSpgeIk",
  authDomain: "buttons-panin.firebaseapp.com",
  databaseURL: "https://buttons-panin-default-rtdb.firebaseio.com",
  projectId: "buttons-panin",
  storageBucket: "buttons-panin.firebasestorage.app",
  messagingSenderId: "303467096491",
  appId: "1:303467096491:web:e5aea0f0764e4ecb550aee",
  measurementId: "G-8HYF4MWJY1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let current = 0;

function first(){
  current = 0;
  db.ref("game").set({
    status:"playing",
    currentQuestion:0,
    timer:5
  });
}

function next(){
  current++;
  db.ref("game").set({
    status:"playing",
    currentQuestion:current,
    timer:5
  });
}

function pause(){
  db.ref("game/status").set("ready");
}

function reset(){
  current = 0;
  db.ref().set({
    game:{
      status:"waiting",
      currentQuestion:0
    },
    votes:{}
  });
}
</script>

</body>
</html>
