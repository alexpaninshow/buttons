<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Управление игрой</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#111;color:#fff;display:flex;flex-direction:column;min-height:100vh}

#top{padding:20px}
h1{text-align:center}

#status{margin-top:10px;font-weight:900}
#timer{margin-top:10px}

#winner{
  margin-top:15px;
  padding:10px;
  background:#222;
  border-radius:20px;
}

#buttons{
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

button{
  padding:18px;
  border:none;
  border-radius:20px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

.next{background:#4caf50}
.back{background:#ff9800}
.reset{background:#f44336}

#instagramBtn{
  position:fixed;
  bottom:20px;
  left:20px;
  width:60px;
  height:60px;
  opacity:0;
  transition:0.5s;
}
#instagramBtn img{
  width:100%;
  filter:invert(1);
}
</style>
</head>
<body>

<div id="top">
  <h1>Управление игрой</h1>
  <div id="status">Загрузка...</div>
  <div id="timer">-</div>
  <div id="winner">Победитель: -</div>
</div>

<div id="buttons">
  <button id="nextBtn" class="next">Далее</button>
  <button id="backBtn" class="back">Назад</button>
  <button id="resetBtn" class="reset">Сброс</button>
</div>

<div id="instagramBtn">
  <img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Instagram_logo_2022.svg">
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({ databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com" });
const db = firebase.database();

let questions = [];
let current = -1;

const statusEl = document.getElementById('status');
const timerEl = document.getElementById('timer');
const winnerEl = document.getElementById('winner');
const nextBtn = document.getElementById('nextBtn');
const backBtn = document.getElementById('backBtn');
const instagramBtn = document.getElementById('instagramBtn');

function showInstagramButton(){
  instagramBtn.style.opacity = '1';
}

function hideInstagramButton(){
  instagramBtn.style.opacity = '0';
}

function setQuestion(idx){
  hideInstagramButton();
  db.ref('currentQuestion').set({
    index: idx,
    startTime: Date.now()
  });
}

fetch("https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0")
.then(r=>r.text())
.then(text=>{
  const rows = text.trim().split('\n');
  for(let i=1;i<rows.length;i++){
    const cols = rows[i].split(',');
    if(!cols[0]) continue;
    questions.push({
      text: cols[0],
      options: cols.slice(1)
    });
  }
});

db.ref('currentQuestion').on('value', snap=>{
  const data = snap.val();
  if(!data) return;

  current = data.index;

  if(current >= questions.length){
    statusEl.innerText = '🏁 Финал';
    showInstagramButton();
    return;
  }

  if(current === -1 || current === -999){
    statusEl.innerText = '⏸ Ожидание';
    return;
  }

  statusEl.innerText = 'Вопрос ' + (current+1);
});

nextBtn.onclick = ()=>{
  if(current === -1 || current === -999){
    setQuestion(0);
    return;
  }

  if(current < questions.length - 1){
    setQuestion(current + 1);
  } else if(current === questions.length - 1){
    setQuestion(questions.length); // ← ФИКС
  }
};

backBtn.onclick = ()=>{
  if(current > 0){
    setQuestion(current - 1);
  }
};

document.getElementById('resetBtn').onclick = ()=>{
  db.ref('votes').remove();
  db.ref('showInstagram').remove();
  setQuestion(-1);
};

instagramBtn.onclick = ()=>{
  db.ref('showInstagram').set(Date.now());
};
</script>

</body>
</html>
