<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px 15px;
  margin:5px;
  font-size:14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#timer{
  margin-top:20px;
  font-size:24px;
}
</style>
</head>

<body>

<h2>Оператор</h2>

<button onclick="play()">▶️ Показать вопрос</button>
<button onclick="next()">⏭ Следующий</button>
<button onclick="pause()">⏸ Пауза</button>
<button onclick="reset()">🔄 Сброс</button>

<div id="timer">0</div>

<script>
firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let current = 0;
let interval = null;

function play(){
  db.ref("game").update({
    status:"playing",
    timer:5
  });

  runTimer();
}

function next(){
  current++;

  db.ref("game").set({
    status:"playing",
    currentQuestion:current,
    timer:5
  });

  runTimer();
}

function pause(){
  db.ref("game/status").set("pause");
  stopTimer();
}

function reset(){
  db.ref().set({
    game:{
      status:"waiting",
      currentQuestion:null
    }
  });

  stopTimer();
  document.getElementById("timer").innerText="0";
}

function runTimer(){
  stopTimer();

  let t = 5;
  document.getElementById("timer").innerText = t;

  interval = setInterval(()=>{
    t--;
    document.getElementById("timer").innerText = t;

    if(t<=0){
      clearInterval(interval);
      db.ref("game/status").set("pause");
    }

  },1000);
}

function stopTimer(){
  clearInterval(interval);
}
</script>

</body>
</html>
