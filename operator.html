<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
body { font-family: Arial; text-align: center; background:#222; color:white; padding:40px; }

#status { font-size:26px; margin-bottom:20px; }

button {
  font-size:20px;
  padding:15px 25px;
  margin:10px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

.next { background:#4caf50; color:white; font-style:italic; }
.back { background:orange; color:white; }
.reset { background:red; color:white; }
</style>
</head>

<body>

<h1>Оператор</h1>

<div id="status">Ожидание</div>

<button id="nextBtn" class="next">Загрузка...</button>
<button id="backBtn" class="back" style="display:none;">Назад</button>
<button id="resetBtn" class="reset">Сбросить игру</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { databaseURL: "https://buttons-panin-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let questions = [];
let current = -1;

const status = document.getElementById("status");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");

// 👉 загрузка вопросов
fetch('https://sheet.best/api/sheets/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0')
.then(r=>r.json())
.then(data=>{
  questions = data.map(r=>({
    text:r['Вопрос'],
    options:[r['Вариант 1'],r['Вариант 2'],r['Вариант 3']].filter(o=>o)
  }));
  updateButtons();
});

function showQuestion(i){
  current = i;
  db.ref('currentQuestion').set(i);
  status.innerText = "Сейчас: " + questions[i].text;
  updateButtons();
}

nextBtn.onclick = ()=>{
  if(current===-1) showQuestion(0);
  else if(current<questions.length-1) showQuestion(current+1);
};

backBtn.onclick = ()=>{
  if(current>0) showQuestion(current-1);
};

document.getElementById("resetBtn").onclick = ()=>{
  if(confirm("Ты уверен, что хочешь начать заново?")){
    current=-1;
    db.ref('currentQuestion').set(-1);
    status.innerText="Ожидание";
    updateButtons();
  }
};

function updateButtons(){
  if(!questions.length) return;

  if(current===-1){
    nextBtn.innerText="Начать игру. Вопрос 1: "+questions[0].text;
    backBtn.style.display="none";
  } else {
    nextBtn.style.display = current<questions.length-1 ? "inline-block":"none";
    if(current<questions.length-1){
      nextBtn.innerText="Вопрос "+(current+2)+": "+questions[current+1].text;
    }
    backBtn.style.display = current>0?"inline-block":"none";
  }
}
</script>

</body>
</html>
