<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
html, body {
  height:100%;
  margin:0;
}

body {
  font-family:Arial;
  background:#111;
  color:white;
  display:flex;
  flex-direction:column;
}

/* статус */
#status {
  text-align:center;
  font-size:20px;
  padding:15px;
}

/* 🔥 контейнер кнопок как у зрителя */
.buttons {
  flex:1;
  display:flex;
  flex-direction:column;
  padding:20px;
  gap:20px; /* расстояние между кнопками */
}

/* 🔥 кнопки */
button {
  flex:1; /* РАСТЯГИВАЕТ КНОПКИ НА ВЕСЬ ЭКРАН */

  font-size:4vw; /* адаптивный размер текста */

  border:none;
  border-radius:20px;

  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;

  cursor:pointer;
  transition:0.2s;
}

/* эффекты */
button:active {
  transform:scale(0.97);
}

/* цвета */
.next { background:#4caf50; color:white; }
.back { background:orange; color:white; }
.reset { background:red; color:white; }

button:disabled {
  opacity:0.4;
  cursor:not-allowed;
}
</style>
</head>

<body>

<div id="status">Ожидание</div>

<div class="buttons">
  <button id="nextBtn" class="next">Загрузка...</button>
  <button id="backBtn" class="back">Назад</button>
  <button id="resetBtn" class="reset">Сбросить игру</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let questions = [];
let current = -1;

const status = document.getElementById("status");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");

/* загрузка */
fetch(CSV_URL)
.then(r => r.text())
.then(text => {
  const rows = text.trim().split('\n').map(r => r.split(','));

  questions = rows.slice(1).map(cols => ({
    text:(cols[0]||"").trim(),
    options:cols.slice(1).map(c=>c.trim()).filter(Boolean)
  }));

  updateButtons();
});

function showQuestion(i){
  current = i;
  db.ref('currentQuestion').set(i);

  status.innerText = "Сейчас: " + (i+1) + ". " + questions[i].text;

  updateButtons();
}

nextBtn.onclick = ()=>{
  if(current === -1) showQuestion(0);
  else if(current < questions.length-1) showQuestion(current+1);
};

backBtn.onclick = ()=>{
  if(current > 0) showQuestion(current-1);
};

document.getElementById("resetBtn").onclick = ()=>{
  current = -1;
  db.ref('currentQuestion').set(-1);
  status.innerText = "Ожидание";
  updateButtons();
};

function updateButtons(){
  if(!questions.length) return;

  if(current === -1){
    nextBtn.innerText = "Начать: " + questions[0].text;
  } else if(current < questions.length-1){
    nextBtn.innerText = "Далее: " + questions[current+1].text;
  } else {
    nextBtn.style.display="none";
  }

  if(current > 0){
    backBtn.style.display="block";
    backBtn.innerText = "Назад: " + questions[current-1].text;
  } else {
    backBtn.style.display="none";
  }
}
</script>

</body>
</html>
