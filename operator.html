<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Управление игрой</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#111;color:#fff;display:flex;flex-direction:column;min-height:100vh}
#top{padding:20px;flex-shrink:0}

h1{
  margin:0;
  font-size:clamp(18px,5vw,28px);
  text-align:center;
  font-weight:bold;
}

#status{
  font-size:clamp(16px,4.5vw,22px);
  margin-top:10px;
  font-weight:900;
  animation:blinkGreen 1.5s ease-in-out infinite;
  transition: opacity 0.5s ease;
}

@keyframes blinkGreen{
  0%{color:#ffffff}
  50%{color:#00e676}
  100%{color:#ffffff}
}

#timer{font-size:clamp(24px,7vw,28px);margin-top:10px;font-weight:bold}
#winner{
  font-size:clamp(18px,5vw,24px);
  margin-top:15px;
  padding:10px;
  background:#222;
  border-radius:20px;
  color:#ffd700;
  transition: opacity 0.5s ease, filter 0.5s ease;
}
#winner.hidden{
  opacity:0.3;
  filter:blur(4px);
}
#winnerDetails{
  font-size:clamp(14px,4vw,18px);
  margin-top:5px;
  color:#aaa;
  transition: opacity 0.5s ease, filter 0.5s ease;
}
#winnerDetails.hidden{
  opacity:0.3;
  filter:blur(4px);
}
#questionsStatus{font-size:13px;margin-top:20px;color:#00e676;font-style:italic;text-align:left;padding-left:20px;display:flex;align-items:center;gap:6px}
#questionsStatus .ok{color:#00e676;font-size:14px}
#questionsStatus .error{color:#f44336;font-size:14px;font-style:normal}

#buttons {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 15px;
  gap: 20px;
  justify-content: center;
  max-width: 500px;
  margin: 0 auto;
  width: 100%;
}

button {
  margin: 0;
  font-size: clamp(16px, 5vw, 18px);
  font-weight: bold;
  border-radius: 30px;
  border: none;
  color: #fff;
  cursor: pointer;
  transition: transform 0.1s ease;
  width: 100%;
}

button:active {
  transform: scale(0.97);
}

.next {
  background: #4caf50;
  padding: 24px 18px;
  font-size: clamp(20px, 6vw, 24px);
}

.next.final {
  background: #e1306c;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.next.final img{
  width:24px;
}

.back {
  background: #ff9800;
  padding: 14px 18px;
}

.reset {
  background: #f44336;
  padding: 14px 18px;
}
</style>
</head>
<body>
<div id="top"><h1>Управление игрой</h1><div id="status">⏳ Загрузка...</div><div id="timer">⏳ -</div><div id="winner" class="hidden">🏆 Победитель: ???</div><div id="winnerDetails" class="hidden"></div><div id="questionsStatus"></div></div>
<div id="buttons"><button id="nextBtn" class="next">--</button><button id="backBtn" class="back">--</button><button id="resetBtn" class="reset">Полный сброс</button></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";
firebase.initializeApp({ databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com" });
const db = firebase.database();

let questions = [];
let current = -1;
let loaded = false;
let votesListener = null;
let timerInt = null, timerOut = null;
let isTimerActive = false;

const statusEl = document.getElementById('status');
const timerEl = document.getElementById('timer');
const winnerEl = document.getElementById('winner');
const winnerDetailEl = document.getElementById('winnerDetails');
const qStatusEl = document.getElementById('questionsStatus');
const nextBtn = document.getElementById('nextBtn');
const backBtn = document.getElementById('backBtn');

fetch(CSV_URL).then(r=>r.text()).then(text=>{
  const rows = text.trim().split('\n');
  for(let i=1;i<rows.length;i++){
    const cols = rows[i].split(',');
    if(!cols[0]) continue;
    questions.push(cols);
  }
  loaded = true;
  updateButtons();
});

function setQuestion(idx){
  db.ref('currentQuestion').set({ index:idx, startTime:Date.now() });
}

function startTimer(start){
  isTimerActive = true;
  clearInterval(timerInt);
  timerInt = setInterval(()=>{
    const rem = Math.max(0,6-(Date.now()-start)/1000);
    timerEl.innerText='⏳ '+Math.ceil(rem)+' сек';
    if(rem<=0){
      clearInterval(timerInt);
      isTimerActive=false;
      updateButtons();
    }
  },100);
}

db.ref('currentQuestion').on('value', snap=>{
  const data = snap.val();
  if(!data) return;
  current = data.index;

  if(current>=0 && current<questions.length){
    startTimer(data.startTime);
  }

  updateButtons();
});

function updateButtons(){
  if(!loaded) return;

  nextBtn.classList.remove('final');
  nextBtn.style.display='block';

  if(current===questions.length-1){
    if(isTimerActive){
      nextBtn.style.display='none';
    } else {
      nextBtn.classList.add('final');
      nextBtn.innerHTML='<img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Instagram_logo_2022.svg"> Завершить игру!';
    }
  } else {
    nextBtn.innerText='Далее';
  }
}

nextBtn.onclick=()=>{
  if(current===questions.length-1 && !isTimerActive){
    db.ref('showInstagram').set(Date.now());
    return;
  }

  if(current<questions.length-1){
    setQuestion(current+1);
  }
};

document.getElementById('resetBtn').onclick=()=>{
  db.ref('votes').remove();
  db.ref('showInstagram').remove();
  setQuestion(-1);
};
</script>
</body>
</html>
