<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
html, body {
  height:100%;
  margin:0;
}

body {
  font-family:Arial;
  background:#111;
  color:white;

  display:flex;
  flex-direction:column;
  text-align:center;
}

/* верх */
#top {
  padding:20px;
}

h1 {
  font-size:5vw;
  margin:0;
}

#status {
  font-size:4vw;
  margin-top:10px;
}

#timer {
  font-size:6vw;
  margin-top:10px;
}

/* кнопки */
#buttons {
  flex:1;
  display:flex;
  flex-direction:column;
  padding:10px;
}

button {
  margin:6px 0;
  font-size:4.5vw;
  font-weight:bold;

  border-radius:20px;
  border:4px solid transparent;

  color:white;
  cursor:pointer;

  -webkit-tap-highlight-color: transparent;
}

.next { background:#4caf50; flex:1.6; }
.back { background:orange; flex:0.7; margin-top:15px; }
.reset { background:red; flex:0.6; }

/* мгновенная рамка */
button:active {
  border:4px solid white;
  transform:scale(0.97);
}
</style>
</head>

<body>

<div id="top">
  <h1>Оператор</h1>
  <div id="status">Загрузка вопросов...</div>
  <div id="timer">⏳ -</div>
</div>

<div id="buttons">
  <button id="nextBtn" class="next"></button>
  <button id="backBtn" class="back"></button>
  <button id="resetBtn" class="reset">Сброс</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let questions = [];
let current = -1;
let ready = false;
let timerInterval = null;
let timerFinished = false;

const status = document.getElementById("status");
const timerEl = document.getElementById("timer");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");
const resetBtn = document.getElementById("resetBtn");

/* =========================
   1. СНАЧАЛА ГРУЗИМ CSV
========================= */
fetch(CSV_URL)
.then(r => r.text())
.then(text => {
  const rows = text.trim().split('\n').map(r => r.split(','));

  questions = rows.slice(1).map(cols => ({
    text:(cols[0]||"").trim(),
    options:cols.slice(1).map(c=>c.trim()).filter(Boolean)
  }));

  ready = true;

  status.innerText = "Готово";
  updateButtons();
})
.catch(()=>{
  status.innerText = "Ошибка загрузки таблицы";
});

/* =========================
   2. СЛУШАЕМ FIREBASE
========================= */
db.ref('currentQuestion').on('value', snap => {

  if(!ready){
    status.innerText = "Загрузка вопросов...";
    return;
  }

  current = snap.val();
  if(current === null) current = -1;

  timerFinished = false;

  if(timerInterval){
    clearInterval(timerInterval);
    timerInterval = null;
  }

  if(current === -1){
    status.innerText = "Ожидание";
    timerEl.innerText = "⏳ -";
  }
  else if(current === -999){
    status.innerText = "Сцена (внимание)";
    timerEl.innerText = "⏳ -";
  }
  else if(questions[current]){
    status.innerText = "Сейчас: " + (current+1) + ". " + questions[current].text;
    startTimer();
  }

  updateButtons();
});

/* =========================
   ТАЙМЕР
========================= */
function startTimer(){
  let t = 5;
  timerEl.innerText = "⏳ " + t;

  timerInterval = setInterval(()=>{
    t--;

    if(t <= 0){
      clearInterval(timerInterval);
      timerInterval = null;
      timerEl.innerText = "⏳ 0";
      timerFinished = true;
      updateButtons();
    } else {
      timerEl.innerText = "⏳ " + t;
    }
  },1000);
}

/* =========================
   ПЕРЕХОДЫ
========================= */
function showQuestion(i){
  db.ref('currentQuestion').set(i);
}

/* вперед */
nextBtn.onclick = ()=>{
  if(!questions.length) return;

  if(current === -1 || current === -999){
    showQuestion(0);
  }
  else if(current < questions.length - 1){
    showQuestion(current + 1);
  }
};

/* назад */
backBtn.onclick = ()=>{
  if(!questions.length) return;

  if(current <= 0) return;

  if(timerFinished){
    showQuestion(current); // повтор
  } else {
    showQuestion(current - 1);
  }
};

/* сброс */
resetBtn.onclick = ()=>{
  db.ref('currentQuestion').set(-1);
};

/* =========================
   КНОПКИ
========================= */
function updateButtons(){

  if(!questions.length) return;

  if(current === -1 || current === -999){
    nextBtn.innerText = "Начать: 1. " + questions[0].text;
    backBtn.style.display = "none";
    return;
  }

  if(current < questions.length - 1){
    nextBtn.innerText = "Далее: " + (current+2) + ". " + questions[current+1].text;
  } else {
    nextBtn.innerText = "Конец";
  }

  backBtn.style.display = "block";

  if(timerFinished){
    backBtn.innerText = "Повтор: " + (current+1) + ". " + questions[current].text;
  } else {
    if(current > 0){
      backBtn.innerText = "Назад: " + (current) + ". " + questions[current-1].text;
    }
  }
}
</script>

</body>
</html>
