<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
body {
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
  padding:40px;
}

#status { font-size:28px; margin-bottom:10px; }
#timer { font-size:48px; margin-bottom:20px; }

button {
  width:90%;
  font-size:24px;
  padding:20px;
  margin:10px auto;
  display:block;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

.next { background:#4caf50; }
.back { background:orange; }
.reset { background:red; }
</style>
</head>

<body>

<h1>Оператор</h1>

<div id="status">Ожидание</div>
<div id="timer">⏳ -</div>

<button id="nextBtn" class="next">...</button>
<button id="backBtn" class="back">Назад</button>
<button id="resetBtn" class="reset">Сброс</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let questions = [];
let state = { currentQuestion: -1, startedAt: null };

const status = document.getElementById("status");
const timerEl = document.getElementById("timer");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");

const DURATION = 5; // секунды

/* загрузка */
fetch(CSV_URL)
.then(r => r.text())
.then(text => {
  const rows = text.trim().split('\n').map(r => r.split(','));

  questions = rows.slice(1).map(cols => ({
    text:(cols[0]||"").trim(),
    options:cols.slice(1).map(c=>c.trim()).filter(Boolean)
  }));
});

/* 🔥 ЧИТАЕМ СОСТОЯНИЕ */
db.ref('gameState').on('value', snap => {
  state = snap.val() || { currentQuestion: -1 };

  updateUI();
});

/* запуск вопроса */
function startQuestion(i){
  db.ref('gameState').set({
    currentQuestion: i,
    startedAt: Date.now()
  });
}

/* сброс */
function reset(){
  db.ref('gameState').set({
    currentQuestion: -1,
    startedAt: null
  });
}

/* UI */
function updateUI(){
  const q = state.currentQuestion;

  if(q === -1){
    status.innerText = "Ожидание";
    timerEl.innerText = "⏳ -";
    nextBtn.innerText = "Начать";
    return;
  }

  const elapsed = (Date.now() - state.startedAt) / 1000;
  const timeLeft = Math.max(0, Math.ceil(DURATION - elapsed));

  timerEl.innerText = "⏳ " + timeLeft;

  status.innerText = "Сейчас: " + (q+1) + ". " + (questions[q]?.text || "");

  if(timeLeft > 0){
    nextBtn.innerText = "Далее: " + (questions[q+1]?.text || "конец");
  } else {
    nextBtn.innerText = "Повтор: " + questions[q].text;
  }
}

/* тик таймера */
setInterval(updateUI, 200);

/* кнопки */
nextBtn.onclick = ()=>{
  const q = state.currentQuestion;

  if(q === -1){
    startQuestion(0);
    return;
  }

  const elapsed = (Date.now() - state.startedAt) / 1000;

  if(elapsed >= DURATION){
    // повтор
    startQuestion(q);
  } else {
    // вперёд
    if(q < questions.length - 1){
      startQuestion(q + 1);
    }
  }
};

backBtn.onclick = ()=>{
  const q = state.currentQuestion;
  if(q > 0){
    startQuestion(q - 1);
  }
};

resetBtn.onclick = reset;
</script>

</body>
</html>
