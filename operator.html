<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
body{
  margin:0;
  display:flex;
  background:#111;
  color:#fff;
  font-family:Arial;
}

#left{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:20px;
}

#status{font-size:22px;margin-bottom:10px}
#timer{font-size:28px;margin-bottom:20px}

#buttons{
  width:100%;
  display:flex;
  flex-direction:column;
}

button{
  margin:5px 0;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:10px;
  color:#fff;
}

.next{background:#4caf50}
.back{background:orange}
.reset{background:red}

#viewer{
  width:300px;
  background:#000;
  padding:10px;
}

#vBar{
  height:8px;
  background:lime;
  width:100%;
}

.vOpt{
  background:#333;
  margin:4px 0;
  padding:6px;
  border-radius:6px;
}

.sel{background:#4caf50}
</style>
</head>

<body>

<div id="left">

<div id="status">Загрузка...</div>
<div id="timer">⏳</div>

<div id="buttons">
<button id="nextBtn" class="next"></button>
<button id="backBtn" class="back"></button>
<button id="resetBtn" class="reset">Полный сброс</button>
</div>

<div id="result"></div>

</div>

<div id="viewer">
<div id="vTitle"></div>
<div id="vBar"></div>
<div id="vOpts"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});
var db=firebase.database();

var questions=[];
var current=-1;
var users={};
var activeUser=null;

/* ===== CSV (БЕЗ ЛИШНИХ ВАРИАНТОВ) ===== */
fetch("https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0")
.then(r=>r.text())
.then(t=>{
  var rows=t.trim().split('\n');

  for(var i=1;i<rows.length;i++){
    var cols=rows[i].split(',');
    var q={text:cols[0],options:[]};

    for(var j=1;j<cols.length;j++){
      var val=cols[j].trim();
      if(val!=="") q.options.push(val);
    }

    questions.push(q);
  }

  updateButtons();
});

/* ===== USERS ===== */
db.ref("users").on("value",s=>{
  users=s.val()||{};
  pickUser();
});

function pickUser(){
  var now=Date.now();
  var alive=[];

  for(var id in users){
    if(now-users[id].t<6000) alive.push(id);
  }

  if(!alive.length){
    activeUser=null;
    return;
  }

  if(!activeUser || !users[activeUser] || now-users[activeUser].t>6000){
    activeUser=alive[Math.floor(Math.random()*alive.length)];
  }
}

/* ===== СИНХРОНИЗАЦИЯ ===== */
db.ref("currentQuestion").on("value",s=>{
  var d=s.val(); if(!d) return;

  current=d.index;

  updateStatus(d);
  updateButtons();
  updateViewer(d);
  showResult();

  /* АВТО ПЕРЕХОД В ОЖИДАНИЕ */
  if(current>=0){
    setTimeout(()=>{
      db.ref("currentQuestion").once("value",snap=>{
        var now=snap.val();
        if(now && now.index===current){
          db.ref("currentQuestion").set({index:-999,startTime:Date.now()});
        }
      });
    },5000);
  }
});

/* ===== СТАТУС ===== */
function updateStatus(d){
  if(current>=0 && questions[current]){
    status.innerText=(current+1)+". "+questions[current].text;
    startTimer(d.startTime);
  }else if(current===-999){
    status.innerText="Ожидание...";
    timer.innerText="";
  }else{
    status.innerText="Старт";
    timer.innerText="";
  }
}

/* ===== ТАЙМЕР ===== */
function startTimer(st){
  clearInterval(window.ti);

  function tick(){
    var t=5-Math.floor((Date.now()-st)/1000);
    if(t<0)t=0;
    timer.innerText="⏳ "+t;
  }

  tick();
  window.ti=setInterval(tick,200);
}

/* ===== КНОПКИ ===== */
nextBtn.onclick=function(){
  if(current<0) setQ(0);
  else if(current<questions.length-1) setQ(current+1);
};

backBtn.onclick=function(){
  if(current>0) setQ(current-1);
};

function setQ(i){
  db.ref("currentQuestion").set({
    index:i,
    startTime:Date.now()
  });
}

/* ===== ПОДПИСИ ===== */
function updateButtons(){

  if(!questions.length) return;

  backBtn.style.display = current>0 ? "block":"none";

  if(current>=0 && current<questions.length-1){
    nextBtn.innerText="Далее: "+(current+2);
  }else{
    nextBtn.innerText="Начать";
  }

  if(current>0){
    backBtn.innerText="Назад: "+current;
  }
}

/* ===== РЕЗУЛЬТАТ ===== */
function showResult(){
  if(current<0) return;

  db.ref("votes/"+current).once("value",s=>{
    var v=s.val();

    if(!v){
      result.innerText="Ничья";
      return;
    }

    var max=0,idx=-1,tie=false;

    for(var k in v){
      if(v[k]>max){max=v[k];idx=k;tie=false;}
      else if(v[k]===max){tie=true;}
    }

    if(max===0||tie){
      result.innerText="Ничья";
    }else{
      result.innerText="Победитель: "+questions[current].options[idx];
    }
  });
}

/* ===== VIEWER ===== */
function updateViewer(d){

  if(current===-999){
    vTitle.innerText="Смотрите на сцену!";
    vOpts.innerHTML="";
    return;
  }

  if(!activeUser || !users[activeUser]){
    vTitle.innerText="Нет зрителей";
    vOpts.innerHTML="";
    return;
  }

  var u=users[activeUser];

  if(!questions[u.q]) return;

  vTitle.innerText=questions[u.q].text;
  vOpts.innerHTML="";

  for(var i=0;i<questions[u.q].options.length;i++){
    var el=document.createElement("div");
    el.className="vOpt";
    el.innerText=questions[u.q].options[i];

    if(u.selected===i) el.classList.add("sel");

    vOpts.appendChild(el);
  }

  var total=5000;
  var passed=Date.now()-d.startTime;

  if(passed<0)passed=0;
  if(passed>total)passed=total;

  var remain=total-passed;

  vBar.style.transition="none";
  vBar.style.width=(remain/total*100)+"%";
  vBar.offsetHeight;
  vBar.style.transition="width "+remain+"ms linear";

  setTimeout(()=>vBar.style.width="0%",50);
}

/* ===== СБРОС ===== */
resetBtn.onclick=function(){

  if(!confirm("Вы уверены, что хотите полностью сбросить игру?")) return;

  db.ref("votes").remove();
  db.ref("users").remove();
  db.ref("currentQuestion").set({index:-1,startTime:Date.now()});
};
</script>

</body>
</html>
