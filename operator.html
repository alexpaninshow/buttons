<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
body { font-family: Arial; text-align: center; background:#222; color:white; padding:40px; }
#status { font-size:26px; margin-bottom:10px; }
#timer { font-size:24px; margin-bottom:20px; color:#ffeb3b; }

.buttons { display:flex; flex-direction:column; align-items:center; }

button {
  width: 80%;
  max-width: 500px;
  font-size:20px;
  padding:15px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

.next { background:#4caf50; color:white; }
.back { background:orange; color:white; }
.reset { background:red; color:white; }
</style>
</head>

<body>

<h1>Оператор</h1>

<div id="status">Сейчас: Ожидание</div>
<div id="timer"></div>

<div class="buttons">
  <button id="nextBtn" class="next">Загрузка...</button>
  <button id="backBtn" class="back">Назад</button>
  <button id="resetBtn" class="reset">Сбросить игру</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv";

const firebaseConfig = {
  databaseURL: "https://buttons-panin-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let questions = [];
let current = -1;
let lastShown = -1;

let autoTimer = null;
let visualTimer = null;

const status = document.getElementById("status");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");
const timerDiv = document.getElementById("timer");

function parseCSV(text){
  const rows = text.trim().split('\n').map(r=>r.split(','));
  return rows.slice(1).map(cols=>({
    text: (cols[0]||"").trim(),
    options: cols.slice(1).map(c=>c.trim()).filter(Boolean)
  }));
}

fetch(CSV_URL)
.then(r=>r.text())
.then(text=>{
  questions = parseCSV(text);
  updateButtons();
});

function clearAll(){
  if(autoTimer) clearTimeout(autoTimer);
  if(visualTimer) clearInterval(visualTimer);
  timerDiv.innerText="";
}

function startTimer(){
  let time = 5;
  timerDiv.innerText = "Таймер: " + time;

  visualTimer = setInterval(()=>{
    time--;
    if(time<=0){
      clearInterval(visualTimer);
      timerDiv.innerText="";
    } else {
      timerDiv.innerText="Таймер: " + time;
    }
  },1000);
}

function showQuestion(i, instant=false){
  clearAll();

  current = i;
  lastShown = i;

  db.ref('currentQuestion').set(i);

  status.innerText = "Сейчас: " + questions[i].text;

  updateButtons();

  if(instant) return;

  startTimer();

  autoTimer = setTimeout(()=>{
    db.ref('currentQuestion').set(-1);
    status.innerText = "Сейчас: Ожидание";
    current = -1;
    updateButtons();
  },5000);
}

// ВПЕРЁД
nextBtn.onclick = ()=>{
  let next = current === -1 ? lastShown + 1 : current + 1;

  if(next < questions.length){
    showQuestion(next);
  }
};

// 🔥 НАЗАД (ФИНАЛЬНЫЙ)
backBtn.onclick = ()=>{

  let prev;

  if(current === -1){
    prev = lastShown - 1;
  } else {
    prev = current - 1;
  }

  if(prev >= 0){
    showQuestion(prev, true);
  }
};

// СБРОС
document.getElementById("resetBtn").onclick = ()=>{
  clearAll();
  current = -1;
  lastShown = -1;
  db.ref('currentQuestion').set(-1);
  status.innerText="Сейчас: Ожидание";
  updateButtons();
};

function updateButtons(){
  if(!questions.length) return;

  let next = current === -1 ? lastShown + 1 : current + 1;

  if(next < questions.length){
    nextBtn.innerText = "Вопрос " + (next+1) + ": " + questions[next].text;
  }

  let prev = current === -1 ? lastShown - 1 : current - 1;

  if(prev >= 0){
    backBtn.innerText = "Назад: " + questions[prev].text;
  } else {
    backBtn.innerText = "Назад";
  }
}
</script>

</body>
</html>
