<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
body {
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}

#status { font-size:26px; margin-bottom:10px; }
#timer { font-size:44px; margin-bottom:20px; }

/* 🔥 СИЛЬНО УВЕЛИЧЕННЫЕ КНОПКИ */
button {
  width:95% !important;
  font-size:26px !important;
  padding:22px !important;
  margin:16px auto !important;
  display:block;
  border-radius:18px !important;

  min-height:80px !important;

  border:5px solid transparent !important;
  outline:none;
  appearance:none;
  -webkit-appearance:none;

  color:white !important;
  -webkit-tap-highlight-color: transparent;

  transition: transform 0.05s, border 0.05s;
}

/* 📱 ещё больше на телефоне */
@media (max-width: 600px){
  button {
    font-size:28px !important;
    padding:24px !important;
    min-height:90px !important;
  }
}

/* цвета */
.next { background:#4caf50; }
.back { background:orange; }
.reset { background:red; }

/* эффект нажатия */
button.pressed {
  transform: scale(0.96);
  border:5px solid white !important;
}
</style>
</head>

<body>

<h1>Оператор</h1>

<div id="status">Загрузка...</div>
<div id="timer">⏳ -</div>

<button id="nextBtn" class="next"></button>
<button id="backBtn" class="back"></button>
<button id="resetBtn" class="reset">Сброс</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let questions = [];
let current = -1;
let timerFinished = false;
let lock = false;
let timerInterval = null;

const status = document.getElementById("status");
const timerEl = document.getElementById("timer");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");
const resetBtn = document.getElementById("resetBtn");

/* эффект нажатия */
function addPressEffect(btn){
  btn.addEventListener("touchstart", () => btn.classList.add("pressed"));
  btn.addEventListener("touchend", () => btn.classList.remove("pressed"));
  btn.addEventListener("touchcancel", () => btn.classList.remove("pressed"));

  btn.addEventListener("mousedown", () => btn.classList.add("pressed"));
  btn.addEventListener("mouseup", () => btn.classList.remove("pressed"));
  btn.addEventListener("mouseleave", () => btn.classList.remove("pressed"));
}

[nextBtn, backBtn, resetBtn].forEach(addPressEffect);

/* загрузка */
fetch(CSV_URL)
.then(r => r.text())
.then(text => {
  const rows = text.trim().split('\n').map(r => r.split(','));

  questions = rows.slice(1).map(cols => ({
    text:(cols[0]||"").trim(),
    options:cols.slice(1).map(c=>c.trim()).filter(Boolean)
  }));

  updateButtons();
});

/* слушаем */
db.ref('currentQuestion').on('value', snap => {

  current = snap.val() ?? -1;
  timerFinished = false;
  lock = false;

  if(timerInterval){
    clearInterval(timerInterval);
    timerInterval = null;
  }

  if(current === -1){
    status.innerText = "Ожидание";
    timerEl.innerText = "⏳ -";
  } else if(current >= 0){
    status.innerText = "Сейчас: " + (current+1) + ". " + questions[current].text;
    startTimer();
  }

  updateButtons();
});

/* таймер */
function startTimer(){
  if(timerInterval){
    clearInterval(timerInterval);
  }

  let t = 5;
  timerEl.innerText = "⏳ " + t;

  timerInterval = setInterval(()=>{
    t--;

    if(t <= 0){
      clearInterval(timerInterval);
      timerInterval = null;

      timerEl.innerText = "⏳ 0";
      timerFinished = true;
      updateButtons();
    } else {
      timerEl.innerText = "⏳ " + t;
    }

  },1000);
}

/* переход */
function showQuestion(i){
  if(lock) return;
  lock = true;

  const ref = db.ref('currentQuestion');

  ref.once('value').then(snap => {
    if(snap.val() === i){
      ref.set(null).then(()=> ref.set(i));
    } else {
      ref.set(i);
    }
  });

  setTimeout(()=> lock = false, 300);
}

/* вперёд */
nextBtn.onclick = ()=>{
  if(lock || !questions.length) return;

  if(current === -1){
    showQuestion(0);
  } else if(current < questions.length - 1){
    showQuestion(current + 1);
  }
};

/* назад */
backBtn.onclick = ()=>{
  if(lock || !questions.length) return;

  if(current === -1) return;

  if(timerFinished){
    showQuestion(current);
  } else {
    if(current > 0){
      showQuestion(current - 1);
    }
  }
};

/* сброс */
resetBtn.onclick = ()=>{
  db.ref('currentQuestion').set(-1);
};

/* кнопки */
function updateButtons(){
  if(!questions.length || current === null) return;

  if(current === -1){
    nextBtn.innerText = "Начать: " + questions[0].text;
    backBtn.style.display = "none";
    return;
  }

  if(current < questions.length - 1){
    nextBtn.innerText = "Далее: " + questions[current+1].text;
  } else {
    nextBtn.innerText = "Конец";
  }

  backBtn.style.display = "block";

  if(timerFinished){
    backBtn.innerText = "Повтор: " + questions[current].text;
  } else {
    if(current > 0){
      backBtn.innerText = "Назад: " + questions[current-1].text;
    } else {
      backBtn.innerText = "Первый вопрос";
    }
  }
}
</script>

</body>
</html>
