<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background:#222;
  color:white;
  padding:40px;
}

#status {
  font-size:28px;
  margin-bottom:20px;
}

#timer {
  font-size:32px;
  margin-bottom:20px;
}

button {
  width:90%;
  font-size:24px;
  padding:20px;
  margin:10px 0;
  border-radius:15px;
  border:none;
  cursor:pointer;
}

.next { background:#4caf50; color:white; }
.back { background:orange; color:white; }
.reset { background:red; color:white; }
</style>
</head>

<body>

<h1>Оператор</h1>

<div id="status">Ожидание</div>
<div id="timer"></div>

<button id="nextBtn" class="next">Загрузка...</button>
<button id="backBtn" class="back">Назад</button>
<button id="resetBtn" class="reset">Сбросить игру</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});
const db = firebase.database();

let questions=[];
let current=-1;
let timerInterval=null;

const status = document.getElementById("status");
const timer = document.getElementById("timer");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");

function parseCSV(text){
  const rows = text.trim().split('\n').map(r=>r.split(','));
  return rows.slice(1).map(cols=>({
    text:(cols[0]||"").trim(),
    options:cols.slice(1).map(c=>c.trim()).filter(Boolean)
  }));
}

fetch(CSV_URL)
.then(r=>r.text())
.then(text=>{
  questions=parseCSV(text);
  updateButtons();
});

function startTimer(start){
  clearInterval(timerInterval);

  timerInterval=setInterval(()=>{
    const now = Date.now();
    const elapsed = Math.floor((now - start)/1000);
    const remain = 5 - elapsed;

    if(remain <= 0){
      clearInterval(timerInterval);
      timer.innerText="";
      status.innerText="Сейчас: Ожидание";
      current=-1;
      updateButtons();
      db.ref('currentQuestion').set(-1);
    } else {
      timer.innerText="⏳ "+remain;
    }
  },500);
}

function showQuestion(i){
  current=i;

  const startTime = Date.now();

  db.ref('/').update({
    currentQuestion: i,
    questionStartTime: startTime
  });

  status.innerText="Сейчас: "+(i+1)+". "+questions[i].text;

  startTimer(startTime);
  updateButtons();
}

nextBtn.onclick=()=>{
  if(current===-1) showQuestion(0);
  else if(current<questions.length-1) showQuestion(current+1);
};

backBtn.onclick=()=>{
  if(current>0) showQuestion(current-1);
};

document.getElementById("resetBtn").onclick=()=>{
  if(confirm("Сбросить игру?")){
    current=-1;
    db.ref('currentQuestion').set(-1);
    status.innerText="Ожидание";
    timer.innerText="";
    updateButtons();
  }
};

function updateButtons(){
  if(!questions.length) return;

  if(current===-1){
    nextBtn.innerText="Начать: 1. "+questions[0].text;
  } else {
    if(current<questions.length-1){
      nextBtn.innerText="Далее: "+(current+2)+". "+questions[current+1].text;
    }
  }

  if(current>0){
    backBtn.innerText="Назад: "+(current)+". "+questions[current-1].text;
    backBtn.style.display="block";
  } else {
    backBtn.style.display="none";
  }
}
</script>

</body>
</html>
