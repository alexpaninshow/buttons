<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
html, body {
  height:100%;
  margin:0;
}

body {
  font-family:Arial;
  background:#111;
  color:white;
  display:flex;
  flex-direction:column;
}

/* статус */
#status {
  text-align:center;
  font-size:28px;
  font-weight:bold;
  padding:15px;
}

/* таймер */
#timer {
  text-align:center;
  font-size:36px;
  font-weight:bold;
  margin-bottom:10px;
}

/* контейнер */
.buttons {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;

  gap:25px;        /* расстояние между кнопками */
  padding:20px;
}

/* 🔥 нормальный размер кнопок */
button {
  width:90%;
  max-width:700px;

  height:70px;
  font-size:20px;

  border-radius:16px;
  border:5px solid transparent;

  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;

  cursor:pointer;
}

/* мгновенная рамка */
button:active {
  border:5px solid white;
}

/* цвета */
.next { background:#4caf50; color:white; }
.back { background:orange; color:white; }
.reset { background:red; color:white; }

button:disabled {
  opacity:0.4;
  cursor:not-allowed;
}
</style>
</head>

<body>

<div id="status">Ожидание</div>
<div id="timer"></div>

<div class="buttons">
  <button id="nextBtn" class="next">Загрузка...</button>
  <button id="backBtn" class="back">Назад</button>
  <button id="resetBtn" class="reset">Сбросить игру</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let questions = [];
let current = -1;
let timerInterval = null;

const status = document.getElementById("status");
const timerDiv = document.getElementById("timer");

const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");

/* загрузка */
fetch(CSV_URL)
.then(r => r.text())
.then(text => {
  const rows = text.trim().split('\n').map(r => r.split(','));

  questions = rows.slice(1).map(cols => ({
    text:(cols[0]||"").trim(),
    options:cols.slice(1).map(c=>c.trim()).filter(Boolean)
  }));

  updateButtons();
});

/* показать вопрос */
function showQuestion(i){
  current = i;

  db.ref('currentQuestion').set(i);

  status.innerText = "Сейчас: " + (i+1) + ". " + questions[i].text;

  startTimer();
  updateButtons();
}

/* таймер */
function startTimer(){
  clearInterval(timerInterval);

  let time = 5;
  timerDiv.innerText = "⏳ " + time;

  timerInterval = setInterval(()=>{
    time--;
    timerDiv.innerText = "⏳ " + time;

    if(time <= 0){
      clearInterval(timerInterval);
      timerDiv.innerText = "";

      db.ref('currentQuestion').set(-999);
    }
  },1000);
}

/* вперёд */
nextBtn.onclick = ()=>{
  if(current === -1) showQuestion(0);
  else if(current < questions.length-1) showQuestion(current+1);
};

/* назад */
backBtn.onclick = ()=>{
  if(current > 0) showQuestion(current-1);
};

/* reset */
document.getElementById("resetBtn").onclick = ()=>{
  current = -1;

  clearInterval(timerInterval);
  timerDiv.innerText = "";

  db.ref('currentQuestion').set(-1);

  status.innerText = "Ожидание";

  updateButtons();
};

/* обновление кнопок */
function updateButtons(){
  if(!questions.length) return;

  if(current === -1){
    nextBtn.innerText = "Начать: " + questions[0].text;
    nextBtn.style.display = "block";
  } else if(current < questions.length-1){
    nextBtn.innerText = "Далее: " + questions[current+1].text;
    nextBtn.style.display = "block";
  } else {
    nextBtn.style.display="none";
  }

  if(current > 0){
    backBtn.style.display="block";
    backBtn.innerText = "Назад: " + questions[current-1].text;
  } else {
    backBtn.style.display="none";
  }
}
</script>

</body>
</html>
