<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
html, body {
  height:100%;
  margin:0;
}

body {
  font-family:Arial;
  background:#111;
  color:white;

  display:flex;
  flex-direction:column;
  text-align:center;
}

#top {
  padding:20px;
}

h1 { font-size:5vw; margin:0; }
#status { font-size:4vw; margin-top:10px; }
#timer { font-size:6vw; margin-top:10px; }

#buttons {
  flex:1;
  display:flex;
  flex-direction:column;
  padding:10px;
}

button {
  margin:6px 0;
  font-size:4.5vw;
  font-weight:bold;
  border-radius:20px;
  border:4px solid transparent;
  color:white;
  cursor:pointer;
}

.next { background:#4caf50; flex:1.6; }
.back { background:orange; flex:0.7; margin-top:15px; }
.reset { background:red; flex:0.6; }

button:active {
  border:4px solid white;
}
</style>
</head>

<body>

<div id="top">
  <h1>Оператор</h1>
  <div id="status">Загрузка вопросов...</div>
  <div id="timer">⏳ -</div>
</div>

<div id="buttons">
  <button id="nextBtn" class="next"></button>
  <button id="backBtn" class="back"></button>
  <button id="resetBtn" class="reset">Сброс</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let questions = [];
let current = -1;
let ready = false;
let timerInterval = null;

const status = document.getElementById("status");
const timerEl = document.getElementById("timer");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");

/* 🔥 1. СНАЧАЛА грузим CSV */
fetch(CSV_URL)
.then(r => r.text())
.then(text => {
  const rows = text.trim().split('\n').map(r => r.split(','));

  questions = rows.slice(1).map(cols => ({
    text:(cols[0]||"").trim(),
    options:cols.slice(1).map(c=>c.trim()).filter(Boolean)
  }));

  ready = true;

  status.innerText = "Готово";
  updateButtons();
});

/* 🔥 2. ТОЛЬКО после этого слушаем Firebase */
db.ref('currentQuestion').on('value', snap => {

  if(!ready) return; // 🔥 КЛЮЧЕВОЙ ФИКС

  current = snap.val() ?? -1;

  if(timerInterval){
    clearInterval(timerInterval);
  }

  if(current === -1){
    status.innerText = "Ожидание";
    timerEl.innerText = "⏳ -";
  }
  else if(current === -999){
    status.innerText = "Сцена";
    timerEl.innerText = "⏳ -";
  }
  else if(questions[current]){
    status.innerText = "Сейчас: " + (current+1) + ". " + questions[current].text;
    startTimer();
  }

  updateButtons();
});

/* таймер */
function startTimer(){
  let t = 5;
  timerEl.innerText = "⏳ " + t;

  timerInterval = setInterval(()=>{
    t--;

    if(t <= 0){
      clearInterval(timerInterval);
      timerEl.innerText = "⏳ 0";
    } else {
      timerEl.innerText = "⏳ " + t;
    }
  },1000);
}

/* управление */
function showQuestion(i){
  db.ref('currentQuestion').set(i);
}

nextBtn.onclick = ()=>{
  if(!questions.length) return;

  if(current === -1 || current === -999){
    showQuestion(0);
  } else if(current < questions.length - 1){
    showQuestion(current + 1);
  }
};

backBtn.onclick = ()=>{
  if(current > 0){
    showQuestion(current - 1);
  }
};

document.getElementById("resetBtn").onclick = ()=>{
  db.ref('currentQuestion').set(-1);
};

/* кнопки */
function updateButtons(){
  if(!questions.length) return;

  if(current === -1 || current === -999){
    nextBtn.innerText = "Начать: 1. " + questions[0].text;
    backBtn.style.display = "none";
    return;
  }

  if(current < questions.length - 1){
    nextBtn.innerText = "Далее: " + (current+2) + ". " + questions[current+1].text;
  } else {
    nextBtn.innerText = "Конец";
  }

  backBtn.style.display = "block";

  if(current > 0){
    backBtn.innerText = "Назад: " + current + ". " + questions[current-1].text;
  }
}
</script>

</body>
</html>
