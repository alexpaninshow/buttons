<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Оператор</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #111;
      color: white;
    }

    button {
      padding: 10px 16px;
      margin: 5px;
      font-size: 14px;
      border-radius: 8px;
      border: none;
    }

    #timer {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>
<body>

<h2>Оператор</h2>

<button onclick="startGame()">▶️ Начать спектакль</button>
<button onclick="nextQuestion()">⏭ Следующий вопрос</button>
<button onclick="resetGame()">🔄 Сброс</button>

<div id="timer">0</div>

<script>
const firebaseConfig = {
  // ВСТАВЬ СВОЙ CONFIG
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let timerInterval = null;

function startGame() {
  db.ref("game").set({
    status: "playing",
    currentQuestion: 0,
    startedAt: Date.now()
  });

  startTimer();
}

function nextQuestion() {
  db.ref("game/currentQuestion").once("value", (snap) => {
    let q = snap.val();
    q++;

    db.ref("game/currentQuestion").set(q);
  });

  resetTimer();
}

function resetGame() {
  db.ref("game").set({
    status: "waiting",
    currentQuestion: null,
    startedAt: null
  });

  clearInterval(timerInterval);
  document.getElementById("timer").innerText = "0";
}

function startTimer() {
  clearInterval(timerInterval);
  let t = 0;

  timerInterval = setInterval(() => {
    t++;
    document.getElementById("timer").innerText = t;
  }, 1000);
}

function resetTimer() {
  startTimer();
}
</script>

</body>
</html>
