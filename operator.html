<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оператор</title>
<style>
body { font-family:'Segoe UI',sans-serif; text-align:center; padding:50px; background:#333; color:white; }
button { font-size:24px; padding:25px 50px; border-radius:12px; border:none; background:#4caf50; color:white; margin:10px; cursor:pointer; }
button.reset { background:#f44336; }
</style>
</head>
<body>

<h1>Оператор</h1>

<button id="startBtn">Начать игру</button>
<button id="nextBtn" style="display:none;">Следующий вопрос</button>
<button id="resetBtn" class="reset" style="display:none;">Сбросить игру</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCnYKEXEd207E9LXgCBupqc3kjbEbk1NTc",
  authDomain: "buttons-show.firebaseapp.com",
  databaseURL: "https://buttons-panin-default-rtdb.firebaseio.com",
  projectId: "buttons-show",
  storageBucket: "buttons-show.appspot.com",
  messagingSenderId: "145808897789",
  appId: "1:145808897789:web:900445fca031ece7e53094"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const questions = [
  { text:"Кого поцелует герой?", options:["Девушку","Себя","Кого-то из зрителей"] },
  { text:"Вам понравился наш спектакль?", options:["Да","Нет",""] }
];

const ref = db.ref('currentQuestion');

const startBtn = document.getElementById("startBtn");
const nextBtn = document.getElementById("nextBtn");
const resetBtn = document.getElementById("resetBtn");

// Начать игру — просто включаем кнопки, но первый вопрос пока не отправляем
startBtn.onclick = () => {
  startBtn.style.display = "none";
  nextBtn.style.display = "inline-block";
  resetBtn.style.display = "inline-block";
};

// Следующий вопрос
nextBtn.onclick = () => {
  ref.transaction(current => {
    if(current === null || current === -1) return 0; // первый вопрос
    if(current >= questions.length - 1) return questions.length; // конец голосования
    return current + 1;
  });
};

// Сброс игры
resetBtn.onclick = () => {
  const ok = confirm("Ты уверен, что хочешь начать заново?");
  if(ok){
    ref.set(-1); // сброс игры
    startBtn.style.display = "inline-block"; // показать кнопку старта
    nextBtn.style.display = "none"; // скрыть следующий вопрос
    resetBtn.style.display = "none"; // скрыть сброс
    alert("Игра сброшена. Ждём следующий вопрос...");
  }
};
</script>
</body>
</html>
