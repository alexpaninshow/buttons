<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
body { font-family: Arial; text-align: center; background:#222; color:white; padding:40px; }

#status { font-size:26px; margin-bottom:10px; }
#winner { font-size:28px; color:#4caf50; margin-bottom:20px; }

button {
  font-size:20px;
  padding:15px 25px;
  margin:10px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

.next { background:#4caf50; color:white; font-style:italic; }
.back { background:orange; color:white; }
.reset { background:red; color:white; }
</style>
</head>

<body>

<h1>Оператор</h1>

<div id="status">Ожидание</div>
<div id="winner"></div>

<button id="nextBtn" class="next">Загрузка...</button>
<button id="backBtn" class="back" style="display:none;">Назад</button>
<button id="resetBtn" class="reset">Сбросить игру</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const SHEET_ID = "ТВОЙ_ID";
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

let questions=[];
let current=-1;

const status = document.getElementById("status");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");

// загрузка вопросов
fetch(URL)
.then(res => res.text())
.then(text => {
  const json = JSON.parse(text.substring(47).slice(0, -2));
  const rows = json.table.rows;

  questions = rows.map(r => ({
    text: r.c[0]?.v,
    options: [r.c[1]?.v, r.c[2]?.v, r.c[3]?.v].filter(o => o)
  }));

  updateButtons();
});

function showQuestion(i){
  current=i;
  db.ref('currentQuestion').set(i);
  status.innerText="Сейчас: "+questions[i].text;
  updateButtons();
}

nextBtn.onclick=()=>{
  if(current===-1) showQuestion(0);
  else if(current<questions.length-1) showQuestion(current+1);
};

backBtn.onclick=()=>{
  if(current>0) showQuestion(current-1);
};

document.getElementById("resetBtn").onclick=()=>{
  if(confirm("Ты уверен, что хочешь начать заново?")){
    current=-1;
    db.ref('currentQuestion').set(-1);
    status.innerText="Ожидание";
    updateButtons();
  }
};

function updateButtons(){
  if(!questions.length) return;

  if(current===-1){
    nextBtn.innerText="Начать игру. Вопрос 1: "+questions[0].text;
    backBtn.style.display="none";
  } else {
    if(current<questions.length-1){
      nextBtn.innerText="Вопрос "+(current+2)+": "+questions[current+1].text;
      nextBtn.style.display="inline-block";
    } else {
      nextBtn.style.display="none";
    }

    backBtn.style.display = current>0 ? "inline-block":"none";
  }
}
</script>

</body>
</html>
