<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
body {
  margin:0;
  display:flex;
  font-family:Arial;
  background:#111;
  color:white;
}

/* ЛЕВАЯ ЧАСТЬ */
#left {
  flex:1;
  display:flex;
  flex-direction:column;
  text-align:center;
}

#top {
  padding:20px;
}

#status {
  font-size:24px;
  margin-bottom:10px;
}

#timer {
  font-size:32px;
}

/* КНОПКИ */
#buttons {
  flex:1;
  display:flex;
  flex-direction:column;
  padding:10px;
}

button {
  margin:6px 0;
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:15px;
  color:white;
}

.next { background:#4caf50; }
.back { background:orange; }
.reset { background:red; }

/* МИНИ ЭКРАН */
#viewer {
  width:300px;
  background:#000;
  border-left:3px solid #333;
  padding:10px;
  display:flex;
  flex-direction:column;
}

#vTitle {
  font-size:16px;
  margin-bottom:10px;
}

#vTimerWrap {
  height:10px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:10px;
}

#vBar {
  height:100%;
  width:100%;
  background:hsl(120,100%,50%);
}

.vOpt {
  background:#333;
  margin:4px 0;
  padding:6px;
  border-radius:8px;
  font-size:14px;
}
</style>
</head>

<body>

<div id="left">

<div id="top">
<div id="status">Загрузка...</div>
<div id="timer">⏳ -</div>
</div>

<div id="buttons">
<button id="nextBtn" class="next"></button>
<button id="backBtn" class="back"></button>
<button id="resetBtn" class="reset">Полный сброс</button>
</div>

</div>

<div id="viewer">
<div id="vTitle">...</div>
<div id="vTimerWrap"><div id="vBar"></div></div>
<div id="vOpts"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

var db = firebase.database();

var questions = [];
var current = -1;

/* DOM */
var statusEl = document.getElementById("status");
var timerEl = document.getElementById("timer");

var nextBtn = document.getElementById("nextBtn");
var backBtn = document.getElementById("backBtn");

var vTitle = document.getElementById("vTitle");
var vBar = document.getElementById("vBar");
var vOpts = document.getElementById("vOpts");

/* ===== CSV ===== */
fetch("https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0")
.then(r=>r.text())
.then(t=>{

  var rows = t.trim().split('\n');

  for(var i=1;i<rows.length;i++){
    var c = rows[i].split(',');
    var q = { text:c[0], options:[] };

    for(var j=1;j<c.length;j++){
      if(c[j]) q.options.push(c[j]);
    }

    questions.push(q);
  }

  updateButtons();
});

/* ===== УСТАНОВКА ВОПРОСА ===== */
function setQ(i){
  db.ref("currentQuestion").set({
    index:i,
    startTime:Date.now()
  });
}

/* ===== СИНХРОНИЗАЦИЯ ===== */
db.ref("currentQuestion").on("value", function(snap){

  var d = snap.val();
  if(!d) return;

  current = d.index;

  updateOperator(d);
  updateViewer(d);
  updateButtons();
});

/* ===== ОПЕРАТОР ===== */
function updateOperator(d){

  if(current >= 0 && questions[current]){
    statusEl.innerText = (current+1) + ". " + questions[current].text;
    startTimer(d.startTime);
  }
  else if(current === -999){
    statusEl.innerText = "Ожидание...";
    timerEl.innerText = "⏳ -";
  }
  else{
    statusEl.innerText = "Старт";
    timerEl.innerText = "⏳ -";
  }
}

/* ===== ТАЙМЕР ===== */
function startTimer(startTime){

  clearInterval(window.ti);

  function tick(){
    var t = 5 - Math.floor((Date.now() - startTime)/1000);
    if(t < 0) t = 0;
    timerEl.innerText = "⏳ " + t;
  }

  tick();
  window.ti = setInterval(tick, 200);
}

/* ===== МИНИ ЭКРАН ===== */
function updateViewer(d){

  if(current === -1){
    vTitle.innerText = "Скоро начнём!";
    vOpts.innerHTML = "";
    return;
  }

  if(current === -999){
    vTitle.innerText = "Смотрите на сцену!";
    vOpts.innerHTML = "";
    return;
  }

  if(!questions[current]) return;

  vTitle.innerText = questions[current].text;

  vOpts.innerHTML = "";

  for(var i=0;i<questions[current].options.length;i++){
    var el = document.createElement("div");
    el.className = "vOpt";
    el.innerText = questions[current].options[i];
    vOpts.appendChild(el);
  }

  /* СИНХРОННЫЙ БЕГУНОК */
  var total = 5000;
  var passed = Date.now() - d.startTime;

  if(passed < 0) passed = 0;
  if(passed > total) passed = total;

  var remain = total - passed;

  vBar.style.transition = "none";
  vBar.style.width = (remain / total * 100) + "%";

  vBar.offsetHeight;

  vBar.style.transition = "width " + remain + "ms linear";

  setTimeout(function(){
    vBar.style.width = "0%";
  },50);
}

/* ===== КНОПКИ ===== */
nextBtn.onclick = function(){

  if(current === -1 || current === -999){
    setQ(0);
    return;
  }

  if(current < questions.length - 1){
    setQ(current + 1);
  }
};

backBtn.onclick = function(){

  if(current > 0){
    setQ(current - 1);
  }
};

/* ===== ПОДПИСИ ===== */
function updateButtons(){

  if(!questions.length) return;

  if(current <= 0){
    backBtn.style.display = "none";
  } else {
    backBtn.style.display = "block";
    backBtn.innerText = "Назад: " + current;
  }

  if(current < questions.length - 1){
    nextBtn.innerText = "Далее: " + (current + 2);
  } else {
    nextBtn.innerText = "Конец";
  }
}

/* ===== СБРОС ===== */
document.getElementById("resetBtn").onclick = function(){
  if(!confirm("Вы уверены, что хотите полностью сбросить игру?")) return;
  db.ref("votes").remove();
  setQ(-1);
};
</script>

</body>
</html>
