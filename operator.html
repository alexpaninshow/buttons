<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
html, body {
  height:100%;
  margin:0;
}

body {
  font-family:Arial;
  background:#111;
  color:white;

  display:flex;
  flex-direction:column;
  text-align:center;
}

/* ВЕРХ */
#top {
  padding:20px 10px;
}

h1 {
  font-size:5vw;
  margin:0;
}

#status {
  font-size:4vw;
  margin-top:10px;
}

#timer {
  font-size:6vw;
  margin-top:10px;
}

/* КНОПКИ */
#buttons {
  flex:1;
  display:flex;
  flex-direction:column;
  padding:10px;
}

button {
  margin:6px 0;

  font-size:4.2vw;
  font-weight:bold;

  border-radius:20px;
  border:6px solid transparent;

  color:white;
  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px;

  -webkit-tap-highlight-color: transparent;
}

/* размеры */
.next {
  background:#4caf50;
  flex:1.6;
}

.back {
  background:orange;
  flex:0.6;
  margin-top:18px;
}

.reset {
  background:red;
  flex:0.5;
}

/* эффект */
button.pressed {
  border:6px solid white;
  transform: scale(0.97);
}
</style>
</head>

<body>

<div id="top">
  <h1>Оператор</h1>
  <div id="status">Загрузка...</div>
  <div id="timer">⏳ -</div>
</div>

<div id="buttons">
  <button id="nextBtn" class="next"></button>
  <button id="backBtn" class="back"></button>
  <button id="resetBtn" class="reset">Сброс</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let questions = [];
let current = -1;
let timerFinished = false;
let lock = false;
let timerInterval = null;
let ready = false; // 🔥 добавили

const status = document.getElementById("status");
const timerEl = document.getElementById("timer");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");
const resetBtn = document.getElementById("resetBtn");

/* эффект нажатия */
function addPressEffect(btn){
  btn.addEventListener("touchstart", () => btn.classList.add("pressed"));
  btn.addEventListener("touchend", () => btn.classList.remove("pressed"));
  btn.addEventListener("mousedown", () => btn.classList.add("pressed"));
  btn.addEventListener("mouseup", () => btn.classList.remove("pressed"));
}

[nextBtn, backBtn, resetBtn].forEach(addPressEffect);

/* загрузка CSV */
fetch(CSV_URL)
.then(r => r.text())
.then(text => {
  const rows = text.trim().split('\n').map(r => r.split(','));

  questions = rows.slice(1).map(cols => ({
    text:(cols[0]||"").trim(),
    options:cols.slice(1).map(c=>c.trim()).filter(Boolean)
  }));

  ready = true;

  updateUI(); // 🔥 обновляем после загрузки
});

/* слушаем Firebase */
db.ref('currentQuestion').on('value', snap => {

  current = snap.val() ?? -1;
  timerFinished = false;
  lock = false;

  if(timerInterval){
    clearInterval(timerInterval);
    timerInterval = null;
  }

  updateUI(); // 🔥 теперь всё через одну функцию
});

/* 🔥 ЕДИНАЯ ФУНКЦИЯ ОБНОВЛЕНИЯ */
function updateUI(){

  if(!ready){
    status.innerText = "Загрузка вопросов...";
    return;
  }

  if(current === -1){
    status.innerText = "Ожидание";
    timerEl.innerText = "⏳ -";
  }
  else if(current === -999){
    status.innerText = "Сцена (внимание)";
    timerEl.innerText = "⏳ -";
  }
  else if(current >= 0 && questions[current]){
    status.innerText = "Сейчас: " + (current+1) + ". " + questions[current].text;
    startTimer();
  }

  updateButtons();
}

/* таймер */
function startTimer(){
  let t = 5;
  timerEl.innerText = "⏳ " + t;

  timerInterval = setInterval(()=>{
    t--;

    if(t <= 0){
      clearInterval(timerInterval);
      timerEl.innerText = "⏳ 0";
      timerFinished = true;
      updateButtons();
    } else {
      timerEl.innerText = "⏳ " + t;
    }

  },1000);
}

/* переход */
function showQuestion(i){
  if(lock) return;
  lock = true;

  const ref = db.ref('currentQuestion');

  ref.once('value').then(snap => {
    if(snap.val() === i){
      ref.set(null).then(()=> ref.set(i));
    } else {
      ref.set(i);
    }
  });

  setTimeout(()=> lock = false, 300);
}

/* вперёд */
nextBtn.onclick = ()=>{
  if(lock || !questions.length) return;

  if(current === -1 || current === -999){
    showQuestion(0);
  } else if(current < questions.length - 1){
    showQuestion(current + 1);
  }
};

/* назад */
backBtn.onclick = ()=>{
  if(lock || !questions.length) return;

  if(current <= 0) return;

  if(timerFinished){
    showQuestion(current);
  } else {
    showQuestion(current - 1);
  }
};

/* сброс */
resetBtn.onclick = ()=>{
  db.ref('currentQuestion').set(-1);
};

/* кнопки */
function updateButtons(){
  if(!questions.length) return;

  if(current === -1){
    nextBtn.innerText = "Начать: 1. " + questions[0].text;
    backBtn.style.display = "none";
    return;
  }

  if(current === -999){
    nextBtn.innerText = "Начать: 1. " + questions[0].text;
    backBtn.style.display = "none";
    return;
  }

  if(current < questions.length - 1){
    nextBtn.innerText = "Далее: " + (current+2) + ". " + questions[current+1].text;
  } else {
    nextBtn.innerText = "Конец";
  }

  backBtn.style.display = "block";

  if(timerFinished){
    backBtn.innerText = "Повтор: " + (current+1) + ". " + questions[current].text;
  } else {
    if(current > 0){
      backBtn.innerText = "Назад: " + (current) + ". " + questions[current-1].text;
    }
  }
}
</script>

</body>
</html>
