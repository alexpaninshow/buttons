<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>
<style>
/* (оставил твой стиль без изменений) */
</style>
</head>

<body>

<div id="top">
  <h1>Оператор</h1>
  <div id="status">Загрузка...</div>
  <div id="timer">⏳ -</div>
  <div id="result"></div>
</div>

<div id="buttons">
  <button id="nextBtn" class="next"></button>
  <button id="backBtn" class="back"></button>
  <button id="resetBtn" class="reset">Полный сброс</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

const db=firebase.database();

let questions=[];
let current=-1;
let prevQuestion=-1;

const status=document.getElementById("status");
const resultEl=document.getElementById("result");

fetch(CSV_URL).then(r=>r.text()).then(t=>{
  const rows=t.trim().split('\n').map(r=>r.split(','));

  questions = rows.slice(1).map(c=>({
    text:(c[0]||"").trim(),
    options:c.slice(1).map(x=>x.trim()).filter(Boolean)
  }));
});

/* Firebase */
db.ref('currentQuestion').on('value', snap => {

  current = snap.val();

  if(current >= 0) prevQuestion = current;

  if(current === -999){
    status.innerText = "Смотрите на сцену";
    showResult();
  }
  else if(current >= 0 && questions[current]){
    status.innerText = "Сейчас: " + (current+1) + ". " + questions[current].text;
    resultEl.innerText = "";
  }
  else{
    status.innerText = "Ожидание";
    resultEl.innerText = "";
  }
});

/* 🔥 НОВАЯ ЛОГИКА */
function showResult(){

  if(prevQuestion < 0 || !questions[prevQuestion]) return;

  db.ref('votes/'+prevQuestion).once('value', snap => {

    const votes = snap.val() || {};
    const opts = questions[prevQuestion].options;

    let max = -1;
    let candidates = [];

    opts.forEach((opt,i)=>{
      const v = votes[i]?.count || 0;

      if(v > max){
        max = v;
        candidates = [i];
      } else if(v === max){
        candidates.push(i);
      }
    });

    if(candidates.length === 1){
      const i = candidates[0];
      resultEl.innerText = "Победил: " + opts[i] + " (" + max + ")";
      return;
    }

    let best = candidates[0];
    let bestTime = votes[best]?.last || Infinity;

    candidates.forEach(i=>{
      const t = votes[i]?.last || Infinity;
      if(t < bestTime){
        bestTime = t;
        best = i;
      }
    });

    resultEl.innerText = "Победил: " + opts[best] + " (" + max + ")";
  });
}
</script>

</body>
</html>
