<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оператор</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  display:flex;
  flex-direction:column;
  text-align:center;
}

#top{padding:20px}
h1{margin:0}

#status{font-size:22px;margin-top:10px}
#timer{font-size:28px;margin-top:10px;font-weight:bold}
#winner{
  font-size:24px;
  margin-top:15px;
  padding:10px;
  background:#222;
  border-radius:20px;
  color:#ffd700;
  transition: all 0.3s ease;
}
#winner.hidden {
  opacity: 0.3;
  filter: blur(4px);
}
#winnerDetails{
  font-size:18px;
  margin-top:5px;
  color:#aaa;
  transition: all 0.3s ease;
}
#winnerDetails.hidden {
  opacity: 0.3;
  filter: blur(4px);
}
#questionsStatus{font-size:16px;margin-top:10px;color:#aaa}

#buttons{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:10px;
}

button{
  margin:6px 0;
  font-size:18px;
  font-weight:bold;
  border-radius:20px;
  border:none;
  color:white;
  cursor:pointer;
  padding:15px;
}

.next{background:#4caf50;flex:1.6}
.back{background:orange;flex:1}
.reset{background:red;flex:1}

button:active{transform:scale(0.98)}
</style>
</head>

<body>

<div id="top">
<h1>Оператор</h1>
<div id="status">⏳ Загрузка вопросов...</div>
<div id="timer">⏳ -</div>
<div id="winner" class="hidden">🏆 Победитель: ???</div>
<div id="winnerDetails" class="hidden"></div>
<div id="questionsStatus">📋 Загружено вопросов: --</div>
</div>

<div id="buttons">
<button id="nextBtn" class="next">--</button>
<button id="backBtn" class="back">--</button>
<button id="resetBtn" class="reset">Полный сброс</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
var CSV_URL = "https://docs.google.com/spreadsheets/d/1N4CHyu57OCThSfxxcYytqu-AKBkUi6OOx5iY59XC2B0/export?format=csv&gid=0";

firebase.initializeApp({
  databaseURL:"https://buttons-panin-default-rtdb.firebaseio.com"
});

var db = firebase.database();

var questions = [];
var current = -1;
var questionsLoaded = false;
var currentVotesListener = null;
var timerEndTimeout = null;
var timerStarted = false;

var statusEl = document.getElementById("status");
var timerEl = document.getElementById("timer");
var winnerEl = document.getElementById("winner");
var winnerDetailsEl = document.getElementById("winnerDetails");
var questionsStatusEl = document.getElementById("questionsStatus");
var nextBtn = document.getElementById("nextBtn");
var backBtn = document.getElementById("backBtn");

function hideWinner(){
  winnerEl.classList.add("hidden");
  winnerDetailsEl.classList.add("hidden");
}

function showWinner(){
  winnerEl.classList.remove("hidden");
  winnerDetailsEl.classList.remove("hidden");
}

/* CSV загрузка */
fetch(CSV_URL)
.then(function(r){ return r.text(); })
.then(function(text){
  var rows = text.trim().split('\n');
  
  if(rows.length === 0){
    statusEl.innerText = "❌ Ошибка: таблица пуста";
    return;
  }
  
  for(var i=1;i<rows.length;i++){
    var cols = rows[i].split(',');
    if(!cols[0] || cols[0].trim() === "") continue;
    
    var q = {
      text:(cols[0] || "").trim(),
      options:[]
    };

    for(var j=1;j<cols.length;j++){
      var val = (cols[j] || "").trim();
      if(val) q.options.push(val);
    }
    
    if(q.text && q.options.length > 0){
      questions.push(q);
    }
  }
  
  questionsLoaded = true;
  questionsStatusEl.innerText = "📋 Загружено вопросов: " + questions.length;
  
  if(questions.length === 0){
    statusEl.innerText = "❌ Нет вопросов в таблице";
  } else {
    statusEl.innerText = "✅ Вопросы загружены. Ожидание команды...";
  }
  
  updateButtons();
});

function setQuestion(i){
  db.ref('currentQuestion').set({
    index:i,
    startTime:Date.now()
  });
}

function updateWinnerData(questionIndex, forceShow){
  if(questionIndex < 0 || !questions[questionIndex]) {
    winnerEl.innerText = "🏆 Победитель: ???";
    winnerDetailsEl.innerText = "";
    return;
  }
  
  db.ref('votes/'+questionIndex).once('value', function(snap){
    var votes = snap.val() || {};
    var maxVotes = -1;
    var winnerIndex = -1;
    var allResults = [];
    
    for(var i=0; i<questions[questionIndex].options.length; i++){
      var count = votes[i] || 0;
      allResults.push(questions[questionIndex].options[i] + ": " + count);
      if(count > maxVotes){
        maxVotes = count;
        winnerIndex = i;
      }
    }
    
    var winnerText = winnerIndex !== -1 ? questions[questionIndex].options[winnerIndex] : "—";
    winnerEl.innerText = "🏆 ПОБЕДИТЕЛЬ: " + winnerText;
    winnerDetailsEl.innerText = "Голосов: " + maxVotes + "  |  " + allResults.join("  |  ");
    
    if(forceShow){
      showWinner();
    }
  });
}

function subscribeToVotes(questionIndex){
  if(currentVotesListener){
    currentVotesListener.off();
    currentVotesListener = null;
  }
  
  if(questionIndex < 0 || !questions[questionIndex]) return;
  
  currentVotesListener = db.ref('votes/'+questionIndex);
  currentVotesListener.on('value', function(snap){
    var votes = snap.val() || {};
    var maxVotes = -1;
    var winnerIndex = -1;
    var allResults = [];
    
    for(var i=0; i<questions[questionIndex].options.length; i++){
      var count = votes[i] || 0;
      allResults.push(questions[questionIndex].options[i] + ": " + count);
      if(count > maxVotes){
        maxVotes = count;
        winnerIndex = i;
      }
    }
    
    var winnerText = winnerIndex !== -1 ? questions[questionIndex].options[winnerIndex] : "—";
    winnerEl.innerText = "🏆 ПОБЕДИТЕЛЬ: " + winnerText;
    winnerDetailsEl.innerText = "Голосов: " + maxVotes + "  |  " + allResults.join("  |  ");
  });
}

/* таймер 6 секунд */
function startTimerWithDelay(startTime){
  clearInterval(window.timerInt);
  if(timerEndTimeout) clearTimeout(timerEndTimeout);
  
  hideWinner();
  timerStarted = true;
  
  function tick(){
    var elapsed = (Date.now() - startTime) / 1000;
    var remaining = Math.max(0, 6 - elapsed);
    timerEl.innerText="⏳ " + Math.ceil(remaining) + " сек";
    
    if(remaining <= 0){
      if(window.timerInt) clearInterval(window.timerInt);
      if(timerEndTimeout) clearTimeout(timerEndTimeout);
      timerStarted = false;
      timerEl.innerText="⏳ 0 сек";
      
      showWinner();
      if(current >= 0 && questions[current]){
        updateWinnerData(current, true);
      }
      
      updateButtons();
    }
  }
  
  tick();
  window.timerInt = setInterval(tick, 100);
  
  timerEndTimeout = setTimeout(function(){
    if(timerStarted){
      timerStarted = false;
      showWinner();
      if(current >= 0 && questions[current]){
        updateWinnerData(current, true);
      }
      updateButtons();
    }
  }, 6500);
}

/* sync */
db.ref('currentQuestion').on('value', function(snap){
  var data = snap.val();
  if(!data) return;

  current = data.index;
  
  if(!questionsLoaded){
    statusEl.innerText = "⏳ Загрузка вопросов...";
  }
  else if(current === -1){
    statusEl.innerText = "🎭 Старт. Нажмите 'Далее' для первого вопроса";
    timerEl.innerText="⏳ -";
    hideWinner();
    winnerEl.innerText = "🏆 Победитель: ???";
    winnerDetailsEl.innerText = "";
    if(currentVotesListener){
      currentVotesListener.off();
      currentVotesListener = null;
    }
    if(timerEndTimeout) clearTimeout(timerEndTimeout);
    timerStarted = false;
    updateButtons();
  }
  else if(current === -999){
    statusEl.innerText = "⏸️ Ожидание... (зрители смотрят на сцену)";
    timerEl.innerText="⏳ -";
    hideWinner();
    winnerEl.innerText = "🏆 Победитель: ???";
    winnerDetailsEl.innerText = "";
    if(currentVotesListener){
      currentVotesListener.off();
      currentVotesListener = null;
    }
    if(timerEndTimeout) clearTimeout(timerEndTimeout);
    timerStarted = false;
    updateButtons();
  }
  else if(questions[current]){
    statusEl.innerText = "❓ Вопрос " + (current+1) + " из " + questions.length + ": " + questions[current].text;
    startTimerWithDelay(data.startTime);
    subscribeToVotes(current);
    updateWinnerData(current, false);
    updateButtons();
  }
  else if(questions.length > 0 && current >= questions.length){
    statusEl.innerText = "🏁 Спектакль завершён! Все вопросы заданы.";
    timerEl.innerText="⏳ -";
    updateButtons();
  }

  updateButtons();
});

/* ИСПРАВЛЕННЫЕ КНОПКИ */
nextBtn.onclick=function(){
  if(!questionsLoaded || questions.length === 0){
    alert("Вопросы ещё не загружены. Подождите...");
    return;
  }
  
  if(current === -1 || current === -999){
    setQuestion(0);
    return;
  }

  if(current < questions.length-1){
    setQuestion(current+1);
  } else if(current === questions.length-1){
    statusEl.innerText = "🏁 Это был последний вопрос!";
  }
};

backBtn.onclick=function(){
  if(!questionsLoaded || questions.length === 0) return;
  
  /* Если мы на первом вопросе (current === 0) — повторяем первый вопрос */
  if(current === 0){
    setQuestion(0);
    return;
  }

  /* Если текущий вопрос больше 0 — повторяем ТЕКУЩИЙ вопрос (не предыдущий!) */
  if(current > 0){
    setQuestion(current);  // ← повторяем текущий вопрос, а не current-1
    return;
  }
};

/* подписи кнопок */
function updateButtons(){
  if(!questionsLoaded || questions.length === 0){
    nextBtn.innerText = "Загрузка...";
    backBtn.innerText = "Загрузка...";
    return;
  }

  /* НАДПИСЬ НА КНОПКЕ "НАЗАД" */
  if(current === -1 || current === -999){
    backBtn.innerText = "◀ Назад";
  }
  else if(current >= 0 && questions[current]){
    backBtn.innerText = "◀ Повторить: " + (current+1) + ". " + questions[current].text.substring(0, 30);
  }
  else {
    backBtn.innerText = "◀ Назад";
  }

  /* НАДПИСЬ НА КНОПКЕ "ДАЛЕЕ" */
  if(current === -1 || current === -999){
    nextBtn.innerText = "Далее: 1. " + questions[0].text.substring(0, 30);
  }
  else if(current === questions.length - 1){
    nextBtn.innerText = "🏁 ФИНАЛ";
  }
  else if(current >= 0 && current < questions.length - 1 && questions[current + 1]){
    nextBtn.innerText = "Далее: " + (current+2) + ". " + questions[current+1].text.substring(0, 30);
  }
  else {
    nextBtn.innerText = "Далее";
  }
}

/* сброс */
document.getElementById("resetBtn").onclick=function(){
  if(!confirm("Вы уверены, что хотите полностью сбросить игру?")) return;

  db.ref('votes').remove();
  db.ref('resetFlag').set(Date.now());
  setQuestion(-1);
};
</script>

</body>
</html>
