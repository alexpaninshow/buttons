<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оператор</title>
<style>
body { font-family:'Segoe UI',sans-serif; text-align:center; padding:50px; background:linear-gradient(120deg,#222,#555); color:white; }
button { font-size:24px; padding:25px 50px; border-radius:12px; border:none; background:#4caf50; color:white; cursor:pointer; transition:0.3s; }
button:hover{background:#66bb6a;}
</style>
</head>
<body>

<h1>Оператор</h1>
<button id="nextBtn">Следующий вопрос</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCnYKEXEd207E9LXgCBupqc3kjbEbk1NTc",
  authDomain: "buttons-show.firebaseapp.com",
  databaseURL: "https://buttons-panin-default-rtdb.firebaseio.com",
  projectId: "buttons-show",
  storageBucket: "buttons-show.appspot.com",
  messagingSenderId: "145808897789",
  appId: "1:145808897789:web:900445fca031ece7e53094"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const questions = [
  { text:"Кого поцелует герой?", options:["Девушку","Себя","Кого-то из зрителей"] },
  { text:"Вам понравился наш спектакль?", options:["Да","Нет",""] }
];

const currentQuestionRef = db.ref('currentQuestion');

document.getElementById("nextBtn").onclick = () => {
  currentQuestionRef.once('value').then(snapshot => {
    let current = snapshot.val();

    if(current === null) current = -1;

    // СТОП
    if(current >= questions.length - 1){
      alert("Это был последний вопрос");
      return;
    }

    const next = current + 1;

    currentQuestionRef.set(next);

    alert("Вопрос: " + questions[next].text);
  });
};
</script>
</body>
</html>
